<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>L'Ascension de l'Ombre — Idle</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@500;600;700;900&family=Spectral:ital,wght@0,300;0,400;0,500;0,600;1,400&display=swap" rel="stylesheet">
<style>
/* ============ THEME TOKENS ============ */
:root {
  --bg: #0c0a08;
  --bg-parchment: linear-gradient(to bottom, #1a1612, #0f0d0b);
  --panel: #1e1814;
  --panel2: #14100c;
  --line: rgba(212, 175, 55, 0.3);
  --line2: rgba(212, 175, 55, 0.6);
  --gold: #d4af37;
  --gold-bright: #f9df8a;
  --teal: #5a9e8f;
  --teal-soft: #8ecfc0;
  --text: #e6dac3;
  --muted: #a3947c;
  --danger: #b22222;
  --good: #5a9e8f;
  --hp: #4b8b3b;
  --hp2: #2d5a21;
  --xp: #4a7599;
  --shadow: 0 8px 30px rgba(0,0,0,.8);
  --glow: rgba(212, 175, 55, 0.35);
}
body.nazgul {
  --bg: #050505;
  --bg-parchment: linear-gradient(to bottom, #110000, #000000);
  --panel: #1a0505;
  --panel2: #0f0000;
  --line: rgba(180, 40, 40, 0.4);
  --line2: rgba(220, 50, 50, 0.7);
  --gold: #c23b3b;
  --gold-bright: #e86464;
  --text: #d4b8b8;
  --muted: #8a6363;
  --glow: rgba(200, 40, 40, 0.5);
}
/* ============ REGION THEMES ============ */
body.region-comté {
  --bg:#09100a; --bg-parchment:linear-gradient(to bottom,#131c10,#090d07);
  --panel:#141e12; --panel2:#0c1409; --line:rgba(100,180,60,0.3); --line2:rgba(120,200,70,0.6);
  --gold:#7dc44a; --gold-bright:#b8f06a; --glow:rgba(100,180,60,0.35);
}
body.region-vieuxbois {
  --bg:#080c06; --bg-parchment:linear-gradient(to bottom,#0f160a,#060907);
  --panel:#101808; --panel2:#080f05; --line:rgba(60,120,30,0.35); --line2:rgba(80,140,40,0.6);
  --gold:#5a9e30; --gold-bright:#8ccc55; --glow:rgba(60,120,30,0.3);
}
body.region-fondcombe {
  --bg:#070c12; --bg-parchment:linear-gradient(to bottom,#0e1620,#050a0f);
  --panel:#0f1a28; --panel2:#081018; --line:rgba(80,140,200,0.35); --line2:rgba(100,170,230,0.6);
  --gold:#5aa8d4; --gold-bright:#90d4f8; --glow:rgba(80,150,210,0.4);
}
body.region-moria {
  --bg:#0c0805; --bg-parchment:linear-gradient(to bottom,#1a1005,#0a0703);
  --panel:#201408; --panel2:#140e04; --line:rgba(200,100,20,0.35); --line2:rgba(230,130,30,0.6);
  --gold:#c87020; --gold-bright:#f0a040; --glow:rgba(200,100,20,0.4);
}
body.region-lorien {
  --bg:#08090c; --bg-parchment:linear-gradient(to bottom,#12141c,#070809);
  --panel:#14161e; --panel2:#0c0e14; --line:rgba(180,160,80,0.35); --line2:rgba(220,200,100,0.6);
  --gold:#c8b440; --gold-bright:#f0dc80; --glow:rgba(180,160,80,0.4);
}
body.region-rohan {
  --bg:#0c0a06; --bg-parchment:linear-gradient(to bottom,#1c1808,#0c0a04);
  --panel:#201c0a; --panel2:#141205; --line:rgba(180,140,40,0.35); --line2:rgba(220,170,50,0.6);
  --gold:#c89a28; --gold-bright:#f0c040; --glow:rgba(180,140,40,0.4);
}
body.region-gondor {
  --bg:#090b0f; --bg-parchment:linear-gradient(to bottom,#14181f,#070810);
  --panel:#141820; --panel2:#0c1018; --line:rgba(160,170,200,0.35); --line2:rgba(190,200,230,0.6);
  --gold:#a0b0d0; --gold-bright:#d0e0f8; --glow:rgba(160,180,220,0.4);
}
body.region-mordor {
  --bg:#080400; --bg-parchment:linear-gradient(to bottom,#120800,#060300);
  --panel:#1a0c00; --panel2:#100600; --line:rgba(180,60,20,0.4); --line2:rgba(220,80,30,0.7);
  --gold:#c04010; --gold-bright:#e86030; --glow:rgba(180,60,20,0.5);
}
body.region-destin {
  --bg:#0a0400; --bg-parchment:linear-gradient(to bottom,#160800,#080300);
  --panel:#200a00; --panel2:#160600; --line:rgba(200,80,10,0.5); --line2:rgba(240,100,20,0.8);
  --gold:#d04a00; --gold-bright:#ff6820; --glow:rgba(200,80,10,0.6);
}
* { box-sizing: border-box; margin: 0; padding: 0; }
html, body { height: 100%; }
body {
  background: var(--bg);
  background-image: radial-gradient(circle at center, transparent 0%, rgba(0,0,0,0.6) 100%);
  color: var(--text);
  font-family: 'Spectral', Georgia, serif;
  overflow: hidden;
  transition: background 0.8s ease;
  -webkit-tap-highlight-color: transparent;
}
h1, h2, h3, .cinzel, .btn, .tabbtn, .statval, .bignum { font-family: 'Cinzel', serif; }
#bgcanvas { position: fixed; inset: 0; z-index: 0; display: block; opacity: 0.1; }
#particles { position: fixed; inset: 0; z-index: 5; pointer-events: none; }
#flash { position: fixed; inset: 0; z-index: 40; pointer-events: none; opacity: 0; background: #fff; transition: opacity .12s; }

/* ============ LAYOUT ============ */
#app { position: relative; z-index: 10; height: 100%; display: flex; flex-direction: column; max-width: 1180px; margin: 0 auto; }

/* Top bar */
#topbar {
  display: flex; align-items: center; gap: 10px; padding: 10px 16px;
  background: var(--bg-parchment);
  border-bottom: 2px ridge var(--line);
  box-shadow: 0 4px 15px rgba(0,0,0,0.6);
  flex-wrap: wrap;
}
#gametitle { font-size: 18px; letter-spacing: 1px; color: var(--gold-bright); text-shadow: 0 0 10px var(--glow); font-weight: 700; }
.res { display: flex; align-items: center; gap: 6px; font-size: 13px; padding: 4px 10px; border: 1px solid var(--line); border-radius: 4px; background: var(--panel2); box-shadow: inset 0 0 10px rgba(0,0,0,0.5); white-space: nowrap; }
.res .val { font-family: 'Cinzel'; font-weight: 600; color: var(--gold-bright); }
.res.essence .val { color: var(--teal-soft); }
.res.legacy .val { color: #c9a0ff; }
.spacer { flex: 1; }

/* Buy amount controls */
#buyControls { display: flex; align-items: center; gap: 6px; }
.buy-mode-btn { cursor: pointer; border: 1px solid var(--line); background: var(--panel2); color: var(--muted); border-radius: 3px; padding: 5px 10px; font-size: 12px; font-family: 'Cinzel'; font-weight: bold; transition: 0.2s; }
.buy-mode-btn:hover, .buy-mode-btn.active { border-color: var(--gold); color: var(--gold-bright); text-shadow: 0 0 5px var(--glow); background: rgba(212,175,55,0.1); }
#buyCustomInput { width: 60px; background: var(--panel2); border: 1px solid var(--line); border-radius: 3px; padding: 5px 6px; color: var(--gold-bright); font-family: 'Cinzel'; font-size: 12px; text-align: center; }
#buyCustomInput:focus { outline: none; border-color: var(--gold); }

.control-btn { cursor: pointer; border: 1px solid var(--line); background: var(--panel2); color: var(--text); border-radius: 4px; padding: 6px 12px; font-size: 13px; font-family: 'Cinzel'; font-weight: bold; transition: 0.2s; }
.control-btn:hover { border-color: var(--gold); text-shadow: 0 0 5px var(--glow); }

/* Hero header */
#heroband { display: flex; align-items: center; gap: 16px; padding: 10px 16px; border-bottom: 1px solid var(--line); background: rgba(20, 15, 10, 0.8); flex-wrap: wrap; }
#heroname { font-family: 'Cinzel'; font-weight: 700; font-size: 18px; color: var(--gold-bright); text-shadow: 0 0 5px #000; }
.htag { font-size: 12px; color: var(--muted); border: 1px solid var(--line); border-radius: 3px; padding: 3px 8px; background: rgba(0,0,0,0.3); }
.htag.ps { color: var(--teal-soft); border-color: var(--teal); }
.barwrap { flex: 1; min-width: 200px; }
.barlabel { display: flex; justify-content: space-between; font-size: 12px; color: var(--muted); margin-bottom: 4px; letter-spacing: 1px; font-family: 'Cinzel'; }
.bar { height: 16px; border-radius: 3px; background: #000; overflow: hidden; position: relative; border: 1px solid var(--line); box-shadow: inset 0 0 8px rgba(0,0,0,0.8); }
.bar > i { display: block; height: 100%; width: 0; transition: width .25s ease; }
.bar.xp > i { background: linear-gradient(90deg, #1c3d5a, var(--xp)); }
.shimmer::after { content: ''; position: absolute; inset: 0; background: linear-gradient(110deg, transparent 30%, rgba(255,255,255,.2) 50%, transparent 70%); transform: translateX(-100%); animation: shim 2.4s linear infinite; }
@keyframes shim { to { transform: translateX(100%); } }

/* Tabs */
#tabs { display: flex; gap: 6px; padding: 10px 16px 0; overflow-x: auto; background: var(--bg-parchment); scrollbar-width: none; border-bottom: 2px solid var(--line); }
#tabs::-webkit-scrollbar { display: none; }
.tabbtn { flex: 0 0 auto; cursor: pointer; border: 1px solid var(--line); border-bottom: none; background: var(--panel2); color: var(--muted); padding: 10px 20px; border-radius: 6px 6px 0 0; font-size: 14px; font-weight: 700; position: relative; transition: .2s; }
.tabbtn:hover { color: var(--gold-bright); background: var(--panel); }
.tabbtn.active { background: var(--panel); color: var(--gold-bright); border-color: var(--gold); border-width: 2px; border-bottom: 2px solid var(--panel); margin-bottom: -2px; text-shadow: 0 0 8px var(--glow); }

/* Content */
#content { flex: 1; overflow-y: auto; padding: 20px; scrollbar-width: thin; scrollbar-color: var(--gold) #000; }
.panel { display: none; }
.panel.active { display: block; animation: fadein .35s ease; }
@keyframes fadein { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: none; } }

.card { background: var(--bg-parchment); border: 2px ridge var(--line); border-radius: 6px; padding: 20px; margin-bottom: 16px; box-shadow: var(--shadow); position: relative; overflow: hidden; }
.card::before { content: ''; position: absolute; top: 0; left: 0; right: 0; height: 1px; background: linear-gradient(90deg, transparent, var(--gold), transparent); opacity: 0.5; }
.card h3 { font-size: 18px; letter-spacing: 2px; color: var(--gold-bright); margin-bottom: 14px; text-shadow: 0 2px 4px #000; border-bottom: 1px solid var(--line); padding-bottom: 8px; }
.sub { color: var(--muted); font-size: 14px; margin-bottom: 14px; line-height: 1.5; font-style: italic; }

/* Grids */
.grid { display: grid; gap: 12px; }
.g1 { grid-template-columns: 1fr; }
.g2 { grid-template-columns: repeat(2, 1fr); }
.g3 { grid-template-columns: repeat(3, 1fr); }
.g4 { grid-template-columns: repeat(4, 1fr); }

/* Stat boxes */
.statbox { background: rgba(0,0,0,0.4); border: 1px solid var(--line); border-radius: 4px; padding: 14px; text-align: center; box-shadow: inset 0 0 15px rgba(0,0,0,0.8); }
.statbox .lab { font-size: 12px; color: var(--muted); letter-spacing: 1px; text-transform: uppercase; }
.statbox .statval { font-size: 26px; color: var(--gold-bright); font-weight: 700; margin-top: 6px; text-shadow: 0 0 8px var(--glow); }

/* Buttons */
.btn { cursor: pointer; border: 2px solid var(--line2); background: linear-gradient(180deg, #33281b, #1a140e); color: var(--gold-bright); border-radius: 4px; padding: 12px 16px; font-size: 14px; text-transform: uppercase; letter-spacing: 1px; transition: .2s; width: 100%; box-shadow: 0 4px 6px rgba(0,0,0,0.6); font-family: 'Cinzel'; }
.btn:hover { background: linear-gradient(180deg, #443524, #2b2117); border-color: var(--gold); box-shadow: 0 0 15px var(--glow); transform: translateY(-1px); }
.btn:active { transform: translateY(2px); box-shadow: none; }
.btn:disabled { opacity: 0.5; cursor: not-allowed; filter: grayscale(1); box-shadow: none; border-color: var(--line); color: var(--muted); }
.btn.small { padding: 8px 12px; font-size: 12px; }

/* Buy rows */
.buyrow { display: flex; align-items: center; justify-content: space-between; gap: 14px; background: rgba(0,0,0,0.3); border: 1px solid var(--line); border-radius: 6px; padding: 12px 16px; margin-bottom: 10px; transition: 0.2s; }
.buyrow:hover { background: rgba(212, 175, 55, 0.05); border-color: var(--line2); }
.buyrow .info { flex: 1; min-width: 0; }
.buyrow .nm { font-family: 'Cinzel'; font-weight: 700; font-size: 15px; color: var(--text); text-shadow: 0 1px 2px #000; }
.buyrow .ds { font-size: 13px; color: var(--muted); margin-top: 4px; line-height: 1.4; }
.buyrow .lvl { font-size: 12px; color: var(--teal-soft); margin-top: 4px; font-family: 'Cinzel'; }
.buyrow .act { flex: 0 0 auto; width: 170px; }

/* Gold tier separator bands */
.gold-tier-header {
  display: flex; align-items: center; gap: 12px;
  margin: 20px 0 10px;
  font-family: 'Cinzel'; font-size: 12px; letter-spacing: 2px; text-transform: uppercase;
}
.gold-tier-header::before, .gold-tier-header::after { content: ''; flex: 1; height: 1px; background: var(--line); }
.tier-early { color: #7aad7a; --tier-c: #4a8a4a; }
.tier-mid   { color: #5fa8e0; --tier-c: #2a6090; }
.tier-late  { color: #b06fe0; --tier-c: #6a3a90; }
.tier-end   { color: #e8c170; --tier-c: #9a7a30; }

/* Combat */
.combatface { display: flex; justify-content: space-between; align-items: center; gap: 20px; margin-bottom: 20px; padding: 10px; background: rgba(0,0,0,0.2); border-radius: 8px; border: 1px solid rgba(255,255,255,0.05); }
.fighter { text-align: center; flex: 1; }
.fighter .av { font-size: 54px; filter: drop-shadow(0 0 15px var(--glow)); margin-bottom: 8px; }
.fighter .nm { font-family: 'Cinzel'; font-size: 16px; color: var(--gold-bright); text-shadow: 0 2px 4px #000; margin-bottom: 8px; }
.vs { font-family: 'Cinzel'; color: var(--danger); font-size: 24px; font-weight: bold; text-shadow: 0 0 10px rgba(178,34,34,0.8); }
.enemyhp > i { background: linear-gradient(90deg, #5c1e1e, var(--danger)); }
.herohp > i { background: linear-gradient(90deg, var(--hp2), var(--hp)); }

/* Equipment / Drops */
.slot { background: rgba(0,0,0,0.4); border: 1px solid var(--line); border-radius: 6px; padding: 14px; position: relative; box-shadow: inset 0 0 10px rgba(0,0,0,0.6); display: flex; flex-direction: column; justify-content: center; align-items: center; text-align: center; transition: 0.3s; }
.slot .icon { font-size: 32px; margin-bottom: 8px; filter: drop-shadow(0 0 8px rgba(255,255,255,0.2)); }
.slot .sname { font-family: 'Cinzel'; font-size: 15px; color: var(--text); margin-bottom: 4px; }
.slot .rar { font-size: 12px; font-weight: bold; letter-spacing: 1px; font-family: 'Cinzel'; margin-bottom: 4px; text-transform: uppercase; }
.slot .stat { font-size: 13px; color: var(--gold-bright); }
.slot .equip-name { font-size: 13px; color: var(--text); margin: 3px 0; font-style: italic; }

/* Rarity colors */
.r-common   { color: #b9c2d0; text-shadow: 0 0 5px rgba(185,194,208,0.5); }
.r-uncommon { color: #6fd17a; text-shadow: 0 0 5px rgba(111,209,122,0.5); }
.r-rare     { color: #5fa8e0; text-shadow: 0 0 5px rgba(95,168,224,0.5); }
.r-epic     { color: #b06fe0; text-shadow: 0 0 5px rgba(176,111,224,0.5); }
.r-legendary{ color: #e8c170; text-shadow: 0 0 8px rgba(232,193,112,0.8); }
.r-mythic   { color: #ff6b88; text-shadow: 0 0 10px rgba(255,107,136,0.9); animation: mythicPulse 2s ease-in-out infinite; }
@keyframes mythicPulse { 0%,100%{ text-shadow: 0 0 8px rgba(255,107,136,0.8); } 50%{ text-shadow: 0 0 20px rgba(255,107,136,1), 0 0 40px rgba(255,107,136,0.5); } }

/* Drop animation overlay */
@keyframes dropIn { 0%{opacity:0;transform:scale(0.5) translateY(-20px)} 60%{transform:scale(1.1) translateY(5px)} 100%{opacity:1;transform:scale(1) translateY(0)} }
.slot.drop-animate { animation: dropIn 0.5s ease-out; }

/* Drop log */
#droplog { margin-top: 10px; height: 120px; overflow-y: auto; background: rgba(0,0,0,0.5); border: 1px solid var(--line); border-radius: 4px; padding: 8px; font-size: 13px; color: var(--muted); scrollbar-width: none; }
#droplog div { margin-bottom: 4px; animation: fadein 0.3s; padding: 2px 0; border-bottom: 1px solid rgba(255,255,255,0.04); }

/* Legacy */
.legacy-locked { opacity: 0.5; filter: grayscale(0.5); }
.legacy-reward-badge { display: inline-block; padding: 2px 8px; border-radius: 3px; font-family: 'Cinzel'; font-size: 11px; font-weight: bold; margin: 3px 2px; }
.legacy-tier-1 { background: rgba(130,180,130,0.2); border: 1px solid #4a8a4a; color: #7aad7a; }
.legacy-tier-2 { background: rgba(95,168,224,0.2); border: 1px solid #2a6090; color: #5fa8e0; }
.legacy-tier-3 { background: rgba(176,111,224,0.2); border: 1px solid #6a3a90; color: #b06fe0; }
.legacy-tier-4 { background: rgba(232,193,112,0.2); border: 1px solid #9a7a30; color: #e8c170; }
.legacy-tier-5 { background: rgba(255,107,136,0.2); border: 1px solid #a03050; color: #ff6b88; }

/* Legacy preview bar */
.legacy-preview { margin: 14px 0; padding: 14px; background: rgba(0,0,0,0.3); border: 1px solid rgba(200,160,255,0.3); border-radius: 6px; }
.legacy-preview h4 { font-family: 'Cinzel'; color: #c9a0ff; font-size: 14px; margin-bottom: 8px; }
.legacy-milestones { display: flex; gap: 6px; flex-wrap: wrap; margin-top: 6px; }

/* Start screen */
#start { position: fixed; inset: 0; z-index: 80; background: radial-gradient(circle at center, #261f18 0%, #000 100%); display: flex; align-items: center; justify-content: center; padding: 20px; overflow-y: auto; }
#start .inner { max-width: 700px; width: 100%; text-align: center; background: rgba(15, 12, 10, 0.9); padding: 40px; border: 2px ridge var(--gold); border-radius: 8px; box-shadow: 0 0 50px rgba(0,0,0,0.9); }
#start h1 { font-size: 36px; color: var(--gold-bright); text-shadow: 0 0 20px var(--glow), 0 5px 10px #000; letter-spacing: 3px; margin-bottom: 10px; }
#start .tag { color: var(--muted); font-style: italic; margin-bottom: 30px; font-size: 16px; }
#start .step { font-size: 14px; color: var(--gold); letter-spacing: 2px; text-transform: uppercase; margin: 24px 0 12px; border-bottom: 1px solid var(--line); padding-bottom: 5px; display: inline-block;}
.choice { cursor: pointer; border: 1px solid var(--line); background: rgba(0,0,0,0.5); border-radius: 4px; padding: 16px; text-align: left; transition: .2s; }
.choice:hover { border-color: var(--gold-bright); box-shadow: inset 0 0 15px rgba(212,175,55,0.2); }
.choice.sel { border-color: var(--gold); box-shadow: 0 0 15px var(--glow) inset; background: rgba(212, 175, 55, 0.1); }
.choice .ct { font-family: 'Cinzel'; font-weight: bold; font-size: 16px; color: var(--gold-bright); display: flex; align-items: center; gap: 10px; }
.choice .cd { font-size: 13px; color: var(--text); margin-top: 6px; line-height: 1.5; }
#start input { width: 100%; max-width: 300px; background: rgba(0,0,0,0.6); border: 1px solid var(--gold); border-radius: 4px; padding: 12px; color: var(--gold-bright); font-family: 'Cinzel'; font-size: 18px; text-align: center; margin: 10px auto; display: block; box-shadow: inset 0 0 10px #000; }
#start input:focus { outline: none; border-color: #fff; box-shadow: 0 0 15px var(--glow); }

/* Floating combat text & Toasts */
.float { position: fixed; z-index: 50; font-family: 'Cinzel'; font-weight: 900; font-size: 20px; pointer-events: none; text-shadow: 2px 2px 0 #000, -1px -1px 0 #000, 0 0 10px rgba(0,0,0,0.8); animation: floatup 1s ease-out forwards; }
@keyframes floatup { 0%{opacity:1;transform:translateY(0) scale(0.8)} 20%{transform:translateY(-10px) scale(1.2)} 100%{opacity:0;transform:translateY(-60px) scale(1)} }
#toasts { position: fixed; top: 80px; right: 20px; z-index: 70; display: flex; flex-direction: column; gap: 10px; align-items: flex-end; pointer-events: none; }
.toast { background: var(--bg-parchment); border: 1px solid var(--gold); border-radius: 4px; padding: 12px 20px; font-size: 14px; font-family: 'Cinzel'; font-weight: bold; box-shadow: 0 4px 15px rgba(0,0,0,0.8); animation: toastin 0.4s ease, toastout 0.4s ease 3s forwards; color: var(--gold-bright); }
.toast.drop { border-color: #ff6b88; color: #ff6b88; }
.toast.legendary-drop { border-color: #e8c170; color: #e8c170; text-shadow: 0 0 10px rgba(232,193,112,0.8); }
@keyframes toastin { from{opacity:0;transform:translateX(20px)} to{opacity:1;transform:none} }
@keyframes toastout { to{opacity:0;transform:translateX(20px)} }

/* Karma/Corruption */
.karmabar { height: 12px; border-radius: 2px; overflow: hidden; background: #000; border: 1px solid var(--line); position: relative; margin: 8px 0; }
.karmabar > i { position: absolute; top: 0; bottom: 0; width: 4px; background: #fff; box-shadow: 0 0 10px #fff; transition: left .3s; }
.corrbar > i { background: linear-gradient(90deg, #5a2a7a, #9d62d6, #d94f63); box-shadow: 0 0 10px var(--danger); width: 100%; transform-origin: left;}

/* ============ COMBAT ANIMATIONS ============ */
.fighter .av { transition: filter .15s; will-change: transform, filter; }

.fighter.attack-anim .av { animation: heroAttackAnim .35s ease; }
@keyframes heroAttackAnim {
  0%   { transform: translateX(0) rotate(0) scale(1); }
  30%  { transform: translateX(28px) rotate(-18deg) scale(1.18); filter: drop-shadow(0 0 18px var(--gold-bright)); }
  55%  { transform: translateX(-6px) rotate(6deg) scale(1.05); }
  100% { transform: translateX(0) rotate(0) scale(1); }
}

.fighter.hit-shake .av { animation: enemyHitAnim .32s ease; }
@keyframes enemyHitAnim {
  0%   { transform: translateX(0); filter: brightness(1) drop-shadow(0 0 15px var(--glow)); }
  15%  { transform: translateX(-10px) scale(0.96); filter: brightness(2.6) drop-shadow(0 0 25px var(--danger)) saturate(2); }
  35%  { transform: translateX(9px) scale(1.02); filter: brightness(2) drop-shadow(0 0 18px var(--danger)); }
  55%  { transform: translateX(-5px); }
  75%  { transform: translateX(4px); }
  100% { transform: translateX(0); filter: brightness(1) drop-shadow(0 0 15px var(--glow)); }
}

.fighter.crit-shake .av { animation: critHitAnim .4s ease; }
@keyframes critHitAnim {
  0%   { transform: translateX(0) scale(1); filter: brightness(1) drop-shadow(0 0 15px var(--glow)); }
  10%  { transform: translateX(-16px) scale(0.9) rotate(-8deg); filter: brightness(3.5) drop-shadow(0 0 35px #ff6b88) saturate(3); }
  30%  { transform: translateX(14px) scale(1.12) rotate(6deg); filter: brightness(2.5) drop-shadow(0 0 30px #ff6b88); }
  50%  { transform: translateX(-8px) scale(1.04); }
  70%  { transform: translateX(6px); }
  100% { transform: translateX(0) scale(1); filter: brightness(1) drop-shadow(0 0 15px var(--glow)); }
}

.fighter.death-anim .av { animation: enemyDeathAnim .55s ease forwards; }
@keyframes enemyDeathAnim {
  0%   { transform: scale(1) rotate(0); opacity: 1; filter: brightness(1) drop-shadow(0 0 15px var(--glow)); }
  35%  { transform: scale(1.25) rotate(12deg); opacity: 1; filter: brightness(4) drop-shadow(0 0 30px #fff) saturate(0); }
  100% { transform: scale(0.15) rotate(130deg) translateY(20px); opacity: 0; filter: brightness(4) saturate(0); }
}

.fighter.spawn-anim .av { animation: enemySpawnAnim .45s ease; }
@keyframes enemySpawnAnim {
  0%   { transform: scale(0) rotate(-40deg); opacity: 0; filter: brightness(3) drop-shadow(0 0 25px var(--danger)); }
  65%  { transform: scale(1.18) rotate(8deg); opacity: 1; }
  100% { transform: scale(1) rotate(0); opacity: 1; filter: brightness(1) drop-shadow(0 0 15px var(--glow)); }
}

/* Weapon slash effect */
.combatface { position: relative; }
.slash {
  position: absolute; top: 50%; left: 50%; width: 140px; height: 8px;
  margin: -4px 0 0 -70px;
  background: linear-gradient(90deg, transparent, #fff 35%, var(--gold-bright) 60%, transparent);
  border-radius: 4px; box-shadow: 0 0 16px var(--gold-bright), 0 0 30px var(--gold-bright);
  opacity: 0; pointer-events: none; z-index: 16;
  transform: rotate(-35deg) scaleX(0);
  transform-origin: left center;
}
.slash.go { animation: slashGoAnim .28s ease-out; }
@keyframes slashGoAnim {
  0%   { opacity: 0; transform: rotate(-35deg) scaleX(0); }
  25%  { opacity: 1; transform: rotate(-35deg) scaleX(1); }
  60%  { opacity: 1; transform: rotate(-35deg) scaleX(1.3); }
  100% { opacity: 0; transform: rotate(-35deg) scaleX(1.35); }
}
.slash.crit { background: linear-gradient(90deg, transparent, #fff 30%, #ff6b88 55%, transparent); box-shadow: 0 0 22px #ff6b88, 0 0 40px #ff6b88; height: 11px; }

/* Screen shake (on big hits / crits) */
#app.screen-shake { animation: screenShakeAnim .3s ease; }
@keyframes screenShakeAnim {
  0%,100% { transform: translate(0,0); }
  20% { transform: translate(-6px,3px); }
  40% { transform: translate(6px,-3px); }
  60% { transform: translate(-4px,2px); }
  80% { transform: translate(4px,-1px); }
}

/* Critical floating text */
.float.crit { color: #ff6b88; font-size: 30px; text-shadow: 2px 2px 0 #000, -1px -1px 0 #000, 0 0 16px #ff6b88, 0 0 30px #ff6b88; animation: floatupCrit 1.1s ease-out forwards; }
@keyframes floatupCrit {
  0%   { opacity:1; transform: translateY(0) scale(0.6) rotate(-6deg); }
  18%  { transform: translateY(-14px) scale(1.4) rotate(4deg); }
  100% { opacity:0; transform: translateY(-70px) scale(1.1) rotate(0); }
}

/* Level up effects */
.levelup-burst {
  position: fixed; inset: 0; z-index: 60; pointer-events: none;
  background: radial-gradient(circle, var(--glow) 0%, transparent 60%);
  opacity: 0;
}
.levelup-burst.go { animation: radialBurstAnim 1s ease-out forwards; }
@keyframes radialBurstAnim {
  0%   { opacity: 0; }
  15%  { opacity: 1; }
  100% { opacity: 0; }
}
.levelup-banner {
  position: fixed; top: 38%; left: 50%; transform: translate(-50%,-50%) scale(0.4);
  font-family: 'Cinzel', serif; font-size: 42px; font-weight: 900; letter-spacing: 4px;
  color: var(--gold-bright); text-shadow: 0 0 25px var(--glow), 0 4px 10px #000;
  z-index: 65; pointer-events: none; opacity: 0; white-space: nowrap; text-align: center;
}
.levelup-banner.go { animation: levelBannerAnim 1.8s ease-out forwards; }
@keyframes levelBannerAnim {
  0%   { opacity: 0; transform: translate(-50%,-50%) scale(0.3) rotate(-8deg); }
  18%  { opacity: 1; transform: translate(-50%,-50%) scale(1.2) rotate(2deg); }
  35%  { opacity: 1; transform: translate(-50%,-50%) scale(1) rotate(0); }
  78%  { opacity: 1; transform: translate(-50%,-50%) scale(1) translateY(0); }
  100% { opacity: 0; transform: translate(-50%,-50%) scale(1) translateY(-40px); }
}

/* Legendary/Mythic drop burst */
.legendary-burst {
  position: fixed; inset: 0; z-index: 60; pointer-events: none;
  background: radial-gradient(circle, rgba(232,193,112,0.55) 0%, transparent 65%);
  opacity: 0;
}
.legendary-burst.go { animation: radialBurstAnim 1.2s ease-out forwards; }
.legendary-burst.mythic { background: radial-gradient(circle, rgba(255,107,136,0.6) 0%, transparent 65%); }

/* Audio toggle buttons */
.control-btn.muted { opacity: 0.5; filter: grayscale(1); border-color: var(--muted); }

/* ============ KARMA / CORRUPTION BARS (heroband) ============ */
.kc-wrap { display: flex; flex-direction: column; gap: 6px; min-width: 180px; }
.kc-row { display: flex; align-items: center; gap: 8px; }
.kc-label { font-size: 11px; font-family: 'Cinzel'; letter-spacing: 1px; color: var(--muted); width: 80px; text-transform: uppercase; }
.kc-bar { flex: 1; height: 10px; border-radius: 2px; background: #000; border: 1px solid var(--line); position: relative; overflow: hidden; }
.kc-bar.karma > i { display:block; height:100%; background: linear-gradient(90deg, #b22222, #8a6363, #5a9e8f); width: 50%; transition: width .4s; }
.kc-bar.karma > .marker { position:absolute; top:-1px; bottom:-1px; left:50%; width:2px; background:#fff; box-shadow:0 0 6px #fff; }
.kc-bar.corr > i { display:block; height:100%; background: linear-gradient(90deg, #5a2a7a, #9d62d6, #d94f63); width: 0%; transition: width .4s; box-shadow: 0 0 8px rgba(217,79,99,0.6); }
.kc-val { font-size: 11px; font-family:'Cinzel'; color: var(--muted); width: 40px; text-align: right; }

/* ============ AUDIO PANEL ============ */
.audio-slider-row { display:flex; align-items:center; gap:14px; margin-bottom:14px; }
.audio-slider-row label { width: 140px; font-family:'Cinzel'; font-size:13px; color: var(--text); }
.audio-slider-row input[type=range] { flex:1; accent-color: var(--gold); }
.audio-slider-row .pct { width:46px; text-align:right; font-family:'Cinzel'; color:var(--gold-bright); font-size:13px; }

/* ============ BOSS ENCOUNTER ============ */
.combatface.boss-face { border: 2px solid #e8c170; box-shadow: 0 0 25px rgba(232,193,112,0.45), inset 0 0 20px rgba(232,193,112,0.1); animation: bossPulse 2.4s ease-in-out infinite; }
@keyframes bossPulse { 0%,100%{ box-shadow:0 0 25px rgba(232,193,112,0.45), inset 0 0 20px rgba(232,193,112,0.1);} 50%{ box-shadow:0 0 45px rgba(232,193,112,0.8), inset 0 0 30px rgba(232,193,112,0.2);} }
.boss-tag { display:inline-block; font-family:'Cinzel'; font-size:12px; letter-spacing:2px; color:#e8c170; border:1px solid #e8c170; border-radius:3px; padding:3px 10px; margin-bottom:6px; text-shadow:0 0 8px rgba(232,193,112,0.8); text-transform:uppercase; animation: mythicPulse 2s ease-in-out infinite; }
.combatface.boss-face .fighter:last-child .av { font-size: 72px; }

/* ============ SPECIAL ATTACK FX ============ */
.fighter.special-anim .av { animation: specialAttackAnim .5s ease; }
@keyframes specialAttackAnim {
  0%   { transform: scale(1) rotate(0); filter: brightness(1) drop-shadow(0 0 15px var(--glow)); }
  25%  { transform: scale(1.3) rotate(-10deg); filter: brightness(2.5) drop-shadow(0 0 35px #5fa8e0) saturate(2); }
  50%  { transform: scale(1.15) rotate(8deg); filter: brightness(2) drop-shadow(0 0 30px #5fa8e0); }
  100% { transform: scale(1) rotate(0); filter: brightness(1) drop-shadow(0 0 15px var(--glow)); }
}
.fighter.special-hit .av { animation: specialHitAnim .5s ease; }
@keyframes specialHitAnim {
  0%   { transform: translateX(0) scale(1); filter: brightness(1); }
  10%  { transform: translateX(-14px) scale(0.92); filter: brightness(3) drop-shadow(0 0 30px #5fa8e0) saturate(3) hue-rotate(40deg); }
  35%  { transform: translateX(12px) scale(1.08) rotate(-4deg); filter: brightness(2.2) drop-shadow(0 0 25px #5fa8e0); }
  60%  { transform: translateX(-6px); }
  100% { transform: translateX(0) scale(1); filter: brightness(1); }
}
/* Spell beam effect overlay */
.spellbeam {
  position:absolute; top:50%; left:50%; width:160px; height:14px; margin:-7px 0 0 -80px;
  border-radius:8px; opacity:0; pointer-events:none; z-index:17;
  transform: rotate(-35deg) scaleX(0); transform-origin:left center;
  background: linear-gradient(90deg, transparent, #aef0ff 30%, #5fa8e0 55%, transparent);
  box-shadow: 0 0 20px #5fa8e0, 0 0 40px #5fa8e0;
}
.spellbeam.go { animation: spellBeamAnim .5s ease-out; }
@keyframes spellBeamAnim {
  0%   { opacity:0; transform: rotate(-35deg) scaleX(0); }
  20%  { opacity:1; transform: rotate(-35deg) scaleX(1.1); }
  70%  { opacity:1; transform: rotate(-35deg) scaleX(1.4); }
  100% { opacity:0; transform: rotate(-35deg) scaleX(1.5); }
}
/* Special floating text */
.float.special { color:#aef0ff; font-size:26px; text-shadow:2px 2px 0 #000,-1px -1px 0 #000,0 0 16px #5fa8e0,0 0 30px #5fa8e0; animation: floatupCrit 1.2s ease-out forwards; }

/* ============ PASSIVES (Affinités) ============ */
.passive-card { background: rgba(0,0,0,0.4); border:1px solid var(--line); border-radius:6px; padding:14px; margin-bottom:10px; }
.passive-card .pname { font-family:'Cinzel'; font-weight:700; font-size:15px; }
.passive-card .pdesc { font-size:13px; color: var(--muted); margin:6px 0; }

/* ============ EVENT MODAL ============ */
#eventModal { position:fixed; inset:0; z-index:90; display:none; align-items:center; justify-content:center; background: rgba(0,0,0,0.75); padding:20px; }
#eventModal.show { display:flex; }
#eventModal .ebox { max-width:480px; width:100%; background: var(--bg-parchment); border:2px ridge var(--gold); border-radius:8px; padding:28px; text-align:center; box-shadow:0 0 50px rgba(0,0,0,0.9); animation: fadein .35s ease; }
#eventModal h3 { color: var(--gold-bright); margin-bottom:12px; font-size:20px; text-shadow:0 0 10px var(--glow); }
#eventModal p { color: var(--text); font-size:14px; line-height:1.6; margin-bottom:18px; }
#eventModal .erewards { font-family:'Cinzel'; color: var(--teal-soft); font-size:14px; margin-bottom:14px; }

/* ============ NAZGUL TRANSFORMATION ============ */
body.nazgul #gametitle::before { content: '☠ '; }
body.nazgul .fighter .av { filter: drop-shadow(0 0 18px var(--danger)) !important; }
@keyframes nazgulShift { from{ filter: saturate(1) brightness(1); } to { filter: saturate(0.3) brightness(0.85) sepia(0.4) hue-rotate(-20deg); } }
body.nazgul #app { animation: nazgulShift 2.5s ease forwards; }
body.nazgul .cinzel, body.nazgul h1, body.nazgul h2, body.nazgul h3 { text-shadow: 0 0 12px rgba(200,40,40,0.6); }
</style>

function setBuyMode(mode) {
  buyAmount = mode;
  AudioEngine.playClick();
  document.getElementById('buyCustomInput').value = '';
  document.querySelectorAll('.buy-mode-btn').forEach(b => {
    b.classList.toggle('active', parseInt(b.dataset.mode) === mode);
  });
  let active = $('.tabbtn.active');
  if(active) refreshTab(active.dataset.id);
}

/* ---- FORGE D'ENCHANTEMENTS (dépense de l'Or) ---- */
// Boost la puissance d'un objet équipé avec de l'Or
function getForgeUpgradeCost(slotId) {
  let eq = S.equip[slotId];
  if(!eq || eq.tier < 0) return Infinity;
  let basePow = eq.power || 1;
  return Math.floor(50 * Math.pow(1.08, basePow * 0.5) * (eq.tier + 1) * 30);
}
window.forgeItem = function(slotId) {
  let eq = S.equip[slotId];
  if(!eq || eq.tier < 0) return;
  let cost = getForgeUpgradeCost(slotId);
  if(S.gold < cost) { toast('⚒ Pas assez d\'Or pour forger !'); return; }
  S.gold -= cost;
  let gain = Math.ceil(eq.power * 0.12 + (eq.tier+1) * 2 + S.stage * 0.5);
  eq.power += gain;
  S.maxHp = getMaxHp();
  AudioEngine.playDrop(eq.tier);
  toast(`⚒ Forgé ! "${eq.name}" +${gain} puissance !`);
  refreshTab('equipment'); renderTop(); save();
};

// Temporary buffs system
let activeBuffs = {};
function activateBuff(id, duration) {
  activeBuffs[id] = (activeBuffs[id]||0) + duration;
}
function getBuffMult(key) {
  let m = 1;
  if(key==='gold' && activeBuffs['goldx3'] > 0) m *= 3;
  if(key==='dmg'  && activeBuffs['dmgx15'] > 0) m *= 1.5;
  return m;
}
// Tick buffs down
function tickBuffs(dt) {
  Object.keys(activeBuffs).forEach(k=>{
    activeBuffs[k] -= dt;
    if(activeBuffs[k] <= 0) { delete activeBuffs[k]; }
  });
}

/* ---------- STATE ---------- */
let S = null;
function defaultState() {
  return {
    created:false, name:'Héros', race:'man', cls:'warrior', playstyle:0,
    level:1, xp:0,
    stats:{force:10,agility:10,wisdom:10,courage:10},
    hp:100, maxHp:100,
    gold:0, essence:0, glory:0, legacy:0,
    corruption:0, karma:0,
    stage:1, regionIdx:0, enemyIdx:0, kills:0,
    enemyHp:10, enemyMaxHp:10,
    income:{}, upgrades:{},
    equip:{}, legacyNodes:{},
    rebirthCount:0, highestLevel:1,
    passives:[], // {tier, name, eff, v, v2, v3}
    isBoss:false, isNazgul:false,
    musicVol:0.32, sfxVol:0.8,
    totalDmgDealt:0, totalGoldEarned:0, totalKills:0, eventsCount:0,
    combo:0, maxCombo:0, koCooldown:0,
    lastSave:Date.now()
  };
}
function initFresh() {
  S = defaultState();
  INCOME.forEach(i => S.income[i.id]=0);
  UPGRADES.forEach(u => S.upgrades[u.id]=0);
  EQUIP_SLOTS.forEach(e => S.equip[e.id]={tier:-1, power:0, name:'Aucun équipement'});
  LEGACY_TREE.forEach(l => S.legacyNodes[l.id]=0);
  S.combo=0; S.maxCombo=0;
}

/* ---------- SAVE / LOAD ---------- */
const SAVE_KEY = 'lotr_idle_save_v3';
function save() { try{ S.lastSave=Date.now(); localStorage.setItem(SAVE_KEY,JSON.stringify(S)); }catch(e){} }
function load() {
  try {
    let str = localStorage.getItem(SAVE_KEY);
    if(!str) return false;
    let d = JSON.parse(str);
    if(!d || !d.created) return false;
    S = Object.assign(defaultState(), d);
    INCOME.forEach(i=>{if(S.income[i.id]==null)S.income[i.id]=0});
    UPGRADES.forEach(u=>{if(S.upgrades[u.id]==null)S.upgrades[u.id]=0});
    EQUIP_SLOTS.forEach(e=>{if(!S.equip[e.id])S.equip[e.id]={tier:-1,power:0,name:'Aucun équipement'}});
    LEGACY_TREE.forEach(l=>{if(S.legacyNodes[l.id]==null)S.legacyNodes[l.id]=0});
    if(S.rebirthCount==null)S.rebirthCount=0;
    if(S.highestLevel==null)S.highestLevel=S.level;
    if(S.passives==null)S.passives=[];
    if(S.isBoss==null)S.isBoss=false;
    if(S.isNazgul==null)S.isNazgul=false;
    if(S.musicVol==null)S.musicVol=0.32;
    if(S.sfxVol==null)S.sfxVol=0.8;
    if(S.totalDmgDealt==null)S.totalDmgDealt=0;
    if(S.totalGoldEarned==null)S.totalGoldEarned=0;
    if(S.totalKills==null)S.totalKills=S.kills||0;
    if(S.eventsCount==null)S.eventsCount=0;
    if(S.combo==null)S.combo=0;
    if(S.maxCombo==null)S.maxCombo=0;
    if(S.koCooldown==null)S.koCooldown=0;
    // Add missing legacy nodes
    LEGACY_TREE.forEach(l=>{if(S.legacyNodes[l.id]==null)S.legacyNodes[l.id]=0;});
    return true;
  } catch(e) { return false; }
}

/* ---------- UTILS ---------- */
const $ = s => document.querySelector(s);
const ce = (t,c) => { const e=document.createElement(t); if(c)e.className=c; return e; };
function fmt(n) {
  if(n < 1000) return Math.floor(n).toString();
  const suf = ['','K','M','B','T','Qa','Qi'];
  let t = Math.floor(Math.log10(n)/3);
  if(t < suf.length) return (n/Math.pow(10,t*3)).toFixed(2)+suf[t];
  return n.toExponential(2);
}
function xpNeeded(lv) { return Math.floor(100*Math.pow(1.25,lv-1)); }

/* Cost math — geometric series formula O(1) */
function getCost(base, g, currentLvl, amount) {
  if(amount <= 0) return 0;
  if(g === 1) return base * amount;
  // Sum of geometric series: base*g^lvl + ... + base*g^(lvl+n-1) = base*g^lvl*(g^n-1)/(g-1)
  return base * Math.pow(g, currentLvl) * (Math.pow(g, amount) - 1) / (g - 1);
}
function getMaxAffordable(base, g, currentLvl, resource) {
  if(resource <= 0) return {count:0, cost:0};
  // Binary search — O(log n) instead of O(n)
  let lo=0, hi=5000;
  while(lo < hi) {
    let mid = Math.floor((lo + hi + 1) / 2);
    if(getCost(base, g, currentLvl, mid) <= resource) lo = mid;
    else hi = mid - 1;
  }
  return {count: lo, cost: lo > 0 ? getCost(base, g, currentLvl, lo) : 0};
}

/* ---------- COMPUTED STATS ---------- */
function upSum(eff) { let f=1; UPGRADES.forEach(u=>{if(u.eff===eff)f+=u.v*(S.upgrades[u.id]||0);}); return f; }
function upStat(stat) { let s=0; UPGRADES.forEach(u=>{if(u.eff==='stat'&&u.stat===stat)s+=u.v*(S.upgrades[u.id]||0)}); return s; }
function legLvl(id) { return S.legacyNodes[id]||0; }

/* ---- PASSIVE EFFECT AGGREGATION ---- */
function passiveSum(...effs) {
  let total = 0;
  S.passives.forEach(p => {
    effs.forEach((eff, i) => {
      if(i===0 && p.eff===eff) total += p.v;
      // composite effects map v2/v3 to second/third listed eff name
    });
    // handle composite effect keys (eff_eff2 style) by checking each sub-key
    let parts = p.eff.split('_');
    parts.forEach((part, idx) => {
      effs.forEach(eff => {
        if(part===eff && parts.length>1) {
          let val = idx===0 ? p.v : (idx===1 ? p.v2 : p.v3);
          if(val) total += val;
        }
      });
    });
    if(p.eff==='all') effs.forEach(eff=>{ if(['dmg','hp','gold','xp','ess','atk','drop','regen'].includes(eff)) total += p.v; });
  });
  return total;
}
function getMult(key) {
  let m=1;
  if(key==='gold') m *= RACES[S.race].goldMult * upSum('gold') * (1+0.20*legLvl('l_gold'));
  if(key==='xp')   m *= RACES[S.race].xpMult * upSum('xp') * (1+0.30*legLvl('l_xp'));
  if(key==='glory') m *= RACES[S.race].gloryMult;
  if(key==='ess')  m *= upSum('ess') * (1+0.15*legLvl('l_ess'));
  if(key==='idle') m *= RACES[S.race].idleMult;
  if(key==='atk')  m *= (1+0.08*legLvl('l_speed'));
  if(key==='regen') m *= (1+0.20*legLvl('l_regen'));
  m *= RACES[S.race].allMult * upSum('all');
  if(key==='drop') m *= (RACES[S.race].dropMult||1) * (1+0.10*legLvl('l_drop'));
  if(['dmg','hp','gold','xp','ess','atk','drop','regen'].includes(key)) {
    m *= (1 + passiveSum(key));
  }
  if(S.isNazgul) {
    if(key==='dmg') m *= 2.5;
    if(key==='gold') m *= 0.6;
    if(key==='xp') m *= 0.6;
  }
  if(key==='dmg' && S.combo > 0) m *= (1 + Math.min(S.combo, 50) * 0.02);
  // Temp buffs
  m *= getBuffMult(key);
  return m;
}
function getStat(stat) {
  let v = 10 + legLvl('l_stats')*10 + upStat(stat);
  if(CLASSES[S.cls].primary === stat) v *= CLASSES[S.cls].mult;
  return Math.floor(v);
}
function getDmg() {
  let dmg = getStat(CLASSES[S.cls].primary) * 2;
  dmg *= upSum('dmg') * (1+0.25*legLvl('l_dmg')) * getMult('dmg');
  let wp = S.equip.weapon;
  if(wp.tier >= 0) dmg *= (1 + wp.power * 0.05);
  return Math.floor(dmg);
}
function getMaxHp() {
  let hp = 100 + getStat('courage')*10;
  hp *= upSum('hp') * getMult('hp');
  let ar = S.equip.armor;
  if(ar.tier >= 0) hp *= (1 + ar.power * 0.05);
  if(S.isNazgul) hp *= 1.5;
  return Math.floor(hp);
}
function getAtkSpeed() {
  let spd = CLASSES[S.cls].atkSpeed * upSum('atk') * getMult('atk');
  let bo = S.equip.boots;
  if(bo.tier >= 0) spd *= (1 + bo.power * 0.02);
  return spd;
}
function getHpRegenMult() {
  return CLASSES[S.cls].hpRegen * getMult('regen');
}
function getIdleIncome() {
  let inc=0;
  INCOME.forEach(i => inc += (S.income[i.id]||0) * i.yield);
  return inc * getMult('idle') * getMult('gold');
}

/* ---------- COMBAT & DROPS ---------- */
function enemyMaxHp() {
  let base = Math.floor(15 * Math.pow(1.18, S.stage-1));
  if(S.isBoss) {
    let boss = BOSSES[Math.floor((S.stage/10 - 1)) % BOSSES.length];
    base = Math.floor(base * boss.hpMult);
  }
  return base;
}
function spawnEnemy() {
  S.isBoss = (S.stage % 10 === 0);
  S.enemyMaxHp = enemyMaxHp();
  S.enemyHp = S.enemyMaxHp;
  if(S.isBoss) {
    S.enemyIdx = -1; // marker for boss
  } else {
    S.enemyIdx = Math.floor(Math.random() * ENEMIES.length);
  }
  renderCombatFace();
}
function currentEnemy() {
  if(S.isBoss) {
    let idx = Math.floor((S.stage/10 - 1)) % BOSSES.length;
    return BOSSES[idx];
  }
  return ENEMIES[S.enemyIdx];
}
function heroAttack() {
  let dmg = getDmg();
  let crit = Math.random() < 0.15;
  let special = Math.random() < (0.06 + passiveSum('special')*0.5);
  if(crit) dmg = Math.floor(dmg * 1.5);
  if(special) {
    let specialMult = 2 + passiveSum('special')*1.5;
    dmg = Math.floor(dmg * specialMult);
  }
  S.enemyHp -= dmg;
  S.totalDmgDealt = (S.totalDmgDealt||0) + dmg;
  floatText(fmt(dmg), crit, special);
  playAttackAnim(crit, special);
  if(special) { AudioEngine.playSpecial(); } else { AudioEngine.playSwing(); AudioEngine.playHit(crit); }

  // --- ENEMY COUNTERATTACK ---
  if(S.enemyHp > 0) {
    let eDmgBase = Math.floor(8 * Math.pow(1.12, S.stage-1) * (S.isBoss ? (currentEnemy().dmgMult||1.4) : 1));
    // Hero armor reduces damage
    let ar = S.equip.armor;
    let armorReduce = ar.tier >= 0 ? Math.max(0.1, 1 - ar.power * 0.003) : 1;
    let eDmg = Math.max(1, Math.floor(eDmgBase * armorReduce));
    S.hp = Math.max(0, S.hp - eDmg);
    // Flash hero HP bar red briefly
    let hHpBar = document.getElementById('hHpBar');
    if(hHpBar) {
      hHpBar.parentElement.style.boxShadow='0 0 10px rgba(178,34,34,0.9)';
      setTimeout(()=>{ if(hHpBar) hHpBar.parentElement.style.boxShadow=''; }, 250);
    }
    // Hero death — 10s KO cooldown
    if(S.hp <= 0) {
      S.hp = 0; S.combo = 0; S.koCooldown = 10;
      renderBars();
      let heroFace = document.querySelector('#panel-combat .fighter:first-child');
      if(heroFace) { heroFace.classList.add('death-anim'); }
      toast('💀 Tu es tombé au combat ! K.O. — 10 secondes...');
      // Countdown handled in tick
      return;
    }
  }

  if(S.enemyHp <= 0) enemyDie(); else renderBars();
}

/* ---- COMBAT VISUAL FX ---- */
function playAttackAnim(crit, special) {
  let face = $('#panel-combat .combatface');
  if(!face) return;
  let heroF  = face.querySelector('.fighter:first-child');
  let enemyF = face.querySelector('.fighter:last-child');
  if(heroF) {
    heroF.classList.remove('attack-anim','special-anim');
    void heroF.offsetWidth;
    heroF.classList.add(special ? 'special-anim' : 'attack-anim');
  }
  if(enemyF) {
    let cls = special ? 'special-hit' : (crit ? 'crit-shake' : 'hit-shake');
    enemyF.classList.remove('hit-shake','crit-shake','special-hit');
    void enemyF.offsetWidth; enemyF.classList.add(cls);
  }
  if(special) {
    let beam = face.querySelector('.spellbeam');
    if(beam) { beam.classList.remove('go'); void beam.offsetWidth; beam.classList.add('go'); }
  } else {
    let slash = face.querySelector('.slash');
    if(slash) {
      slash.classList.remove('go','crit'); void slash.offsetWidth;
      if(crit) slash.classList.add('crit');
      slash.classList.add('go');
    }
  }
  if(crit || special) {
    let app = $('#app');
    app.classList.remove('screen-shake'); void app.offsetWidth; app.classList.add('screen-shake');
  }
}

/* ---- RICH DROP SYSTEM ---- */
function rollDrop(forceRoll) {
  let dropChance = 0.06 * getMult('drop');
  if(!forceRoll && Math.random() > dropChance) return;

  let slotObj = EQUIP_SLOTS[Math.floor(Math.random() * EQUIP_SLOTS.length)];
  let slot = slotObj.id;

  // Weighted rarity roll — scales slightly with stage
  let r = Math.random();
  let stageBias = Math.min(S.stage / 500, 0.1); // up to +10% better tier at stage 500
  if(S.isBoss) stageBias += 0.08; // bosses drop better loot
  let tier = 0;
  if(r > 0.99  - stageBias) tier = 5;      // Mythic
  else if(r > 0.93 - stageBias) tier = 4;  // Legendary
  else if(r > 0.78 - stageBias) tier = 3;  // Epic
  else if(r > 0.52 - stageBias) tier = 2;  // Rare
  else if(r > 0.22 - stageBias) tier = 1;  // Uncommon
  else tier = 0;                            // Common

  let power = Math.floor(S.stage * EQUIP_MULT[tier] * (0.8 + Math.random()*0.4));
  if(power <= 0) power = 1;

  // Pick a unique name
  let tierKey = EQUIP_TIER_KEYS[tier];
  let namePool = ITEM_NAMES[slot][tierKey];
  let itemName = namePool[Math.floor(Math.random()*namePool.length)];

  if(power > (S.equip[slot].power || 0)) {
    let old = S.equip[slot];
    S.equip[slot] = {tier, power, name:itemName};
    logDrop(`⚔ Équipé : "${itemName}" [${EQUIP_TIERS[tier]}] · Puissance ${fmt(power)}`, tier);
    AudioEngine.playDrop(tier);
    if(tier >= 4) toastDrop(`✨ ${EQUIP_TIERS[tier]} obtenu : "${itemName}" !`, tier);
    S.maxHp = getMaxHp();
    refreshTab('equipment');
  } else {
    let scrap = power * 10 * getMult('gold');
    S.gold += scrap;
    logDrop(`↩ Recyclé : "${itemName}" [${EQUIP_TIERS[tier]}] → ${fmt(scrap)} Or`, tier);
    AudioEngine.playCoin();
  }
}

function logDrop(msg, tier) {
  let p = $('#droplog');
  if(!p) return;
  let d = ce('div');
  d.innerText = msg;
  d.style.color = getTierColor(tier);
  if(tier >= 4) d.style.fontWeight = 'bold';
  p.prepend(d);
  if(p.children.length > 10) p.removeChild(p.lastChild);
}
function toastDrop(msg, tier) {
  let t = ce('div', tier >= 5 ? 'toast legendary-drop' : 'toast drop');
  t.innerText = msg;
  $('#toasts').appendChild(t);
  setTimeout(()=>t.remove(), 4500);
  if(tier >= 4) {
    let burst = ce('div', 'legendary-burst go' + (tier >= 5 ? ' mythic' : ''));
    document.body.appendChild(burst);
    setTimeout(()=>burst.remove(), 1300);
  }
}
function getTierColor(t) {
  const c=['#b9c2d0','#6fd17a','#5fa8e0','#b06fe0','#e8c170','#ff6b88'];
  return c[t] ?? c[0];
}

function enemyDie() {
  S.kills++;
  S.totalKills = (S.totalKills||0)+1;
  S.combo = (S.combo||0) + 1;
  if(S.combo > (S.maxCombo||0)) S.maxCombo = S.combo;
  let goldGain = (S.isBoss ? 25 : 5) * S.stage * getMult('gold');
  S.gold += goldGain;
  S.totalGoldEarned = (S.totalGoldEarned||0) + goldGain;
  let helmetBonus = S.equip.helmet.tier >= 0 ? (1 + S.equip.helmet.power * 0.01) : 1;
  S.xp += (S.isBoss ? 100 : 20) * Math.pow(1.12, S.stage-1) * getMult('xp') * helmetBonus;
  S.essence += Math.random() < 0.55 ? S.stage * getMult('ess') * (S.isBoss?4:1) : 0;
  // Passive corruption drain on kills (slow purification)
  if(S.corruption > 0 && S.karma >= 0) {
    S.corruption = Math.max(0, S.corruption - 0.08);
  }
  if(S.isBoss) {
    S.glory += Math.ceil(S.stage/5);
    rollDrop(true);
    toast(`👑 ${currentEnemy().n} vaincu ! Récompenses de boss obtenues.`);
  }
  AudioEngine.playEnemyDeath();
  AudioEngine.playCoin();
  rollDrop();
  while(S.xp >= xpNeeded(S.level)) levelUp();
  if(S.kills % 10 === 0) advanceStage();
  if(!S.isBoss && Math.random() < EVENT_CHANCE * (RACES[S.race].posEvent||1)) {
    triggerRandomEvent();
  }
  // Show combo if > 2
  if(S.combo > 2) {
    let f = document.createElement('div');
    f.className='float'; f.style.color='#f9df8a'; f.style.fontSize='16px';
    f.style.left='60vw'; f.style.top='45vh';
    f.innerText=`COMBO ×${S.combo}!`;
    document.body.appendChild(f);
    setTimeout(()=>f.remove(), 1000);
  }
  triggerEnemyDeathThenSpawn();
  renderTop();
  renderKarmaCorruption();
}
function triggerEnemyDeathThenSpawn() {
  let face = $('#panel-combat .combatface');
  let enemyF = face ? face.querySelector('.fighter:last-child') : null;
  if(enemyF) {
    enemyF.classList.remove('hit-shake','crit-shake','special-hit');
    enemyF.classList.add('death-anim');
    setTimeout(()=>{
      spawnEnemy();
      let nf = $('#panel-combat .combatface .fighter:last-child');
      if(nf) { nf.classList.remove('death-anim'); void nf.offsetWidth; nf.classList.add('spawn-anim'); }
    }, 300);
  } else {
    spawnEnemy();
  }
}
function advanceStage() {
  S.stage++;
  S.combo = 0;
  let newRegion = Math.min(REGIONS.length-1, Math.floor(S.stage/10));
  if(newRegion !== S.regionIdx) {
    S.regionIdx = newRegion;
    applyRegionTheme(S.regionIdx);
    toast(`🗺 Nouvelle région : ${REGIONS[S.regionIdx].n} !`);
  } else {
    S.regionIdx = newRegion;
  }
}

const REGION_CLASSES = ['region-comté','region-vieuxbois','region-fondcombe','region-moria','region-lorien','region-rohan','region-gondor','region-mordor','region-destin'];
const REGION_PARTICLE_COLORS = ['#7dc44a','#5a9e30','#90d4f8','#f0a040','#f0dc80','#f0c040','#d0e0f8','#e86030','#ff6820'];
const REGION_LABELS = ['☘ La Comté','🌲 Le Vieux Bois','🌊 Fondcombe','⛏ La Moria','✨ Lothlórien','🐎 Rohan','🏰 Gondor','🌋 Le Mordor','🔥 La Montagne du Destin'];

function applyRegionTheme(regionIdx) {
  if(S.isNazgul) return; // Nazgul mode always overrides
  // Remove all region classes
  REGION_CLASSES.forEach(c => document.body.classList.remove(c));
  if(regionIdx >= 0 && regionIdx < REGION_CLASSES.length) {
    document.body.classList.add(REGION_CLASSES[regionIdx]);
  }
  // Update music
  AudioEngine.setRegionMode(regionIdx);
  // Update particles
  updateParticleColor(REGION_PARTICLE_COLORS[regionIdx] || '#d4af37');
  // Update gametitle
  let gt = $('#gametitle');
  if(gt) gt.innerText = '⚔ ' + (REGION_LABELS[regionIdx] || 'L\'Ascension de l\'Ombre');
}
function levelUp() {
  S.xp -= xpNeeded(S.level);
  S.level++;
  if(S.level > (S.highestLevel||1)) S.highestLevel = S.level;
  S.maxHp = getMaxHp();
  S.hp = S.maxHp;
  toast('Niveau ' + S.level + ' atteint !');
  AudioEngine.playLevelUp();
  showLevelUpFx(S.level);
  renderHero();
}
function showLevelUpFx(lvl) {
  let burst = ce('div','levelup-burst go');
  document.body.appendChild(burst);
  setTimeout(()=>burst.remove(), 1050);
  let banner = ce('div','levelup-banner go');
  banner.innerText = `✦ NIVEAU ${lvl} ✦`;
  document.body.appendChild(banner);
  setTimeout(()=>banner.remove(), 1850);
}

/* ---------- LEGACY FORMULA ---------- */
function calcLegacyPoints(lvl) {
  if(lvl < 50) return 0;
  // Base formula: 1pt at 50, then grows exponentially
  let pts = Math.floor(Math.pow((lvl - 49) / 1, 1.4));
  // Milestone bonuses
  LEGACY_MILESTONES.forEach(m => { if(lvl >= m.lvl) pts = Math.max(pts, m.pts); });
  return pts;
}

/* ---------- REBIRTH ---------- */
window.rebirth = function() {
  if(S.level < 50) return;
  let pts = calcLegacyPoints(S.level);
  if(!confirm(`Renaître ? Tu perdras tout sauf ton Héritage.\nTu gagneras ${fmt(pts)} 🜲 (Niveau actuel: ${S.level}).`)) return;
  let leg = S.legacy + pts;
  let legNodes = Object.assign({}, S.legacyNodes);
  let rc = (S.rebirthCount||0) + 1;
  let hl = S.highestLevel || S.level;
  initFresh();
  S.legacy = leg;
  S.legacyNodes = legNodes;
  S.rebirthCount = rc;
  S.highestLevel = hl;
  S.created = true;
  save();
  AudioEngine.playRebirth();
  setTimeout(()=>window.location.reload(), 450);
};

/* ---------- UI UTILS ---------- */
function floatText(txt, crit, special) {
  let cls = special ? 'special' : (crit ? 'crit' : '');
  let f = ce('div','float'+(cls?' '+cls:'')); f.innerText = special ? txt+'✦' : (crit ? txt+'!' : txt);
  f.style.left = (Math.random()*20+40)+'vw';
  f.style.top  = (Math.random()*20+30)+'vh';
  document.body.appendChild(f);
  setTimeout(()=>f.remove(), 1200);
}
function toast(msg) {
  let t = ce('div','toast'); t.innerText = msg;
  $('#toasts').appendChild(t);
  setTimeout(()=>t.remove(), 3500);
}

/* =============================================================
   AUDIO ENGINE — Effets sonores synthétisés + Musique épique
   générative façon "Hans Zimmer" (drones, cuivres, percussions,
   ostinatos de cordes), 100% Web Audio API, sans fichiers externes.
   ============================================================= */
const AudioEngine = (() => {
  let ctx = null, masterGain, musicGain, sfxGain, reverb;
  let musicMuted = false, sfxMuted = false;
  let musicVolume = 0.32, sfxVolume = 0.8;
  let nazgulMode = false, regionMode = 0;
  let musicRunning = false;
  let schedTimer = null, nextNoteTime = 0, beatCount = 0;
  const BPM = 64;
  const beatLen = 60 / BPM;
  // Progression épique en Ré mineur : i - VI - III - VII (Dm - Bb - F - C)
  const CHORDS = [
    [73.42, 110.00, 146.83, 220.00],  // D2 A2 D3 A3  (Dm)
    [58.27, 87.31, 116.54, 174.61],   // Bb1 F2 Bb2 F3 (Bb)
    [87.31, 130.81, 174.61, 261.63],  // F2 C3 F3 C4  (F)

  ];
  // Progression sombre Nazgûl : ambiance dissonante, registre grave, demi-tons
  const NAZGUL_CHORDS = [
    [69.30, 103.83, 138.59, 207.65],
    [61.74, 92.50, 123.47, 184.99],
    [58.27, 87.31, 110.00, 174.61],
    [55.00, 82.41, 116.54, 164.81],
  ];
  // Region chord sets — each region has its own musical mood
  const REGION_CHORDS = [
    // 0 La Comté — Sol majeur, léger et pastoral
    [[98.00,130.81,196.00,261.63],[110.00,146.83,220.00,293.66],[87.31,116.54,174.61,233.08],[73.42,98.00,146.83,196.00]],
    // 1 Le Vieux Bois — Mi mineur mystérieux
    [[82.41,123.47,164.81,246.94],[77.78,116.54,155.56,233.08],[73.42,110.00,146.83,220.00],[65.41,98.00,130.81,196.00]],
    // 2 Fondcombe — La majeur, elfique et aérien
    [[110.00,164.81,220.00,329.63],[123.47,185.00,246.94,369.99],[98.00,146.83,196.00,293.66],[87.31,130.81,174.61,261.63]],
    // 3 La Moria — Ré mineur sombre, percussions lourdes
    [[73.42,110.00,146.83,220.00],[61.74,92.50,123.47,185.00],[58.27,87.31,116.54,174.61],[69.30,103.83,138.59,207.65]],
    // 4 Lothlórien — Si bémol majeur, lumineux et magique
    [[116.54,146.83,196.00,233.08],[103.83,130.81,174.61,207.65],[87.31,110.00,146.83,174.61],[98.00,123.47,164.81,196.00]],
    // 5 Rohan — Sol mixolydien, épique guerrier
    [[98.00,146.83,196.00,246.94],[87.31,130.81,174.61,220.00],[73.42,110.00,146.83,185.00],[65.41,98.00,130.81,164.81]],
    // 6 Gondor — Ut majeur, noble et martial
    [[130.81,196.00,261.63,329.63],[146.83,220.00,293.66,370.00],[110.00,164.81,220.00,277.18],[98.00,146.83,196.00,261.63]],
    // 7 Le Mordor — La mineur grave et menaçant
    [[55.00,82.41,110.00,164.81],[58.27,87.31,116.54,174.61],[51.91,77.78,103.83,155.56],[61.74,92.50,123.47,185.00]],
    // 8 Montagne du Destin — Cluster dissonant, chaos volcanique
    [[55.00,69.30,82.41,103.83],[61.74,77.78,92.50,116.54],[58.27,73.42,87.31,110.00],[51.91,65.41,82.41,103.83]],
  ];
  const REGION_BPM = [52, 56, 68, 58, 64, 72, 70, 60, 76]; // each region slightly different tempo

  function ensureCtx() {
    if(!ctx) {
      ctx = new (window.AudioContext || window.webkitAudioContext)();
      masterGain = ctx.createGain(); masterGain.gain.value = 1;
      musicGain  = ctx.createGain(); musicGain.gain.value = musicMuted ? 0 : musicVolume;
      sfxGain    = ctx.createGain(); sfxGain.gain.value = sfxMuted ? 0 : sfxVolume;
      reverb = createReverb();
      musicGain.connect(reverb);
      sfxGain.connect(reverb);
      sfxGain.connect(masterGain);
      reverb.connect(masterGain);
      masterGain.connect(ctx.destination);
    }
    if(ctx.state === 'suspended') ctx.resume();
    return ctx;
  }

  function createReverb() {
    const convolver = ctx.createConvolver();
    const len = Math.floor(ctx.sampleRate * 3);
    const impulse = ctx.createBuffer(2, len, ctx.sampleRate);
    for(let ch=0; ch<2; ch++) {
      const data = impulse.getChannelData(ch);
      for(let i=0;i<len;i++) data[i] = (Math.random()*2-1) * Math.pow(1 - i/len, 2.2);
    }
    convolver.buffer = impulse;
    return convolver;
  }

  function noiseBuffer(duration) {
    const size = Math.floor(ctx.sampleRate * duration);
    const buf = ctx.createBuffer(1, size, ctx.sampleRate);
    const d = buf.getChannelData(0);
    for(let i=0;i<size;i++) d[i] = Math.random()*2-1;
    return buf;
  }
  function noiseSrc(duration) {
    const src = ctx.createBufferSource();
    src.buffer = noiseBuffer(duration);
    return src;
  }

  /* ---------------- SFX ---------------- */
  function playSwing() {
    if(sfxMuted) return; ensureCtx();
    const t = ctx.currentTime;
    const noise = noiseSrc(0.18);
    const filter = ctx.createBiquadFilter();
    filter.type='bandpass'; filter.Q.value=1.6;
    filter.frequency.setValueAtTime(2600, t);
    filter.frequency.exponentialRampToValueAtTime(500, t+0.16);
    const gain = ctx.createGain();
    gain.gain.setValueAtTime(0.5, t);
    gain.gain.exponentialRampToValueAtTime(0.001, t+0.18);
    noise.connect(filter); filter.connect(gain); gain.connect(sfxGain);
    noise.start(t); noise.stop(t+0.18);
  }
  function playHit(crit) {
    if(sfxMuted) return; ensureCtx();
    const t = ctx.currentTime;
    const osc = ctx.createOscillator();
    osc.type='sine';
    osc.frequency.setValueAtTime(crit?190:120, t);
    osc.frequency.exponentialRampToValueAtTime(40, t+0.22);
    const gain = ctx.createGain();
    gain.gain.setValueAtTime(crit?0.85:0.5, t);
    gain.gain.exponentialRampToValueAtTime(0.001, t+0.25);
    osc.connect(gain); gain.connect(sfxGain);
    osc.start(t); osc.stop(t+0.25);
    const noise = noiseSrc(0.08);
    const filter = ctx.createBiquadFilter();
    filter.type='highpass'; filter.frequency.value = crit?1400:2400;
    const ng = ctx.createGain();
    ng.gain.setValueAtTime(crit?0.45:0.22, t);
    ng.gain.exponentialRampToValueAtTime(0.001, t+0.08);
    noise.connect(filter); filter.connect(ng); ng.connect(sfxGain);
    noise.start(t); noise.stop(t+0.08);
    if(crit) {
      const osc2 = ctx.createOscillator();
      osc2.type='triangle'; osc2.frequency.value=880;
      const g2 = ctx.createGain();
      g2.gain.setValueAtTime(0.3, t);
      g2.gain.exponentialRampToValueAtTime(0.001, t+0.45);
      osc2.connect(g2); g2.connect(sfxGain); g2.connect(reverb);
      osc2.start(t); osc2.stop(t+0.45);
    }
  }
  function playEnemyDeath() {
    if(sfxMuted) return; ensureCtx();
    const t = ctx.currentTime;
    const osc = ctx.createOscillator();
    osc.type='sawtooth';
    osc.frequency.setValueAtTime(320, t);
    osc.frequency.exponentialRampToValueAtTime(38, t+0.5);
    const filter = ctx.createBiquadFilter();
    filter.type='lowpass';
    filter.frequency.setValueAtTime(2200, t);
    filter.frequency.exponentialRampToValueAtTime(120, t+0.5);
    const gain = ctx.createGain();
    gain.gain.setValueAtTime(0.4, t);
    gain.gain.exponentialRampToValueAtTime(0.001, t+0.5);
    osc.connect(filter); filter.connect(gain); gain.connect(sfxGain);
    osc.start(t); osc.stop(t+0.5);
    const noise = noiseSrc(0.3);
    const nf = ctx.createBiquadFilter(); nf.type='lowpass'; nf.frequency.value=800;
    const ng = ctx.createGain();
    ng.gain.setValueAtTime(0.3, t);
    ng.gain.exponentialRampToValueAtTime(0.001, t+0.3);
    noise.connect(nf); nf.connect(ng); ng.connect(sfxGain);
    noise.start(t); noise.stop(t+0.3);
  }
  function playLevelUp() {
    if(sfxMuted) return; ensureCtx();
    const t = ctx.currentTime;
    [261.63, 329.63, 392.00, 523.25, 659.25].forEach((f,i) => {
      const start = t + i*0.09;
      const osc = ctx.createOscillator();
      osc.type='triangle'; osc.frequency.value=f;
      const gain = ctx.createGain();
      gain.gain.setValueAtTime(0, start);
      gain.gain.linearRampToValueAtTime(0.35, start+0.02);
      gain.gain.exponentialRampToValueAtTime(0.001, start+0.6);
      osc.connect(gain); gain.connect(sfxGain); gain.connect(reverb);
      osc.start(start); osc.stop(start+0.6);
    });
    const osc2 = ctx.createOscillator();
    osc2.type='sawtooth'; osc2.frequency.value=130.81;
    const f2 = ctx.createBiquadFilter(); f2.type='lowpass';
    f2.frequency.setValueAtTime(200,t);
    f2.frequency.linearRampToValueAtTime(1400, t+0.5);
    const g2 = ctx.createGain();
    g2.gain.setValueAtTime(0,t);
    g2.gain.linearRampToValueAtTime(0.25, t+0.3);
    g2.gain.exponentialRampToValueAtTime(0.001, t+1.2);
    osc2.connect(f2); f2.connect(g2); g2.connect(sfxGain);
    osc2.start(t); osc2.stop(t+1.2);
  }
  function playCoin() {
    if(sfxMuted) return; ensureCtx();
    const t = ctx.currentTime;
    [1318.51, 1567.98].forEach((f,i)=>{
      const start = t+i*0.07;
      const osc = ctx.createOscillator();
      osc.type='square'; osc.frequency.value=f;
      const gain = ctx.createGain();
      gain.gain.setValueAtTime(0.10, start);
      gain.gain.exponentialRampToValueAtTime(0.001, start+0.15);
      osc.connect(gain); gain.connect(sfxGain);
      osc.start(start); osc.stop(start+0.15);
    });
  }
  function playDrop(tier) {
    if(sfxMuted) return; ensureCtx();
    const t = ctx.currentTime;
    const baseFreqs = [392, 440, 523.25, 659.25, 783.99, 1046.50];
    const f = baseFreqs[tier] ?? 392;
    const count = tier >= 4 ? 4 : (tier >= 2 ? 2 : 1);
    for(let i=0;i<count;i++) {
      const start = t + i*0.1;
      const osc = ctx.createOscillator();
      osc.type = tier >= 4 ? 'sawtooth' : 'triangle';
      osc.frequency.value = f * Math.pow(1.5, i);
      const filter = ctx.createBiquadFilter(); filter.type='lowpass'; filter.frequency.value=3000;
      const gain = ctx.createGain();
      gain.gain.setValueAtTime(0.25, start);
      gain.gain.exponentialRampToValueAtTime(0.001, start+0.5);
      osc.connect(filter); filter.connect(gain); gain.connect(sfxGain);
      if(tier >= 3) gain.connect(reverb);
      osc.start(start); osc.stop(start+0.5);
    }
  }
  function playSpecial() {
    if(sfxMuted) return; ensureCtx();
    const t = ctx.currentTime;
    // Magic charge-up shimmer
    [659.25, 880, 1108.73, 1318.51].forEach((f,i)=>{
      const start = t + i*0.04;
      const osc = ctx.createOscillator();
      osc.type='sine'; osc.frequency.setValueAtTime(f*0.5, start);
      osc.frequency.exponentialRampToValueAtTime(f, start+0.15);
      const gain = ctx.createGain();
      gain.gain.setValueAtTime(0, start);
      gain.gain.linearRampToValueAtTime(0.22, start+0.05);
      gain.gain.exponentialRampToValueAtTime(0.001, start+0.4);
      osc.connect(gain); gain.connect(sfxGain); gain.connect(reverb);
      osc.start(start); osc.stop(start+0.4);
    });
    // Impact burst
    const osc = ctx.createOscillator();
    osc.type='sawtooth';
    osc.frequency.setValueAtTime(220, t+0.15);
    osc.frequency.exponentialRampToValueAtTime(50, t+0.5);
    const filter = ctx.createBiquadFilter();
    filter.type='lowpass'; filter.frequency.setValueAtTime(2600, t+0.15);
    filter.frequency.exponentialRampToValueAtTime(200, t+0.5);
    const gain = ctx.createGain();
    gain.gain.setValueAtTime(0.5, t+0.15);
    gain.gain.exponentialRampToValueAtTime(0.001, t+0.55);
    osc.connect(filter); filter.connect(gain); gain.connect(sfxGain); gain.connect(reverb);
    osc.start(t+0.15); osc.stop(t+0.55);
  }
  function playClick() {
    if(sfxMuted) return; ensureCtx();
    const t = ctx.currentTime;
    const osc = ctx.createOscillator();
    osc.type='square'; osc.frequency.value=800;
    const gain = ctx.createGain();
    gain.gain.setValueAtTime(0.06, t);
    gain.gain.exponentialRampToValueAtTime(0.001, t+0.05);
    osc.connect(gain); gain.connect(sfxGain);
    osc.start(t); osc.stop(t+0.05);
  }
  function playRebirth() {
    if(sfxMuted) return; ensureCtx();
    const t = ctx.currentTime;
    playPercussion(t, true, sfxGain);
    [146.83, 174.61, 220.00, 293.66].forEach(f=>{
      const osc = ctx.createOscillator();
      osc.type='sawtooth'; osc.frequency.value=f;
      const filter = ctx.createBiquadFilter(); filter.type='lowpass';
      filter.frequency.setValueAtTime(200,t);
      filter.frequency.linearRampToValueAtTime(2000, t+1.5);
      const gain = ctx.createGain();
      gain.gain.setValueAtTime(0,t);
      gain.gain.linearRampToValueAtTime(0.18, t+0.8);
      gain.gain.exponentialRampToValueAtTime(0.001, t+3);
      osc.connect(filter); filter.connect(gain); gain.connect(sfxGain); gain.connect(reverb);
      osc.start(t); osc.stop(t+3);
    });
    [523.25,659.25,783.99,1046.50,1318.51].forEach((f,i)=>{
      const start = t+0.3+i*0.12;
      const osc = ctx.createOscillator();
      osc.type='triangle'; osc.frequency.value=f;
      const gain = ctx.createGain();
      gain.gain.setValueAtTime(0, start);
      gain.gain.linearRampToValueAtTime(0.25, start+0.02);
      gain.gain.exponentialRampToValueAtTime(0.001, start+1);
      osc.connect(gain); gain.connect(sfxGain); gain.connect(reverb);
      osc.start(start); osc.stop(start+1);
    });
  }

  /* ---------------- MUSIQUE GÉNÉRATIVE ÉPIQUE ---------------- */
  function playPercussion(time, big, bus) {
    const osc = ctx.createOscillator();
    osc.type='sine';
    osc.frequency.setValueAtTime(big?58:78, time);
    osc.frequency.exponentialRampToValueAtTime(28, time + (big?0.9:0.3));
    const gain = ctx.createGain();
    gain.gain.setValueAtTime(big?0.55:0.18, time);
    gain.gain.exponentialRampToValueAtTime(0.001, time+(big?1.3:0.4));
    osc.connect(gain); gain.connect(bus);
    osc.start(time); osc.stop(time+(big?1.3:0.4));
    const noise = noiseSrc(big?0.6:0.2);
    const filter = ctx.createBiquadFilter(); filter.type='lowpass';
    filter.frequency.value = big?900:600;
    const ng = ctx.createGain();
    ng.gain.setValueAtTime(big?0.3:0.08, time);
    ng.gain.exponentialRampToValueAtTime(0.001, time+(big?0.6:0.2));
    noise.connect(filter); filter.connect(ng); ng.connect(bus); ng.connect(reverb);
    noise.start(time); noise.stop(time+(big?0.6:0.2));
  }
  function playBrassSwell(chord, time, duration) {
    chord.forEach((f, idx) => {
      const osc = ctx.createOscillator();
      osc.type='sawtooth';
      osc.frequency.value = f;
      osc.detune.value = (idx%2===0? -4:4);
      const filter = ctx.createBiquadFilter();
      filter.type='lowpass';
      filter.Q.value = 1.2;
      filter.frequency.setValueAtTime(180, time);
      filter.frequency.linearRampToValueAtTime(900 - idx*100, time + duration*0.45);
      filter.frequency.linearRampToValueAtTime(180, time + duration);
      const gain = ctx.createGain();
      const vol = idx===0 ? 0.16 : 0.09;
      gain.gain.setValueAtTime(0, time);
      gain.gain.linearRampToValueAtTime(vol, time + duration*0.35);
      gain.gain.setValueAtTime(vol, time + duration*0.6);
      gain.gain.linearRampToValueAtTime(0, time + duration);
      osc.connect(filter); filter.connect(gain); gain.connect(musicGain);
      osc.start(time); osc.stop(time + duration + 0.05);
    });
  }
  function playOstinato(freq, time, vol) {
    vol = vol || 0.10;
    const osc = ctx.createOscillator();
    osc.type='triangle';
    osc.frequency.value = freq * (1 + (Math.random()-0.5)*0.002);
    const gain = ctx.createGain();
    gain.gain.setValueAtTime(0.001, time);
    gain.gain.linearRampToValueAtTime(vol, time+0.03);
    gain.gain.exponentialRampToValueAtTime(0.0008, time + beatLen*0.9);
    osc.connect(gain); gain.connect(musicGain); gain.connect(reverb);
    osc.start(time); osc.stop(time + beatLen);
  }

  function scheduleBeat(beat, time) {
    const cycle = 8;
    let chordSet;
    if(nazgulMode) chordSet = NAZGUL_CHORDS;
    else if(regionMode >= 0 && regionMode < REGION_CHORDS.length) chordSet = REGION_CHORDS[regionMode];
    else chordSet = CHORDS;
    const chordIdx = Math.floor(beat / cycle) % chordSet.length;
    const chord = chordSet[chordIdx];
    const pos = beat % cycle;
    // Dynamic beat length based on region BPM
    let rBpm = nazgulMode ? 58 : (REGION_BPM[regionMode] || 64);
    let rBeatLen = 60 / rBpm;
    if(pos === 0) playBrassSwell(chord, time, rBeatLen*cycle);
    if(pos === 0) playPercussion(time, true, musicGain);
    if(pos === 4) playPercussion(time, false, musicGain);
    // Reduce ostinato in peaceful regions (Comté, Fondcombe, Lorien)
    let ostiVol = [0,1].includes(regionMode) ? 0.06 : [2,4].includes(regionMode) ? 0.12 : 0.10;
    const top = chord[chord.length-1];
    const pattern = [top*2, top*2, top*2*1.1892, top*2, top*2, top*2*0.8909, top*2, top*2*1.1892];
    playOstinato(pattern[pos], time, ostiVol);
  }
  function scheduler() {
    let rBpm = nazgulMode ? 58 : (REGION_BPM[regionMode] || 64);
    let rBeatLen = 60 / rBpm;
    while(nextNoteTime < ctx.currentTime + 0.6) {
      scheduleBeat(beatCount, nextNoteTime);
      beatCount++;
      nextNoteTime += rBeatLen;
    }
    schedTimer = setTimeout(scheduler, 120);
  }
  function startMusic() {
    ensureCtx();
    if(musicRunning) return;
    musicRunning = true;
    beatCount = 0;
    nextNoteTime = ctx.currentTime + 0.1;
    scheduler();
  }
  function stopMusic() {
    musicRunning = false;
    if(schedTimer) clearTimeout(schedTimer);
    schedTimer = null;
  }
  function setMusicMuted(m) {
    musicMuted = m;
    if(ctx) musicGain.gain.setTargetAtTime(m?0:musicVolume, ctx.currentTime, 0.15);
    if(!m) startMusic();
  }
  function setSfxMuted(m) {
    sfxMuted = m;
    if(ctx) sfxGain.gain.setTargetAtTime(m?0:sfxVolume, ctx.currentTime, 0.05);
  }
  function setMusicVolume(v) {
    musicVolume = v;
    if(ctx && !musicMuted) musicGain.gain.setTargetAtTime(v, ctx.currentTime, 0.1);
  }
  function setSfxVolume(v) {
    sfxVolume = v;
    if(ctx && !sfxMuted) sfxGain.gain.setTargetAtTime(v, ctx.currentTime, 0.05);
  }
  function setNazgulMode(on) { nazgulMode = on; }
  function setRegionMode(r) {
    regionMode = r;
    // Restart music on region change for new chord feel
    if(musicRunning) { stopMusic(); beatCount=0; startMusic(); }
  }

  return {
    init: ensureCtx,
    startMusic, stopMusic, setMusicMuted, setSfxMuted, setMusicVolume, setSfxVolume, setNazgulMode, setRegionMode,
    playSwing, playHit, playEnemyDeath, playLevelUp, playCoin, playDrop, playClick, playRebirth, playSpecial,
    get musicMuted(){return musicMuted;}, get sfxMuted(){return sfxMuted;},
    get musicVolume(){return musicVolume;}, get sfxVolume(){return sfxVolume;}
  };
})();

window.toggleMusic = function() {
  AudioEngine.setMusicMuted(!AudioEngine.musicMuted);
  let b = $('#musicBtn');
  b.classList.toggle('muted', AudioEngine.musicMuted);
  b.innerText = AudioEngine.musicMuted ? '🔇 Musique' : '🎺 Musique';

/* ---------- BACKGROUND CANVAS (animated runes + shooting stars) ---------- */
(function() {
  let cv = document.getElementById('bgcanvas');
  if(!cv) return;
  let ctx2 = cv.getContext('2d');
  let W, H, starArr=[], runeArr=[], shootArr=[];
  const RUNE_CHARS = 'ᚠᚢᚦᚨᚱᚲᚷᚹᚺᚾᛁᛃᛇᛈᛉᛊᛏᛒᛖᛗᛚᛜᛞᛟ';
  function resizeBg() {
    W = cv.width = window.innerWidth; H = cv.height = window.innerHeight;
    starArr = []; runeArr = []; shootArr = [];
    for(let i=0;i<80;i++) starArr.push({x:Math.random()*W,y:Math.random()*H,r:Math.random()*1.5+0.3,s:Math.random()*0.4+0.1,p:Math.random()*Math.PI*2});
    for(let i=0;i<16;i++) runeArr.push({x:Math.random()*W,y:Math.random()*H,ch:RUNE_CHARS[Math.floor(Math.random()*RUNE_CHARS.length)],a:Math.random(),s:Math.random()*0.003+0.001,sz:10+Math.random()*14});
    for(let i=0;i<2;i++) resetShoot(i);
  }
  function resetShoot(i) { shootArr[i]={x:Math.random()*W,y:Math.random()*H*0.5,vx:(Math.random()-0.5)*2+1,vy:Math.random()*1.5+0.5,life:0,maxLife:50+Math.random()*50}; }
  resizeBg(); window.addEventListener('resize', resizeBg);
  let t2=0;
  function drawBg() {
    ctx2.clearRect(0,0,W,H);
    let isNz = document.body.classList.contains('nazgul');
    starArr.forEach(s=>{
      let b = 0.15+0.2*Math.sin(t2*s.s+s.p);
      ctx2.beginPath(); ctx2.arc(s.x,s.y,s.r,0,Math.PI*2);
      ctx2.fillStyle=isNz?`rgba(180,60,60,${b})`:`rgba(212,175,55,${b})`; ctx2.fill();
    });
    runeArr.forEach(r=>{
      r.a+=r.s; if(r.a>1)r.a=0;
      let al=r.a<0.5?r.a*2:(1-r.a)*2;
      ctx2.font=r.sz+'px serif';
      ctx2.fillStyle=isNz?`rgba(180,60,60,${al*0.07})`:`rgba(212,175,55,${al*0.07})`;
      ctx2.fillText(r.ch,r.x,r.y);
    });
    shootArr.forEach((s,i)=>{
      s.life++; s.x+=s.vx; s.y+=s.vy;
      let al=s.life<10?s.life/10:1-(s.life-10)/(s.maxLife-10); al=Math.max(0,al);
      ctx2.strokeStyle=isNz?`rgba(200,50,50,${al*0.5})`:`rgba(212,175,55,${al*0.5})`;
      ctx2.lineWidth=1.5; ctx2.beginPath(); ctx2.moveTo(s.x,s.y); ctx2.lineTo(s.x-s.vx*10,s.y-s.vy*10); ctx2.stroke();
      if(s.life>=s.maxLife) resetShoot(i);
    });
    t2+=0.01; requestAnimationFrame(drawBg);
  }
  drawBg();
})();

/* ---------- GAME LOOP ---------- */
let tickCount=0, atkTimer=0, lastRender=0;
let eventModalOpen = false;
function tick() {
  let now = Date.now();
  let dt = (now - lastRender)/1000 || 0;
  lastRender = now;
  if(dt>2)dt=2;
  tickCount++;
  let idle = getIdleIncome() * dt;
  if(idle>0) S.gold += idle;

  // KO cooldown countdown
  if(S.koCooldown > 0) {
    S.koCooldown -= dt;
    if(S.koCooldown <= 0) {
      S.koCooldown = 0;
      S.hp = S.maxHp * 0.5;
      let heroFace = document.querySelector('#panel-combat .fighter:first-child');
      if(heroFace) heroFace.classList.remove('death-anim');
      toast('✦ Tu te relèves ! HP restaurés à 50%.');
    }
    // Show countdown in combat
    if(tickCount%5===0) {
      let cdEl = document.getElementById('ko-countdown');
      if(cdEl) cdEl.innerText = S.koCooldown > 0 ? `💀 K.O. — ${Math.ceil(S.koCooldown)}s` : '';
    }
    renderBars();
    if(tickCount%10===0) renderTop();
    if(tickCount%50===0) save();
    return; // Block all attacks during KO
  }

  // HP regen (Guardian class regens faster)
  if(S.hp < S.maxHp) {
    S.hp = Math.min(S.maxHp, S.hp + S.maxHp * 0.015 * dt * getHpRegenMult());
    if(tickCount%5===0) renderBars();
  }
  // Passive corruption: rises very slowly from dark play, decays slowly in light
  if(S.karma < -20 && tickCount % 20 === 0) {
    let corrRate = Math.abs(S.karma + 20) * 0.004 * (RACES[S.race].corruptionResist||1);
    S.corruption = Math.min(100, S.corruption + corrRate);
    checkNazgulTransformation();
    if(tickCount%20===0) renderKarmaCorruption();
  }
  atkTimer += dt;
  let spd = getAtkSpeed();
  if(!eventModalOpen && atkTimer >= 1/spd) { atkTimer=0; heroAttack(); }
  tickBuffs(dt);
  if(tickCount%10===0) renderTop();
  if(tickCount%50===0) save();
}

/* ---------- KARMA / CORRUPTION ---------- */
const KARMA_MIN = -100, KARMA_MAX = 100;
const CORRUPTION_MAX = 100;
function renderKarmaCorruption() {
  let kPct = ((S.karma - KARMA_MIN) / (KARMA_MAX - KARMA_MIN)) * 100;
  kPct = Math.max(0, Math.min(100, kPct));
  if($('#karmaBar')) $('#karmaBar').style.width = kPct + '%';
  if($('#karmaVal')) $('#karmaVal').innerText = (S.karma>0?'+':'')+S.karma;
  let cPct = Math.max(0, Math.min(100, (S.corruption / CORRUPTION_MAX) * 100));
  if($('#corrBar')) $('#corrBar').style.width = cPct + '%';
  if($('#corrVal')) $('#corrVal').innerText = Math.floor(cPct) + '%';
}
function adjustKarma(delta) {
  S.karma = Math.max(KARMA_MIN, Math.min(KARMA_MAX, S.karma + delta));
  // Negative karma slowly raises corruption; positive karma slowly lowers it
  if(delta < 0) {
    let resist = RACES[S.race].corruptionResist || 1;
    S.corruption = Math.min(CORRUPTION_MAX, S.corruption + Math.abs(delta) * 1.5 * resist);
  } else if(delta > 0 && S.corruption > 0) {
    S.corruption = Math.max(0, S.corruption - delta * 0.5);
  }
  checkNazgulTransformation();
}
function checkNazgulTransformation() {
  let wasNazgul = S.isNazgul;
  if(S.corruption >= CORRUPTION_MAX && !S.isNazgul) {
    S.isNazgul = true;
    activateNazgulMode();
  } else if(S.corruption < CORRUPTION_MAX && S.isNazgul && S.corruption < CORRUPTION_MAX * 0.5) {
    // Redemption: corruption drops below half after transformation
    S.isNazgul = false;
    deactivateNazgulMode();
  }
}
function activateNazgulMode() {
  document.body.classList.add('nazgul');
  toast('☠ La Corruption t\'a consumé... Tu deviens un Nazgûl !');
  AudioEngine.playRebirth();
  AudioEngine.setNazgulMode(true);
  S.name = 'Le ' + S.name;
  renderHero();
  if($('#panel-combat').classList.contains('active')) {
    let droplog = $('#droplog');
    if(droplog) { droplog.parentElement.remove ? null : null; }
    $('#panel-combat').innerHTML = '';
    renderCombatFace();
  }
}
function deactivateNazgulMode() {
  document.body.classList.remove('nazgul');
  toast('✦ Ta corruption faiblit... La lumière revient en toi.');
  AudioEngine.setNazgulMode(false);
  if(S.name.startsWith('Le ')) S.name = S.name.slice(3);
  renderHero();
  if($('#panel-combat').classList.contains('active')) {
    $('#panel-combat').innerHTML = '';
    renderCombatFace();
  }
}

function triggerRandomEvent() {

function showEventModal(ev) {

  let choicesHTML = ev.choices.map((ch, i) =>
    `<button class="btn small" style="margin-bottom:8px;text-align:left;padding:10px 14px"
      onclick="chooseEvent(${i})">${ch.label}</button>`
  ).join('');
  c.innerHTML = `

window.chooseEvent = function(idx) {
  let ev = window._currentEvent;
  if(!ev) return;
  let ch = ev.choices[idx];
  if(!ch) return;
  ch.apply();
  if(ch.karma) adjustKarma(ch.karma);
  renderTop(); renderKarmaCorruption();
  let reward = typeof ch.txt === 'function' ? ch.txt(S) : ch.txt;
  toast(`${ev.ico} ${ev.n} — ${reward}`);
  $('#eventModal').classList.remove('show');
  eventModalOpen = false;
  window._currentEvent = null;
};

        <div class="sname">${e.n}</div>
        ${hasItem
          ? `<div class="equip-name">"${eq.name}"</div>
             <div class="rar ${rarClass}">${tierName}</div>
             <div class="stat">Puissance: ${fmt(eq.power)}</div>
             <button class="btn small" style="margin-top:8px;border-color:${canForge?'var(--gold)':'var(--muted)'};color:${canForge?'var(--gold-bright)':'var(--muted)'}" onclick="forgeItem('${e.id}')" ${canForge?'':'disabled'}>
               ⚒ Forger — ${fmt(forgeCost)} 🪙
             </button>`
          : `<div class="rar" style="color:var(--muted)">Emplacement vide</div>`
        }
        <div style="font-size:11px;margin-top:5px;color:var(--muted)">${e.desc}</div>
      </div>`;
  });
  html += `</div>
    <div style="margin-top:16px">
      <h3 style="font-size:14px;margin-bottom:5px;">Registre des Butins Récents</h3>
      <div id="droplog"></div>
    </div>
  </div>

  <!-- SHOP CONSOMMABLES -->
  <div class="card">
    <h3>🏪 Marché de l'Aventurier</h3>
    <div class="sub">Dépense ton <b style="color:var(--gold-bright)">Or 🪙</b> pour des consommables puissants. Les prix augmentent avec l'Étape.</div>
    <div class="grid g1">`;
  CONSUMABLES.forEach(cons => {
    let cost = cons.cost();
    let canBuy = S.gold >= cost;
    html += `
      <div class="buyrow">
        <div style="font-size:28px">${cons.ico}</div>
        <div class="info">
          <div class="nm">${cons.n}</div>
          <div class="ds">${cons.d}</div>
        </div>
        <div class="act">
          <button class="btn small ${canBuy?'':'alt'}" onclick="buyConsumable('${cons.id}')" ${canBuy?'':'disabled'}>
            ${fmt(cost)} 🪙
          </button>
        </div>
      </div>`;
  });
  html += `</div></div>`;
  p.innerHTML = html;
}

window.buyConsumable = function(id) {
  let cons = CONSUMABLES.find(c=>c.id===id);
  if(!cons) return;
  let cost = cons.cost();
  if(S.gold < cost) return;
  S.gold -= cost;
  cons.use();
  AudioEngine.playCoin();
  renderTop();
  refreshTab('equipment');
  save();
};
