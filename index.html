<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>L'Ascension de l'Ombre</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@500;600;700;800&family=EB+Garamond:ital@0;1&family=Cinzel+Decorative:wght@700&display=swap" rel="stylesheet">
<style>
/* ============================================================
   L'ASCENSION DE L'OMBRE — dark-fantasy JRPG
   Palette : abysse violacé, parchemin os, braise dorée,
   spectre cyan, sang, arcane (mana/corruption).
   ============================================================ */
:root{
  --abyss:#0c0a14; --shadow:#161226; --shadow2:#221b3a; --raised:#2c2348;
  --line:#3a315a; --line2:#4d4173;
  --bone:#ece4d3; --muted:#9b91b4; --faint:#6b6388;
  --ember:#e6a73e; --ember-bright:#ffd06b; --ember-glow:rgba(230,167,62,.45);
  --spectral:#6fd6c4; --blood:#d2495c; --arcane:#9a6cff; --arcane-bright:#bd9bff;
  --feu:#ff6b3d; --givre:#5ec8e0; --foudre:#f5d020; --nature:#7dc44a;
  --lumiere:#ffe9a8; --tenebres:#9a6cff; --physique:#cbb88f;
  --xp:#7dd0a8;
  --r:14px;
}
*{box-sizing:border-box; -webkit-tap-highlight-color:transparent;}
html,body{margin:0; height:100%;}
body{
  background:
    radial-gradient(1200px 700px at 50% -10%, #1d1636 0%, transparent 60%),
    radial-gradient(900px 600px at 90% 110%, #241a2e 0%, transparent 55%),
    var(--abyss);
  color:var(--bone); font-family:'EB Garamond',Georgia,serif;
  overflow:hidden; user-select:none; -webkit-user-select:none;
}
h1,h2,h3,h4,.cz{font-family:'Cinzel',serif; letter-spacing:.04em;}
button{font-family:inherit; color:inherit; cursor:pointer;}
.hidden{display:none !important;}
::-webkit-scrollbar{width:7px; height:7px;}
::-webkit-scrollbar-thumb{background:var(--line2); border-radius:4px;}

#app{position:fixed; inset:0; display:flex; flex-direction:column; max-width:560px; margin:0 auto;
  box-shadow:0 0 80px rgba(0,0,0,.6); }

/* ---------- TOP STATUS BAR ---------- */
#topbar{flex:0 0 auto; display:flex; align-items:center; gap:6px; padding:8px 12px;
  background:linear-gradient(180deg,#1a1430,#120e22); border-bottom:1px solid var(--line);
  font-family:'Cinzel'; font-size:12px; z-index:30;}
#topbar .res{display:flex; align-items:center; gap:4px; padding:3px 8px; background:rgba(0,0,0,.35);
  border:1px solid var(--line); border-radius:20px; white-space:nowrap;}
#topbar .res .ico{font-size:13px;}
#topbar .res .v{color:var(--ember-bright);}
#topbar .spacer{flex:1;}
#regionPill{color:var(--spectral); font-size:11px; opacity:.9;}

/* corruption thread */
#corrThread{position:absolute; left:0; right:0; bottom:-1px; height:2px; background:transparent;}
#corrThread i{display:block; height:100%; width:0%; background:linear-gradient(90deg,var(--arcane),var(--blood)); box-shadow:0 0 8px var(--arcane);}

/* ---------- MAIN VIEW ---------- */
#view{flex:1 1 auto; position:relative; overflow-y:auto; overflow-x:hidden;}
.screen{position:absolute; inset:0; padding:14px; overflow-y:auto; animation:fadein .25s ease;}
@keyframes fadein{from{opacity:0; transform:translateY(6px);} to{opacity:1; transform:none;}}
.panel-title{font-size:18px; color:var(--ember-bright); text-align:center; margin:2px 0 12px;
  text-shadow:0 0 14px var(--ember-glow);}
.sub{color:var(--muted); font-size:13px;}

/* card */
.card{background:linear-gradient(180deg,rgba(40,32,66,.7),rgba(22,18,38,.7));
  border:1px solid var(--line); border-radius:var(--r); padding:14px; margin-bottom:12px;
  box-shadow:inset 0 1px 0 rgba(255,255,255,.04);}

/* ---------- BOTTOM NAV ---------- */
#nav{flex:0 0 auto; display:flex; background:linear-gradient(0deg,#120e22,#1a1430);
  border-top:1px solid var(--line); z-index:30;}
#nav button{flex:1; background:none; border:none; padding:9px 2px 8px; display:flex; flex-direction:column;
  align-items:center; gap:2px; color:var(--faint); font-family:'Cinzel'; font-size:9.5px; transition:.15s;}
#nav button .ic{font-size:19px; filter:grayscale(.4) opacity(.7); transition:.15s;}
#nav button.on{color:var(--ember-bright);}
#nav button.on .ic{filter:none; transform:translateY(-2px); text-shadow:0 0 12px var(--ember-glow);}
#nav .badge{position:absolute; top:4px; margin-left:20px; background:var(--blood); color:#fff;
  font-size:8px; border-radius:10px; padding:0 4px; font-family:'Cinzel';}

/* ---------- BUTTONS ---------- */
.btn{display:inline-flex; align-items:center; justify-content:center; gap:6px;
  background:linear-gradient(180deg,var(--raised),var(--shadow2)); border:1px solid var(--line2);
  color:var(--bone); border-radius:10px; padding:10px 14px; font-family:'Cinzel'; font-size:13px; transition:.15s;}
.btn:hover{filter:brightness(1.18); transform:translateY(-1px);}
.btn:active{transform:translateY(0);}
.btn:disabled{opacity:.4; pointer-events:none;}
.btn.gold{border-color:var(--ember); color:var(--ember-bright); box-shadow:0 0 0 1px rgba(230,167,62,.12) inset;}
.btn.ghost{background:rgba(0,0,0,.25);}
.btn.sm{padding:6px 10px; font-size:11px; border-radius:8px;}
.btn.block{width:100%;}

/* type chip */
.tchip{display:inline-flex; align-items:center; gap:3px; font-family:'Cinzel'; font-size:9px;
  padding:1px 6px; border-radius:20px; border:1px solid currentColor; vertical-align:middle;}

/* bars */
.bar{height:9px; background:#000; border:1px solid var(--line); border-radius:6px; overflow:hidden; position:relative;}
.bar>i{display:block; height:100%; width:0; border-radius:5px; transition:width .35s cubic-bezier(.2,.8,.2,1);}
.bar.hp>i{background:linear-gradient(90deg,#7a2030,var(--blood),#ff8295);}
.bar.mp>i{background:linear-gradient(90deg,#3a2a78,var(--arcane),var(--arcane-bright));}
.bar.xp>i{background:linear-gradient(90deg,#1f6a4a,var(--xp));}

/* =================================================================
   COMBAT SCREEN  (the signature)
   enemies arrayed up top over a misty field, party portraits below,
   initiative ribbon, command menu docked at bottom.
   ================================================================= */
#battle{position:absolute; inset:0; display:none; flex-direction:column;
  background:
    radial-gradient(120% 80% at 50% 0%, #241a40 0%, transparent 55%),
    radial-gradient(100% 70% at 50% 100%, #18122c 0%, transparent 60%),
    linear-gradient(180deg,#0e0a1a,#070510);}
#battle.on{display:flex;}
.field-fog{position:absolute; inset:0; pointer-events:none; opacity:.5;
  background:radial-gradient(60% 40% at 50% 62%, rgba(120,90,180,.18), transparent 70%);}

/* initiative ribbon */
#initRibbon{flex:0 0 auto; display:flex; align-items:center; gap:5px; padding:8px 10px 6px;
  overflow-x:auto; z-index:5;}
#initRibbon .rlabel{font-family:'Cinzel'; font-size:9px; color:var(--faint); margin-right:4px; white-space:nowrap;}
.init-chip{flex:0 0 auto; width:32px; height:32px; border-radius:9px; display:flex; align-items:center;
  justify-content:center; font-size:17px; background:rgba(0,0,0,.4); border:1px solid var(--line); position:relative;}
.init-chip.enemy{border-color:#5a2740;}
.init-chip.cur{border-color:var(--ember-bright); box-shadow:0 0 12px var(--ember-glow); transform:scale(1.12);}
.init-chip.dead{opacity:.25; filter:grayscale(1);}

/* enemy row */
#enemyRow{flex:0 0 auto; display:flex; justify-content:center; align-items:flex-end; gap:14px;
  padding:6px 12px 4px; min-height:150px; z-index:4;}
.enemy-unit{display:flex; flex-direction:column; align-items:center; gap:5px; cursor:pointer; position:relative; transition:.2s;}
.enemy-unit .portrait{font-size:64px; line-height:1; filter:drop-shadow(0 8px 12px rgba(0,0,0,.6));
  transition:transform .12s, filter .2s; animation:idleFloat 3.4s ease-in-out infinite;}
.enemy-unit.targeted .portrait{transform:scale(1.06);}
.enemy-unit.targeted::after{content:'▾'; position:absolute; top:-14px; color:var(--ember-bright); font-size:16px;
  animation:bobArrow .8s ease-in-out infinite; text-shadow:0 0 8px var(--ember-glow);}
@keyframes bobArrow{0%,100%{transform:translateY(0);} 50%{transform:translateY(4px);}}
@keyframes idleFloat{0%,100%{transform:translateY(0);} 50%{transform:translateY(-5px);}}
.enemy-unit .ename{font-family:'Cinzel'; font-size:10px; color:var(--bone); opacity:.9;}
.enemy-unit .ehp{width:74px;}
.enemy-unit.boss .portrait{font-size:84px; animation:bossPulse 2.6s ease-in-out infinite;}
@keyframes bossPulse{0%,100%{filter:drop-shadow(0 0 10px rgba(210,73,92,.4));} 50%{filter:drop-shadow(0 0 22px rgba(210,73,92,.8));}}
.statusline{display:flex; gap:2px; min-height:14px; justify-content:center; flex-wrap:wrap;}
.st{font-size:11px; padding:0 3px; border-radius:6px; border:1px solid currentColor; background:rgba(0,0,0,.4);}
.st sub{font-size:7px;}

/* party row */
#partyRow{flex:0 0 auto; display:flex; gap:8px; padding:8px 10px; z-index:6;}
.pmember{flex:1; background:linear-gradient(180deg,rgba(44,35,72,.85),rgba(22,18,38,.92));
  border:1px solid var(--line); border-radius:12px; padding:7px 8px 8px; position:relative; transition:.18s; min-width:0;}
.pmember.cur{border-color:var(--ember-bright); box-shadow:0 0 18px var(--ember-glow);}
.pmember.dead{opacity:.45; filter:grayscale(.7);}
.pmember .ptop{display:flex; align-items:center; gap:6px;}
.pmember .pico{font-size:26px; flex:0 0 auto;}
.pmember .pname{font-family:'Cinzel'; font-size:11px; overflow:hidden; text-overflow:ellipsis; white-space:nowrap;}
.pmember .plvl{font-size:9px; color:var(--faint);}
.pmember .pbars{margin-top:5px; display:flex; flex-direction:column; gap:3px;}
.pmember .pnum{font-size:9px; color:var(--muted); font-family:'Cinzel'; display:flex; justify-content:space-between;}

/* combat log */
#combatLog{flex:0 0 auto; height:42px; overflow:hidden; padding:2px 14px; text-align:center;
  font-size:12.5px; color:var(--muted); z-index:6; display:flex; flex-direction:column-reverse;}
#combatLog div{padding:1px 0; line-height:1.25;}
#combatLog .lnew{color:var(--bone); animation:logpop .3s ease;}
@keyframes logpop{from{opacity:0; transform:translateY(4px);} to{opacity:1;}}

/* banner */
#turnBanner{flex:0 0 auto; text-align:center; font-family:'Cinzel'; font-size:13px; min-height:20px; z-index:6;}
#turnBanner .you{color:var(--ember-bright); text-shadow:0 0 10px var(--ember-glow); animation:breathe 1.5s ease-in-out infinite;}
#turnBanner .wait{color:var(--muted);}
#turnBanner .auto{color:var(--spectral);}
@keyframes breathe{0%,100%{opacity:.65;} 50%{opacity:1;}}

/* command dock */
#cmdDock{flex:0 0 auto; background:linear-gradient(0deg,#0a0716,#140f26); border-top:1px solid var(--line);
  padding:9px 10px calc(9px + env(safe-area-inset-bottom)); z-index:8; min-height:96px;}
.cmd-grid{display:grid; grid-template-columns:repeat(2,1fr); gap:7px;}
.cmd{background:linear-gradient(180deg,var(--raised),var(--shadow2)); border:1px solid var(--line2);
  border-radius:10px; padding:11px 8px; font-family:'Cinzel'; font-size:13px; display:flex; align-items:center;
  justify-content:center; gap:6px; transition:.12s;}
.cmd:hover{filter:brightness(1.2);}
.cmd:active{transform:scale(.97);}
.cmd.atk{border-color:var(--ember);}
.cmd.tech{border-color:var(--arcane);}
.cmd.def{border-color:var(--spectral);}
.cmd.item{border-color:var(--nature);}
.cmd:disabled{opacity:.4;}
.cmd-list{display:flex; flex-direction:column; gap:6px; max-height:190px; overflow-y:auto;}
.tech-row{display:flex; align-items:center; gap:8px; padding:9px 10px; border-radius:10px;
  background:rgba(0,0,0,.3); border:1px solid var(--line); transition:.12s;}
.tech-row:hover{border-color:var(--line2); background:rgba(0,0,0,.45);}
.tech-row:active{transform:scale(.99);}
.tech-row.dim{opacity:.45;}
.tech-row .ti{font-size:18px;}
.tech-row .tn{flex:1; font-family:'Cinzel'; font-size:12px;}
.tech-row .tn small{display:block; font-family:'EB Garamond'; font-size:10.5px; color:var(--muted); margin-top:1px;}
.tech-row .tc{font-size:11px; color:var(--arcane-bright); font-family:'Cinzel'; white-space:nowrap;}
.dock-head{display:flex; align-items:center; justify-content:space-between; margin-bottom:7px;}
.dock-head .dt{font-family:'Cinzel'; font-size:11px; color:var(--muted); letter-spacing:.08em;}
.back-x{background:rgba(0,0,0,.4); border:1px solid var(--line); border-radius:8px; padding:5px 11px; font-size:11px; font-family:'Cinzel'; color:var(--muted);}
.auto-pill{background:rgba(0,0,0,.4); border:1px solid var(--line); border-radius:20px; padding:5px 12px;
  font-family:'Cinzel'; font-size:10px; color:var(--muted);}
.auto-pill.on{border-color:var(--spectral); color:var(--spectral); box-shadow:0 0 10px rgba(111,214,196,.3);}

/* floating combat numbers + VFX */
#fx{position:absolute; inset:0; pointer-events:none; overflow:hidden; z-index:12;}
.fnum{position:absolute; font-family:'Cinzel'; font-weight:700; font-size:22px; pointer-events:none;
  text-shadow:0 2px 6px #000,0 0 10px rgba(0,0,0,.8); animation:fnumRise 1s ease-out forwards;}
.fnum.crit{font-size:30px; color:var(--ember-bright);}
.fnum.heal{color:var(--xp);}
.fnum.mana{color:var(--arcane-bright);}
.fnum.miss{color:var(--muted); font-style:italic;}
@keyframes fnumRise{0%{opacity:0; transform:translate(-50%,0) scale(.6);} 18%{opacity:1; transform:translate(-50%,-18px) scale(1.15);} 100%{opacity:0; transform:translate(-50%,-56px) scale(1);}}
.hitspark{position:absolute; width:80px; height:80px; transform:translate(-50%,-50%); pointer-events:none;}
.burst{position:absolute; border-radius:50%; transform:translate(-50%,-50%); pointer-events:none; mix-blend-mode:screen;}
@keyframes burstOut{0%{opacity:.95; transform:translate(-50%,-50%) scale(.2);} 100%{opacity:0; transform:translate(-50%,-50%) scale(2.6);}}
.slashfx{position:absolute; width:120px; height:6px; transform:translate(-50%,-50%) rotate(-35deg); border-radius:6px;
  background:linear-gradient(90deg,transparent,#fff,transparent); pointer-events:none; animation:slashGo .3s ease-out forwards;}
@keyframes slashGo{0%{opacity:0; transform:translate(-50%,-50%) rotate(-35deg) scaleX(.2);} 30%{opacity:1;} 100%{opacity:0; transform:translate(-50%,-50%) rotate(-35deg) scaleX(1.3);}}
.shk{animation:shk .32s ease;}
@keyframes shk{0%,100%{transform:translate(0,0);} 20%{transform:translate(-6px,3px);} 40%{transform:translate(6px,-3px);} 60%{transform:translate(-4px,2px);} 80%{transform:translate(4px,-2px);}}
.bigshk{animation:bigshk .5s ease;}
@keyframes bigshk{0%,100%{transform:translate(0,0);} 15%{transform:translate(-12px,6px) rotate(-1deg);} 35%{transform:translate(12px,-5px) rotate(1deg);} 55%{transform:translate(-9px,4px);} 75%{transform:translate(7px,-3px);}}
#flash{position:absolute; inset:0; background:#fff; opacity:0; pointer-events:none; z-index:13; transition:opacity .12s;}
.particle{position:absolute; pointer-events:none; border-radius:50%; animation:partFly .6s ease-out forwards;}
@keyframes partFly{0%{opacity:1; transform:translate(-50%,-50%);} 100%{opacity:0;}}
.projectile{position:absolute; width:22px; height:22px; border-radius:50%; transform:translate(-50%,-50%);
  pointer-events:none; mix-blend-mode:screen; z-index:14; filter:blur(1px);}

/* ---------- MAP ---------- */
#mapWrap{position:relative; padding:6px 0 30px;}
.zone-node{display:flex; align-items:center; gap:12px; padding:13px 14px; margin:0 0 10px; border-radius:14px;
  background:linear-gradient(180deg,rgba(40,32,66,.75),rgba(22,18,38,.8)); border:1px solid var(--line); position:relative; transition:.18s;}
.zone-node.locked{opacity:.5;}
.zone-node.current{border-color:var(--ember); box-shadow:0 0 22px var(--ember-glow);}
.zone-node:not(.locked):hover{transform:translateX(3px); border-color:var(--line2);}
.zone-node .znum{font-family:'Cinzel Decorative'; font-size:20px; color:var(--ember); width:30px; text-align:center; flex:0 0 auto;}
.zone-node .zico{font-size:34px; flex:0 0 auto;}
.zone-node .zmid{flex:1; min-width:0;}
.zone-node .zname{font-family:'Cinzel'; font-size:14px; color:var(--bone);}
.zone-node .zdesc{font-size:12px; color:var(--muted); margin-top:1px;}
.zone-node .zmeta{font-size:10px; color:var(--faint); margin-top:3px; font-family:'Cinzel';}
.zone-node .zgo{flex:0 0 auto;}
.zconnector{width:2px; height:10px; background:var(--line); margin:0 auto -4px 30px; margin-top:-6px;}
.cleared-tag{position:absolute; top:8px; right:10px; font-size:9px; font-family:'Cinzel'; color:var(--xp); border:1px solid var(--xp); border-radius:10px; padding:0 6px;}

/* ---------- INVENTORY / EQUIP ---------- */
.equip-grid{display:grid; grid-template-columns:repeat(3,1fr); gap:8px; margin-bottom:8px;}
.eslot{background:rgba(0,0,0,.3); border:1px dashed var(--line2); border-radius:12px; padding:10px 6px; text-align:center; transition:.15s;}
.eslot.filled{border-style:solid;}
.eslot:hover{border-color:var(--ember);}
.eslot .eslico{font-size:24px; opacity:.85;}
.eslot .esllab{font-family:'Cinzel'; font-size:9px; color:var(--faint); margin-top:2px;}
.eslot .eitem{font-family:'Cinzel'; font-size:10.5px; margin-top:3px;}
.inv-item{display:flex; align-items:center; gap:10px; padding:10px; border-radius:11px; margin-bottom:7px;
  background:linear-gradient(180deg,rgba(40,32,66,.6),rgba(22,18,38,.7)); border:1px solid var(--line); border-left-width:4px;}
.inv-item .iico{font-size:26px;}
.inv-item .imid{flex:1; min-width:0;}
.inv-item .iname{font-family:'Cinzel'; font-size:12.5px;}
.inv-item .iaff{font-size:11px; color:var(--spectral); margin-top:2px; line-height:1.35;}
.inv-item .ipass{font-size:11px; color:var(--ember-bright); margin-top:1px; font-style:italic;}
.rar-0{border-left-color:#9a9a9a;} .rar-0 .iname{color:#c7c7c7;}
.rar-1{border-left-color:#5fae5f;} .rar-1 .iname{color:#8fe08f;}
.rar-2{border-left-color:#4f8fe0;} .rar-2 .iname{color:#8fc0ff;}
.rar-3{border-left-color:#b06fe0;} .rar-3 .iname{color:#d6a8ff;}
.rar-4{border-left-color:var(--ember);} .rar-4 .iname{color:var(--ember-bright);}
.rar-5{border-left-color:#ff5a7a;} .rar-5 .iname{color:#ff96ae; text-shadow:0 0 10px rgba(255,90,122,.5);}

/* stat allocate */
.stat-row{display:flex; align-items:center; gap:10px; padding:9px 4px; border-bottom:1px solid var(--line);}
.stat-row .sname{flex:1; font-family:'Cinzel'; font-size:13px;}
.stat-row .sval{font-family:'Cinzel'; font-size:15px; color:var(--ember-bright); width:42px; text-align:right;}
.stat-row .sdesc{font-size:10.5px; color:var(--faint);}
.plusbtn{width:30px; height:30px; border-radius:8px; border:1px solid var(--ember); background:rgba(230,167,62,.12);
  color:var(--ember-bright); font-size:18px; font-family:'Cinzel'; display:flex; align-items:center; justify-content:center;}
.plusbtn:disabled{opacity:.25; border-color:var(--line);}

/* technique tree */
.tech-card{display:flex; align-items:center; gap:10px; padding:10px; border-radius:11px; margin-bottom:7px;
  background:rgba(0,0,0,.28); border:1px solid var(--line);}
.tech-card.learned{border-color:var(--spectral);}
.tech-card.equipped{border-color:var(--ember); box-shadow:0 0 12px var(--ember-glow);}
.tech-card.locked{opacity:.5;}
.tech-card .tcico{font-size:24px;}
.tech-card .tcmid{flex:1; min-width:0;}
.tech-card .tcname{font-family:'Cinzel'; font-size:12.5px;}
.tech-card .tcmeta{font-size:11px; color:var(--muted); margin-top:2px;}

/* toast */
#toast{position:fixed; left:50%; bottom:90px; transform:translateX(-50%); z-index:200; display:flex; flex-direction:column; gap:6px; align-items:center; pointer-events:none; width:90%; max-width:480px;}
.toast{background:rgba(20,15,34,.96); border:1px solid var(--line2); border-radius:10px; padding:9px 14px;
  font-size:13px; box-shadow:0 8px 24px rgba(0,0,0,.5); animation:toastIn .3s ease, toastOut .3s ease 2.4s forwards; text-align:center;}
@keyframes toastIn{from{opacity:0; transform:translateY(10px);} to{opacity:1;}}
@keyframes toastOut{to{opacity:0; transform:translateY(-10px);}}

/* modal */
.modal-bg{position:fixed; inset:0; background:rgba(5,3,12,.8); z-index:150; display:flex; align-items:center; justify-content:center; padding:20px; animation:fadein .2s;}
.modal{background:linear-gradient(180deg,#241b3c,#160f28); border:1px solid var(--line2); border-radius:16px;
  padding:20px; max-width:440px; width:100%; max-height:84vh; overflow-y:auto; box-shadow:0 20px 60px rgba(0,0,0,.6);}
.modal h3{color:var(--ember-bright); text-align:center; margin:0 0 12px;}

/* victory overlay */
#resultOverlay{position:absolute; inset:0; background:radial-gradient(circle at 50% 40%, rgba(30,22,50,.9), rgba(8,5,16,.97));
  z-index:20; display:none; flex-direction:column; align-items:center; justify-content:center; gap:10px; padding:30px; text-align:center;}
#resultOverlay.on{display:flex; animation:fadein .4s;}
#resultOverlay h2{font-family:'Cinzel Decorative'; font-size:30px; margin:0;}
#resultOverlay.win h2{color:var(--ember-bright); text-shadow:0 0 24px var(--ember-glow);}
#resultOverlay.lose h2{color:var(--blood);}
.reward-line{font-size:14px; color:var(--bone);}
.reward-line .v{color:var(--ember-bright); font-family:'Cinzel';}
.loot-pop{font-family:'Cinzel'; font-size:13px; animation:logpop .4s ease;}

/* title screen */
#title{position:absolute; inset:0; z-index:120; display:flex; flex-direction:column; align-items:center; justify-content:center;
  padding:24px; text-align:center; gap:14px;
  background:radial-gradient(circle at 50% 30%, #221634, #07040f);}
#title h1{font-family:'Cinzel Decorative'; font-size:32px; line-height:1.1; color:var(--ember-bright); margin:0;
  text-shadow:0 0 30px var(--ember-glow);}
#title .tsub{color:var(--muted); font-size:15px; font-style:italic; margin-top:-6px;}
.choice-grid{display:grid; grid-template-columns:repeat(2,1fr); gap:10px; width:100%; margin-top:6px;}
.choice{background:rgba(0,0,0,.3); border:1px solid var(--line); border-radius:12px; padding:12px 8px; text-align:center; transition:.15s;}
.choice.sel{border-color:var(--ember); box-shadow:0 0 16px var(--ember-glow); background:rgba(230,167,62,.08);}
.choice .cico{font-size:30px;}
.choice .cname{font-family:'Cinzel'; font-size:13px; margin-top:3px;}
.choice .cdesc{font-size:10.5px; color:var(--muted); margin-top:3px; line-height:1.3;}
.field-input{width:100%; background:rgba(0,0,0,.4); border:1px solid var(--line2); border-radius:10px; padding:11px 14px;
  color:var(--bone); font-family:'Cinzel'; font-size:15px; text-align:center; margin-top:4px;}
.field-input:focus{outline:none; border-color:var(--ember);}

.empty-note{text-align:center; color:var(--faint); font-style:italic; padding:24px 10px; font-size:13px;}
.divider{display:flex; align-items:center; gap:10px; margin:14px 0 10px; color:var(--faint); font-family:'Cinzel'; font-size:11px; letter-spacing:.1em;}
.divider::before,.divider::after{content:''; flex:1; height:1px; background:var(--line);}
.kv{display:flex; justify-content:space-between; padding:5px 0; border-bottom:1px solid var(--line); font-size:13px;}
.kv .k{color:var(--muted);} .kv .v{color:var(--bone); font-family:'Cinzel';}
.nazgul body, body.nazgul{--ember:#9a6cff; --ember-bright:#bd9bff; --ember-glow:rgba(154,108,255,.5);}
body.nazgul #app{box-shadow:0 0 80px rgba(120,40,160,.4);}

  {k:'critPct',label:'% Critique',pct:true},{k:'hpFlat',label:'PV',big:true},
  {k:'manaFlat',label:'Mana',mid:true},{k:'lifesteal',label:'% Vol de vie',pct:true},
];
const PASSIVES=[
  {id:'p_thorns',n:'Épines',desc:'Renvoie 15% des dégâts subis.'},
  {id:'p_firstaid',n:'Premiers Soins',desc:'+5% PV en début de combat.'},

const SAVE_KEY='lotr_jrpg_v1';
let S=null;
function defaultState(){

/* ===================================================================
   STATS DÉRIVÉES
   =================================================================== */
function raceBase(){ return RACES[S.race].base; }
function totalStat(k){
  let v=raceBase()[k]+(S.alloc[k]||0)+Math.floor(S.level*0.4);
  // affixes équipées
  for(let sl in S.equip){ let it=S.equip[sl]; if(it){ it.affixes.forEach(a=>{ if(a.k===k)v+=a.v; }); if(ITEM_BASES[it.base].mainStat===k) v+=it.mainVal; } }
  return Math.floor(v);
}
function heroDerived(){
  let F=totalStat('force'),E=totalStat('esprit'),V=totalStat('vigueur'),A=totalStat('agilite'),C=totalStat('chance');
  let race=RACES[S.race];
  let hp=40+V*12+S.level*8;
  let mana=20+E*6+S.level*2;
  let atkP=6+F*2.2;
  let atkM=5+E*2.4;
  let spd=90+A*1.6;
  let crit=0.05+C*0.006;
  let dodge=A*0.004; if(race.pid==='dodge')dodge+=0.18;
  let drop=1+C*0.02; if(race.pid==='drop')drop+=0.30; if(S.isNazgul)drop+=0;
  // affixes spéciaux
  let critA=0,hpA=0,manaA=0,ls=0;
  for(let sl in S.equip){ let it=S.equip[sl]; if(it)it.affixes.forEach(a=>{
    if(a.k==='critPct')critA+=a.v; if(a.k==='hpFlat')hpA+=a.v; if(a.k==='manaFlat')manaA+=a.v; if(a.k==='lifesteal')ls+=a.v; }); }
  crit+=critA/100; hp+=hpA; mana+=manaA;
  if(race.pid==='hp')hp*=1.2;
  if(race.pid==='phys')atkP*=1.15;
  if(race.pid==='xp')0;
  if(S.isNazgul){ atkM*=1.25; mana*=1.15; }
  return {F,E,V,A,C,maxHp:Math.floor(hp),maxMana:Math.floor(mana),atkP:Math.floor(atkP),atkM:Math.floor(atkM),
    spd:Math.floor(spd),crit:clamp(crit,0,0.6),dodge:clamp(dodge,0,0.4),drop,lifesteal:ls/100};
}
function xpNeeded(lv){ return Math.floor(50*Math.pow(1.32,lv-1)); }
function heroType(){ return S.isNazgul?'tenebres':(RACES[S.race].trees[0]); }

/* alliés : stats selon niveau (= niveau héros) */
function allyLevel(id){ return S.allyLevels[id]||Math.max(1,S.level-1); }
function allyDerived(id){
  let a=ALLY_BY_ID[id]; let lv=allyLevel(id);
  return {maxHp:Math.floor(a.baseHp+lv*9), maxMana:Math.floor(a.baseMana+lv*2),
    atkP:Math.floor(a.atk+lv*1.4), atkM:Math.floor(a.mag+lv*1.3), spd:a.spd+Math.floor(lv*0.5),
    crit:0.08, type:a.type, moves:a.moves};
}

/* ===================================================================
   GÉNÉRATION D'OBJETS
   =================================================================== */
let _iid=1;
function genItem(baseId,rarityIdx,ilvl){
  let base=ITEM_BASES[baseId]; let R=RARITIES[rarityIdx];
  let mainVal=Math.max(1,Math.floor((2+ilvl*0.8)*R.mult));
  let affixes=[];
  let pool=AFFIX_POOL.filter(a=>a.k!==base.mainStat);
  for(let i=0;i<R.affixes;i++){
    let a=pick(pool);
    let v;
    if(a.pct) v=Math.floor((3+ilvl*0.4)*R.mult/2);
    else if(a.big) v=Math.floor((10+ilvl*4)*R.mult);
    else if(a.mid) v=Math.floor((5+ilvl*2)*R.mult);
    else v=Math.max(1,Math.floor((1+ilvl*0.45)*R.mult));
    affixes.push({k:a.k,label:a.label,v,pct:a.pct});
  }
  let it={iid:_iid++,base:baseId,rar:rarityIdx,ilvl,mainVal,affixes,name:R.n+' '+base.n};
  if(rarityIdx>=3 && Math.random()<0.6){ it.passive=pick(PASSIVES).id; }
  return it;
}
function affixText(it){
  let parts=[`+${it.mainVal} ${STAT_INFO[ITEM_BASES[it.base].mainStat]?STAT_INFO[ITEM_BASES[it.base].mainStat].n:ITEM_BASES[it.base].mainStat}`];
  it.affixes.forEach(a=>parts.push(`+${a.v}${a.pct?'%':''} ${a.label}`));
  return parts.join(' · ');
}
function passiveText(it){ if(!it.passive)return ''; let p=PASSIVES.find(x=>x.id===it.passive); return p?`✦ ${p.n} — ${p.desc}`:''; }

   SAUVEGARDE

function save(){ try{ S.lastSave=Date.now(); localStorage.setItem(SAVE_KEY,JSON.stringify(S)); }catch(e){} }
function load(){ try{ let r=localStorage.getItem(SAVE_KEY); if(!r)return false; let d=JSON.parse(r);
  S=Object.assign(defaultState(),d); return true; }catch(e){ return false; } }

/* ===================================================================
   MOTEUR DE COMBAT
   =================================================================== */
let B=null;
function buildPartyCombatant(slot){
  if(slot==='hero'){
    let d=heroDerived();
    if(S.hpCur==null)S.hpCur=d.maxHp; if(S.manaCur==null)S.manaCur=d.maxMana;
    return {ref:'hero',isHero:true,name:S.name,ico:S.isNazgul?'☠️':RACES[S.race].ico,type:heroType(),
      get hp(){return S.hpCur;}, set hp(v){S.hpCur=clamp(v,0,d.maxHp);},
      get mana(){return S.manaCur;}, set mana(v){S.manaCur=clamp(v,0,d.maxMana);},
      maxHp:d.maxHp,maxMana:d.maxMana,d,spd:d.spd,statuses:[],alive:S.hpCur>0,
      moves:S.equippedTech.slice()};
  } else {
    let a=ALLY_BY_ID[slot]; let d=allyDerived(slot);
    let st={ref:slot,isHero:false,name:a.n,ico:a.ico,type:d.type,
      hp:d.maxHp,mana:d.maxMana,maxHp:d.maxHp,maxMana:d.maxMana,d:{atkP:d.atkP,atkM:d.atkM,crit:d.crit,lifesteal:0},
      spd:d.spd,statuses:[],alive:true,moves:d.moves};
    return st;
  }
}
function buildEnemies(zone,boss){
  let arr=[];
  if(boss){
    let bk=zone.boss; let bd=BOSSES[bk];
    let lv=zone.lvl+4;
    let hp=Math.floor(120+lv*30);
    arr.push({ref:'boss',name:bd.n,ico:bd.ico,type:bd.type,hp:hp,maxHp:hp,
      atk:Math.floor(10+lv*2.2),spd:96+lv,crit:0.1,statuses:[],alive:true,isBoss:true,lv});
  } else {
    let count=ri(1,Math.min(3,1+Math.floor(zone.lvl/8)+1));
    for(let i=0;i<count;i++){
      let mk=pick(zone.mobs); let m=MOBS[mk]; let lv=zone.lvl+ri(-1,2);
      let hp=Math.floor(38+lv*12);
      arr.push({ref:'e'+i,name:m.n,ico:m.ico,type:m.type,hp,maxHp:hp,
        atk:Math.floor(6+lv*1.7),spd:90+lv+ri(0,14),crit:0.06,statuses:[],alive:true,lv});
    }
  }
  return arr;
}
function startBattle(boss){
  let zone=ZONE_BY_ID[S.curZone];
  let party=S.party.map(buildPartyCombatant).filter(c=>c.alive||c.isHero);
  // assure héros vivant
  if(S.hpCur<=0){ S.hpCur=Math.max(1,Math.floor(heroDerived().maxHp*0.3)); }
  party=S.party.map(buildPartyCombatant);
  let enemies=buildEnemies(zone,boss);
  B={party,enemies,all:[],order:[],turnPtr:0,round:1,over:false,result:null,
     awaiting:false,menu:'root',curMember:null,target:null,boss:!!boss,log:[],timer:null,zone};
  // passif premiers soins
  party.forEach(p=>{ if(p.isHero){ for(let sl in S.equip){let it=S.equip[sl]; if(it&&it.passive==='p_firstaid')p.hp=Math.min(p.maxHp,p.hp+Math.floor(p.maxHp*0.05));} } });
  openBattle();
  buildOrder();
  logB(`⚔ ${boss?'BOSS — ':''}${enemies.map(e=>e.name).join(', ')} !`);
  scheduleTurn(650);
}
function buildOrder(){
  B.all=[...B.party,...B.enemies].filter(c=>c.alive);
  B.all.sort((a,b)=>(b.spd-a.spd)||(Math.random()-.5));
  B.order=B.all; B.turnPtr=0;
}
function aliveEnemies(){ return B.enemies.filter(e=>e.alive); }
function aliveParty(){ return B.party.filter(p=>p.alive); }
function scheduleTurn(d){ if(!B||B.over)return; if(B.timer)clearTimeout(B.timer); B.timer=setTimeout(nextTurn,d); }

function nextTurn(){
  if(!B||B.over)return;
  if(B.turnPtr>=B.order.length){ B.round++; buildOrder(); }
  if(B.order.length===0)return;
  let actor=B.order[B.turnPtr];
  if(!actor||!actor.alive){ B.turnPtr++; return nextTurn(); }
  let skip=startStatuses(actor);
  if(checkEnd())return;
  renderBattle();
  if(!actor.alive){ B.turnPtr++; if(!checkEnd())scheduleTurn(380); return; }
  if(skip){ logB(`${actor.ico} ${actor.name} est entravé !`); flyText(unitEl(actor),'Entravé','miss'); endTurn(620); return; }
  let isParty=B.party.includes(actor);
  if(isParty){
    B.curMember=actor; B.menu='root';
    if(!B.target||!B.target.alive)B.target=aliveEnemies()[0];
    if(S.autoBattle){ B.awaiting=false; renderDock(); B.timer=setTimeout(()=>autoAct(actor),420); }
    else { B.awaiting=true; renderDock(); }
  } else {
    B.awaiting=false; renderDock(); B.timer=setTimeout(()=>enemyAct(actor),440);
  }
}
function endTurn(d){ if(!B||B.over)return; B.turnPtr++; renderBattle(); if(checkEnd())return; scheduleTurn(d||420); }

function checkEnd(){
  if(!B||B.over)return true;
  if(aliveEnemies().length===0){ B.over=true; clearTimeout(B.timer); victory(); return true; }
  if(aliveParty().length===0){ B.over=true; clearTimeout(B.timer); defeat(); return true; }
  return false;
}

/* statuts */
function addStatus(c,id,turns){ let e=c.statuses.find(s=>s.id===id); if(e)e.turns=Math.max(e.turns,turns); else c.statuses.push({id,turns}); }
function hasStatus(c,id){ return c.statuses.some(s=>s.id===id); }
function startStatuses(actor){
  let skip=false;
  actor.statuses.forEach(s=>{ let d=STATUSES[s.id];
    if(d.dot){ let dmg=Math.max(1,Math.floor(actor.maxHp*d.dot)); actor.hp-=dmg; flyText(unitEl(actor),fmt(dmg),''); spawnBurst(unitEl(actor),d.el); }
    if(d.skip&&Math.random()<d.skip)skip=true;
  });
  if(actor.hp<=0)actor.alive=false;
  actor.statuses.forEach(s=>s.turns--); actor.statuses=actor.statuses.filter(s=>s.turns>0);
  return skip;
}

/* dégâts */
function dmgCalc(attacker,target,raw,type,opts){
  opts=opts||{};
  let eff=opts.ignoreType?1:typeMult(type,target.type);
  let d=raw*eff;
  if(hasStatus(target,'vuln'))d*=1.3;
  if(hasStatus(target,'garde'))d*=0.5;
  if(hasStatus(attacker,'benediction'))d*=1.3;
  // berserk passif (héros)
  if(attacker.isHero){ for(let sl in S.equip){let it=S.equip[sl]; if(it&&it.passive==='p_berserk'&&attacker.hp<attacker.maxHp*0.3)d*=1.2;} }
  let crit=Math.random()<(attacker.d?attacker.d.crit:attacker.crit||0.06);
  if(crit)d*=1.6;
  d=Math.max(1,Math.floor(d));
  // esquive (joueur cible)
  if(target.isHero){ let dg=heroDerived().dodge; if(Math.random()<dg){ return {dmg:0,eff,crit:false,dodged:true}; } }
  target.hp-=d; if(target.hp<=0)target.alive=false;
  // épines (cible héros)
  if(target.isHero){ for(let sl in S.equip){let it=S.equip[sl]; if(it&&it.passive==='p_thorns'){ let r=Math.floor(d*0.15); if(r>0&&attacker.alive){attacker.hp-=r; if(attacker.hp<=0)attacker.alive=false;} }} }
  return {dmg:d,eff,crit,dodged:false};
}

/* ACTIONS JOUEUR */
function canAct(){ return B&&!B.over&&B.awaiting&&B.curMember&&B.curMember.alive&&B.party.includes(B.curMember); }
window.cmdAttack=function(){ if(!canAct())return; doMove(B.curMember,TECH_BY_ID.ph1,B.target); };
window.cmdOpenTech=function(){ if(!canAct())return; B.menu='tech'; renderDock(); };
window.cmdOpenItems=function(){ if(!canAct())return; B.menu='items'; renderDock(); };
window.cmdDefend=function(){ if(!canAct())return; let m=B.curMember; addStatus(m,'garde',1); m.mana=Math.min(m.maxMana,m.mana+Math.ceil(m.maxMana*0.15)); m.hp=Math.min(m.maxHp,m.hp+Math.floor(m.maxHp*0.06)); logB(`${m.ico} ${m.name} se met en garde.`); spawnBurst(unitEl(m),'lumiere',true); finishMember(); };
window.cmdBack=function(){ B.menu='root'; renderDock(); };
window.cmdUseTech=function(id){ if(!canAct())return; let t=TECH_BY_ID[id]; let m=B.curMember;
  if((m.mana||0)<t.cost){ toast('🔮 Pas assez de mana !'); return; }
  let target=B.target; if(!target||!target.alive)target=aliveEnemies()[0];
  doMove(m,t,target); };
window.cmdSelectTarget=function(ref){ if(!B)return; let e=B.enemies.find(x=>x.ref===ref&&x.alive); if(e){B.target=e; renderEnemies();} };
window.cmdItem=function(kind){ if(!canAct())return; let m=B.curMember;
  if(kind==='potion'){ if(S.gold<0)return; let heal=Math.floor(m.maxHp*0.45); m.hp=Math.min(m.maxHp,m.hp+heal); flyText(unitEl(m),'+'+fmt(heal),'heal'); logB(`${m.name} boit une Potion (+${fmt(heal)} PV).`); }
  else if(kind==='ether'){ let mn=Math.floor(m.maxMana*0.5); m.mana=Math.min(m.maxMana,m.mana+mn); flyText(unitEl(m),'+'+fmt(mn),'mana'); logB(`${m.name} boit un Éther (+${fmt(mn)} mana).`); }
  finishMember(); };

function doMove(actor,t,target){
  B.awaiting=false;
  if(t.cost)actor.mana=Math.max(0,actor.mana-t.cost);
  let stat=t.stat==='force'?(actor.d.atkP):(actor.d.atkM);
  let type=t.type;
  if(t.kind==='heal'){
    let amt=Math.floor(stat*(t.pow)+actor.maxHp*0.05);
    let targets= t.target==='allyAll'?aliveParty():[lowestAlly()];
    targets.forEach(tt=>{ tt.hp=Math.min(tt.maxHp,tt.hp+amt); flyText(unitEl(tt),'+'+fmt(amt),'heal'); spawnBurst(unitEl(tt),'lumiere',true); });
    logB(`${actor.ico} ${actor.name} — ${t.n} : +${fmt(amt)} PV.`);
    sfx('heal');
  } else if(t.kind==='buff'){
    aliveParty().forEach(tt=>{ addStatus(tt,t.status,3); spawnBurst(unitEl(tt),'lumiere',true); });
    logB(`${actor.ico} ${actor.name} — ${t.n} : équipe bénie !`);
    sfx('magic');
  } else { // attack
    let targets= t.target==='all'?aliveEnemies():[target&&target.alive?target:aliveEnemies()[0]];
    let totalDealt=0;
    targets.forEach(tt=>{
      if(!tt)return;
      let raw=stat*t.pow;
      let r=dmgCalc(actor,tt,raw,type);
      if(r.dodged){ flyText(unitEl(tt),'Esquive','miss'); }
      else{
        flyText(unitEl(tt),fmt(r.dmg),r.crit?'crit':'');
        spawnAttackVfx(actor,tt,type,r.crit);
        totalDealt+=r.dmg;
        if(t.status&&Math.random()<0.3&&tt.alive){ addStatus(tt,t.status,t.status==='vuln'?2:3); logB(`→ ${tt.name} : ${STATUSES[t.status].n}`); }
      }
    });
    if(t.drain&&totalDealt>0){ let h=Math.floor(totalDealt*t.drain); actor.hp=Math.min(actor.maxHp,actor.hp+h); flyText(unitEl(actor),'+'+fmt(h),'heal'); }
    // lifesteal arme (héros)
    if(actor.isHero&&actor.d.lifesteal&&totalDealt>0){ let h=Math.floor(totalDealt*actor.d.lifesteal); if(h>0){actor.hp=Math.min(actor.maxHp,actor.hp+h); flyText(unitEl(actor),'+'+fmt(h),'heal');} }
    logB(`${actor.ico} ${actor.name} — ${t.n}${t.cost?` (${t.cost} mana)`:''} : ${fmt(totalDealt)} dégâts.`);
    sfx(t.type==='physique'?'hit':'magic');
  }
  // regain mana sur attaque de base
  if(!t.cost){ actor.mana=Math.min(actor.maxMana,actor.mana+Math.ceil(actor.maxMana*0.08)); }
  finishMember();
}
function lowestAlly(){ let a=aliveParty(); a.sort((x,y)=>(x.hp/x.maxHp)-(y.hp/y.maxHp)); return a[0]; }
function finishMember(){ B.menu='root'; renderBattle(); endTurn(420); }

/* IA équipe (auto) */
function autoAct(m){
  if(!B||B.over||!m.alive)return; B.awaiting=true;
  // soigne si un allié bas et tech de soin dispo
  let healTech=m.moves.map(id=>TECH_BY_ID[id]).find(t=>t&&t.kind==='heal'&&(m.mana||0)>=t.cost);
  let low=aliveParty().find(p=>p.hp<p.maxHp*0.4);
  if(healTech&&low){ doMove(m,healTech,null); return; }
  // meilleure attaque selon mana + type
  let target=aliveEnemies()[0]; if(!target){finishMember();return;}
  let opts=m.moves.map(id=>TECH_BY_ID[id]).filter(t=>t&&(t.kind==='attack')&&(m.mana||0)>=t.cost);
  let best=opts.sort((a,b)=>(b.pow*typeMult(b.type,target.type))-(a.pow*typeMult(a.type,target.type)))[0]||TECH_BY_ID.ph1;
  doMove(m,best,target);
}

/* IA ennemie */
function enemyAct(e){
  if(!B||B.over||!e.alive){ endTurn(360); return; }
  let targets=aliveParty(); if(targets.length===0){endTurn(360);return;}
  let target=pick(targets);
  let special=Math.random()<(e.isBoss?0.4:0.2);
  let raw=e.atk*(special?1.8:1);
  let r=dmgCalc(e,target,raw,e.type,{ignoreType:!special});
  if(r.dodged){ flyText(unitEl(target),'Esquive','miss'); logB(`${target.name} esquive ${e.name} !`); }
  else{
    flyText(unitEl(target),fmt(r.dmg),r.crit?'crit':'');
    spawnAttackVfx(e,target,e.type,r.crit||special);
    shake(unitEl(target),r.crit||special);
    logB(`${e.ico} ${e.name} ${special?'déchaîne':'frappe'} ${target.name} : ${fmt(r.dmg)}.`);
    if(special&&Math.random()<0.5&&TYPE_STATUS[e.type]&&target.alive){ addStatus(target,TYPE_STATUS[e.type],3); logB(`→ ${target.name} : ${STATUSES[TYPE_STATUS[e.type]].n}`); }
    sfx('ehit');
  }
  endTurn(440);
}

/* FIN DE COMBAT */
function victory(){
  let zone=B.zone; let boss=B.boss;
  // récompenses
  let lv=zone.lvl;
  let gold=Math.floor((boss?60:18)*(1+lv*0.5)*(Math.random()*0.4+0.8));
  let xp=Math.floor((boss?120:30)*Math.pow(1.18,lv-1));
  if(RACES[S.race].pid==='xp')xp=Math.floor(xp*1.12);
  let matG=ri(boss?8:1,boss?16:4);
  let essG=boss?ri(2,5):(Math.random()<0.4?1:0);
  S.gold+=gold; S.mat+=matG; S.ess+=essG; S.kills+=B.enemies.length;
  let drops=[];
  let drop=heroDerived().drop;
  let nDrops=boss?ri(2,3):(Math.random()<0.55*drop?1:0);
  for(let i=0;i<nDrops;i++){ let baseId=pick(zone.loot); let r=rollRarity(boss,drop); let it=genItem(baseId,r,lv+(boss?3:0)); S.inv.push(it); drops.push(it); }
  // level ups
  S.xp+=xp; let gained=0; while(S.xp>=xpNeeded(S.level)){ S.xp-=xpNeeded(S.level); S.level++; S.statPoints+=3; gained++; }
  // boss : clear + recrue + déblocage
  let recruitedMsg='';
  if(boss && !S.cleared.includes(zone.id)){
    S.cleared.push(zone.id);
    if(zone.recruit && !S.recruited.includes(zone.recruit)){ S.recruited.push(zone.recruit); S.allyLevels[zone.recruit]=S.level;
      if(S.party.length<3)S.party.push(zone.recruit);
      recruitedMsg=`${ALLY_BY_ID[zone.recruit].ico} ${ALLY_BY_ID[zone.recruit].n} rejoint ton équipe !`; }
    // déblocage zone suivante
    let idx=ZONES.findIndex(z=>z.id===zone.id); if(idx<ZONES.length-1)S.zoneIdx=Math.max(S.zoneIdx,idx+1);
  }
  if(S.hpCur<=0)S.hpCur=Math.floor(heroDerived().maxHp*0.5);
  save();
  showResult(true,{gold,xp,matG,essG,drops,gained,recruitedMsg,levelGain:gained});
}
function rollRarity(boss,drop){
  let r=Math.random()/ (drop>1? (1+ (drop-1)*0.4):1);
  let bias=boss?0.12:0;
  if(r<0.01+bias)return 5;
  if(r<0.05+bias)return 4;
  if(r<0.15+bias)return 3;
  if(r<0.35+bias)return 2;
  if(r<0.62)return 1;
  return 0;
}
function defeat(){
  let lost=Math.floor(S.gold*0.1); S.gold-=lost;
  S.hpCur=Math.floor(heroDerived().maxHp*0.5); S.manaCur=Math.floor(heroDerived().maxMana*0.5);
  save();
  showResult(false,{lost});
}

function flyText(el,txt,cls){
  let fx=$('#fx'); if(!el||!fx)return;
  let r=el.getBoundingClientRect(); let br=$('#battle').getBoundingClientRect();
  let d=ce('div','fnum '+(cls||''));

  d.style.top=(r.top-br.top+r.height*0.3)+'px';
  fx.appendChild(d); setTimeout(()=>d.remove(),1000);
}
function centerOf(el){ let br=$('#battle').getBoundingClientRect(); let r=el.getBoundingClientRect();
  return {x:r.left-br.left+r.width/2, y:r.top-br.top+r.height/2}; }
function spawnBurst(el,type,soft){
  let fx=$('#fx'); if(!el||!fx)return; let c=centerOf(el); let col=TYPES[type]?TYPES[type].col:'#fff';
  let b=ce('div','burst'); let sz=soft?70:110;
  b.style.width=sz+'px'; b.style.height=sz+'px'; b.style.left=c.x+'px'; b.style.top=c.y+'px';
  b.style.background=`radial-gradient(circle, ${col} 0%, transparent 70%)`;
  b.style.animation='burstOut .55s ease-out forwards';
  fx.appendChild(b); setTimeout(()=>b.remove(),560);
  // particules
  let n=soft?6:12;
  for(let i=0;i<n;i++){ let p=ce('div','particle'); let ang=Math.random()*Math.PI*2; let dist=rnd(20,70);
    let sp=rnd(4,9); p.style.width=sp+'px'; p.style.height=sp+'px'; p.style.background=col;
    p.style.left=c.x+'px'; p.style.top=c.y+'px';
    p.style.setProperty('--tx',Math.cos(ang)*dist+'px');
    p.animate([{transform:'translate(-50%,-50%)',opacity:1},{transform:`translate(${Math.cos(ang)*dist-50}%,${Math.sin(ang)*dist-50}%)`,opacity:0}],{duration:550,easing:'ease-out'});
    fx.appendChild(p); setTimeout(()=>p.remove(),560);
  }
}
function spawnSlash(el){ let fx=$('#fx'); if(!el||!fx)return; let c=centerOf(el);
  let s=ce('div','slashfx'); s.style.left=c.x+'px'; s.style.top=c.y+'px'; fx.appendChild(s); setTimeout(()=>s.remove(),320); }
function spawnProjectile(fromEl,toEl,type,then){
  let fx=$('#fx'); if(!fromEl||!toEl||!fx){ if(then)then(); return; }
  let a=centerOf(fromEl), b=centerOf(toEl); let col=TYPES[type]?TYPES[type].col:'#fff';
  let p=ce('div','projectile'); p.style.left=a.x+'px'; p.style.top=a.y+'px';
  p.style.background=`radial-gradient(circle, #fff, ${col} 55%, transparent 75%)`;
  p.style.boxShadow=`0 0 16px ${col}`;
  fx.appendChild(p);
  let t0=performance.now(), dur=240;
  function step(now){ let k=Math.min(1,(now-t0)/dur);
    p.style.left=(a.x+(b.x-a.x)*k)+'px'; p.style.top=(a.y+(b.y-a.y)*k)+'px';
    if(k<1)requestAnimationFrame(step); else { p.remove(); if(then)then(); } }
  requestAnimationFrame(step);
}
function spawnAttackVfx(attacker,target,type,big){
  let el=unitEl(target); if(!el)return;
  if(type==='physique'){ spawnSlash(el); shake(el,big); }
  else {
    let from=unitEl(attacker);
    spawnProjectile(from,el,type,()=>{ spawnBurst(el,type,false); shake(el,big); });
    if(!from){ spawnBurst(el,type,false); shake(el,big); }
  }
  if(big){ let f=$('#flash'); if(f){ f.style.opacity='.6'; setTimeout(()=>f.style.opacity='0',110);} bigShake(); }
}
function shake(el,big){ if(!el)return; el.classList.remove('shk','bigshk'); void el.offsetWidth; el.classList.add(big?'bigshk':'shk'); }
function bigShake(){ let b=$('#battle'); b.classList.remove('bigshk'); void b.offsetWidth; b.classList.add('bigshk'); setTimeout(()=>b.classList.remove('bigshk'),500); }

/* ===================================================================
   AUDIO (léger)
   =================================================================== */
let AC=null;
function ac(){ if(!AC){ try{ AC=new (window.AudioContext||window.webkitAudioContext)(); }catch(e){} } return AC; }
function beep(freq,dur,type,vol){ let a=ac(); if(!a)return; try{ let o=a.createOscillator(),g=a.createGain();
  o.type=type||'sine'; o.frequency.value=freq; g.gain.value=(vol||0.08); o.connect(g); g.connect(a.destination);
  g.gain.setValueAtTime(g.gain.value,a.currentTime); g.gain.exponentialRampToValueAtTime(0.0001,a.currentTime+(dur||0.15));
  o.start(); o.stop(a.currentTime+(dur||0.15)); }catch(e){} }
function sfx(k){
  switch(k){
    case'click':beep(420,0.06,'triangle',0.05);break;
    case'hit':beep(180,0.1,'square',0.07);break;
    case'ehit':beep(110,0.14,'sawtooth',0.07);break;
    case'magic':beep(660,0.18,'sine',0.06);setTimeout(()=>beep(880,0.14,'sine',0.05),60);break;
    case'heal':beep(720,0.16,'sine',0.06);setTimeout(()=>beep(960,0.18,'sine',0.05),70);break;
    case'win':[523,659,784,1046].forEach((f,i)=>setTimeout(()=>beep(f,0.2,'triangle',0.07),i*120));break;
    case'lose':[300,240,180].forEach((f,i)=>setTimeout(()=>beep(f,0.3,'sawtooth',0.06),i*150));break;
    case'level':[659,784,1046].forEach((f,i)=>setTimeout(()=>beep(f,0.18,'sine',0.07),i*90));break;
  }
}

   =================================================================== */
let bagFilter='all';
function renderBag(){
  let el=$('#screen-bag'); if(!el)return;
  let html=`<div class="panel-title">Sac & Équipement</div>`;
  // slots
  html+=`<div class="card"><div class="equip-grid">`;
  SLOTS.forEach(sl=>{ let it=S.equip[sl.id];
    html+=`<div class="eslot ${it?'filled rar-'+it.rar:''}" onclick="${it?`unequip('${sl.id}')`:''}">
      <div class="eslico">${it?ITEM_BASES[it.base].ico:sl.ico}</div>
      <div class="esllab">${sl.n}</div>
      <div class="eitem">${it?`<span class="iname rar-${it.rar}" style="color:inherit">${RARITIES[it.rar].n}</span>`:'<span style="color:var(--faint)">vide</span>'}</div>
    </div>`; });
  html+=`</div><div class="sub" style="text-align:center;font-size:11px">Touche un emplacement équipé pour le déséquiper.</div></div>`;
  // inventaire
  html+=`<div class="divider">Inventaire (${S.inv.length})</div>`;
  if(S.inv.length===0)html+=`<div class="empty-note">Ton sac est vide. Les ennemis et les boss laissent tomber de l'équipement — les zones avancées offrent les pièces les plus rares.</div>`;
  let sorted=S.inv.slice().sort((a,b)=>b.rar-a.rar||b.ilvl-a.ilvl);
  sorted.forEach(it=>{ let b=ITEM_BASES[it.base];
    html+=`<div class="inv-item rar-${it.rar}">
      <span class="iico">${b.ico}</span>
      <div class="imid">
        <div class="iname">${it.name} <span style="color:var(--faint);font-size:10px">i${it.ilvl}</span></div>
        <div class="iaff">${affixText(it)}</div>
        ${it.passive?`<div class="ipass">${passiveText(it)}</div>`:''}
      </div>
      <div style="display:flex;flex-direction:column;gap:4px">
        <button class="btn sm gold" onclick="equip(${it.iid})">Équiper</button>
        <button class="btn sm ghost" onclick="forgeItem(${it.iid})">⚒️ ${forgeCost(it)}</button>
        <button class="btn sm ghost" onclick="sellItem(${it.iid})">💰 ${fmt(sellPrice(it))}</button>
      </div>
    </div>`; });
  el.innerHTML=html;
}
function sellPrice(it){ return Math.floor((it.ilvl*4+10)*(it.rar+1)); }
function forgeCost(it){ return (8*(it.rar+1)*(it.ilvl||1)) + ' frag'; }
window.equip=function(iid){ let it=S.inv.find(x=>x.iid===iid); if(!it)return; let slot=ITEM_BASES[it.base].slot;
  let prev=S.equip[slot]; S.equip[slot]=it; S.inv=S.inv.filter(x=>x.iid!==iid); if(prev)S.inv.push(prev);
  S.hpCur=Math.min(S.hpCur,heroDerived().maxHp); sfx('click'); toast(`✓ ${it.name} équipé.`); renderBag(); renderTop(); save(); };
window.unequip=function(slot){ let it=S.equip[slot]; if(!it)return; S.equip[slot]=null; S.inv.push(it); sfx('click'); renderBag(); renderTop(); save(); };
window.sellItem=function(iid){ let it=S.inv.find(x=>x.iid===iid); if(!it)return; S.gold+=sellPrice(it); S.inv=S.inv.filter(x=>x.iid!==iid); sfx('click'); renderBag(); renderTop(); save(); };
window.forgeItem=function(iid){ let it=S.inv.find(x=>x.iid===iid); if(!it)return; let cost=8*(it.rar+1)*(it.ilvl||1);
  if(S.mat<cost){toast('⛏️ Pas assez de fragments.');return;}
  S.mat-=cost; it.ilvl+=1; it.mainVal=Math.floor(it.mainVal*1.12)+1; it.affixes.forEach(a=>a.v=Math.floor(a.v*1.12)+1);
  it.name=it.name.replace(/ \+\d+$/,'')+' +'+(it.ilvl);
  sfx('magic'); toast(`⚒️ ${it.name} amélioré !`); renderBag(); renderTop(); save(); };

/* ===================================================================
   ÉCRAN TECHNIQUES
   =================================================================== */
let techTab=null;
function renderTech(){
  let el=$('#screen-tech'); if(!el)return;
  let trees=RACES[S.race].trees.slice(); if(S.isNazgul&&!trees.includes('tenebres'))trees.push('tenebres'); trees.push('physique');
  trees=[...new Set(trees)];
  if(!techTab||!trees.includes(techTab))techTab=trees[0];
  let html=`<div class="panel-title">Grimoire de ${RACES[S.race].n}</div>
    <div class="sub" style="text-align:center;margin-bottom:6px">Apprends des techniques (💎 essence). Équipe-en jusqu'à 6 pour le combat.</div>
    <div style="text-align:center;margin-bottom:10px;font-size:12px">Équipées : <b style="color:var(--ember-bright)">${S.equippedTech.length}/6</b> · Essence : 💎 ${fmt(S.ess)}</div>`;
  // onglets d'arbre
  html+=`<div style="display:flex;gap:6px;flex-wrap:wrap;justify-content:center;margin-bottom:12px">`;
  trees.forEach(t=>{ html+=`<button class="btn sm ${techTab===t?'gold':'ghost'}" onclick="setTechTab('${t}')">${TYPES[t].ico} ${TYPES[t].n}</button>`; });
  html+=`</div>`;
  let list=TECH.filter(t=>t.type===techTab && (!t.nazgul||S.isNazgul));
  list.forEach(t=>{
    let learned=S.learned.includes(t.id);
    let equipped=S.equippedTech.includes(t.id);
    let canLearn=S.level>=t.lvl;
    let cost=techCost(t);
    let cls=equipped?'equipped':learned?'learned':canLearn?'':'locked';
    html+=`<div class="tech-card ${cls}">
      <span class="tcico">${t.ico}</span>
      <div class="tcmid">
        <div class="tcname">${t.n} ${tchip(t.type)}</div>
        <div class="tcmeta">${t.desc} · ${t.cost?t.cost+' mana':'sans mana'} · ${t.target==='all'?'tous':t.target==='allyAll'?'équipe':'cible'}</div>
        <div class="tcmeta" style="color:var(--faint)">Requiert niv. ${t.lvl}</div>
      </div>
      <div style="display:flex;flex-direction:column;gap:4px">
        ${learned
          ? (equipped?`<button class="btn sm ghost" onclick="unequipTech('${t.id}')">Retirer</button>`:`<button class="btn sm gold" onclick="equipTech('${t.id}')">Équiper</button>`)
          : `<button class="btn sm ${canLearn&&S.ess>=cost?'gold':'ghost'}" onclick="learnTech('${t.id}')" ${canLearn&&S.ess>=cost?'':'disabled'}>Apprendre 💎${cost}</button>`}
      </div>
    </div>`;
  });
  el.innerHTML=html;
}
function techCost(t){ return Math.max(1,Math.floor(t.lvl*0.8)+ (t.cost?Math.floor(t.cost/6):0)); }
window.setTechTab=function(t){ techTab=t; sfx('click'); renderTech(); };
window.learnTech=function(id){ let t=TECH_BY_ID[id]; if(S.level<t.lvl){toast('Niveau requis non atteint.');return;}
  let cost=techCost(t); if(S.ess<cost){toast('💎 Pas assez d\'essence.');return;}
  S.ess-=cost; S.learned.push(id); sfx('level'); toast(`📖 ${t.n} apprise !`); renderTech(); renderTop(); save(); };
window.equipTech=function(id){ if(S.equippedTech.length>=6){toast('6 techniques max équipées.');return;} if(!S.equippedTech.includes(id))S.equippedTech.push(id); sfx('click'); renderTech(); save(); };
window.unequipTech=function(id){ if(S.equippedTech.length<=1){toast('Garde au moins une technique.');return;} S.equippedTech=S.equippedTech.filter(x=>x!==id); sfx('click'); renderTech(); save(); };

/* ===================================================================
   ÉCRAN HÉROS (stats + allocation + corruption)
   =================================================================== */
function renderHeroScreen(){
  let el=$('#screen-hero'); if(!el)return;
  let d=heroDerived(); let race=RACES[S.race];
  let html=`<div class="panel-title">${S.isNazgul?'☠️ '+S.name:S.name}</div>
    <div class="sub" style="text-align:center">${race.ico} ${race.n} · Niveau ${S.level}</div>
    <div class="card" style="margin-top:10px">
      <div class="pnum" style="font-size:11px;color:var(--muted);display:flex;justify-content:space-between"><span>XP</span><span>${fmt(S.xp)} / ${fmt(xpNeeded(S.level))}</span></div>
      <div class="bar xp"><i style="width:${Math.min(100,S.xp/xpNeeded(S.level)*100)}%"></i></div>
      <div style="text-align:center;margin-top:8px;font-size:12px;color:var(--spectral)">✦ ${race.passive}</div>
    </div>`;
  // allocation
  html+=`<div class="card">
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:6px">
      <span class="cz" style="font-size:14px;color:var(--ember-bright)">Caractéristiques</span>
      <span style="font-size:12px;color:var(--muted)">Points : <b style="color:var(--ember-bright)">${S.statPoints}</b></span>
    </div>`;
  STAT_KEYS.forEach(k=>{ let info=STAT_INFO[k];
    html+=`<div class="stat-row">
      <div style="flex:1"><div class="sname">${info.ico} ${info.n}</div><div class="sdesc">${info.d}</div></div>
      <div class="sval">${totalStat(k)}</div>
      <button class="plusbtn" onclick="allocStat('${k}')" ${S.statPoints<=0?'disabled':''}>+</button>
    </div>`; });
  html+=`</div>`;
  // derived
  html+=`<div class="card">
    <div class="kv"><span class="k">⚔️ Attaque physique</span><span class="v">${fmt(d.atkP)}</span></div>
    <div class="kv"><span class="k">🔮 Attaque magique</span><span class="v">${fmt(d.atkM)}</span></div>
    <div class="kv"><span class="k">❤️ PV max</span><span class="v">${fmt(d.maxHp)}</span></div>
    <div class="kv"><span class="k">💧 Mana max</span><span class="v">${fmt(d.maxMana)}</span></div>
    <div class="kv"><span class="k">🪶 Vitesse</span><span class="v">${d.spd}</span></div>
    <div class="kv"><span class="k">🎯 Critique</span><span class="v">${Math.round(d.crit*100)}%</span></div>
    <div class="kv"><span class="k">💨 Esquive</span><span class="v">${Math.round(d.dodge*100)}%</span></div>
    <div class="kv"><span class="k">🍀 Bonus butin</span><span class="v">+${Math.round((d.drop-1)*100)}%</span></div>
  </div>`;
  // corruption
  html+=`<div class="card">
    <div class="cz" style="font-size:13px;color:var(--arcane-bright);margin-bottom:6px">🌑 Corruption</div>
    <div class="bar" style="background:#000"><i style="width:${S.corruption}%;background:linear-gradient(90deg,var(--arcane),var(--blood))"></i></div>
    <div class="sub" style="font-size:11px;margin-top:6px">${S.isNazgul?'Tu as succombé à l\'Ombre. L\'arbre des Ténèbres est ouvert.':'La corruption monte en utilisant les Ténèbres. À 100%, tu deviens un Nazgûl.'}</div>
    ${S.isNazgul?'':`<button class="btn sm ghost block" style="margin-top:8px" onclick="purify()">✨ Purifier (-20%, 30 essence)</button>`}
  </div>`;
  html+=`<button class="btn ghost block" onclick="hardReset()" style="margin-top:6px;opacity:.6">↺ Nouvelle partie</button>`;
  el.innerHTML=html;
}
window.allocStat=function(k){ if(S.statPoints<=0)return; S.statPoints--; S.alloc[k]=(S.alloc[k]||0)+1;
  S.hpCur=Math.min(S.hpCur==null?1e9:S.hpCur,heroDerived().maxHp); sfx('click'); renderHeroScreen(); renderTop(); save(); };
window.purify=function(){ if(S.ess<30){toast('Pas assez d\'essence.');return;} S.ess-=30; S.corruption=Math.max(0,S.corruption-20); sfx('heal'); renderHeroScreen(); renderTop(); save(); };
window.hardReset=function(){ if(confirm('Effacer la sauvegarde et recommencer ?')){ localStorage.removeItem(SAVE_KEY); location.reload(); } };

/* corruption gain quand on lance une tech ténèbres (héros) */
function addCorruption(n){ if(S.isNazgul)return; S.corruption=clamp(S.corruption+n,0,100); if(S.corruption>=100)becomeNazgul(); }
function becomeNazgul(){ S.isNazgul=true; document.body.classList.add('nazgul'); toast('☠️ L\'Ombre t\'a consumé… Tu deviens un Nazgûl !'); sfx('lose'); save(); }

/* ===================================================================
   BARRE DU HAUT
   =================================================================== */
function renderTop(){
  $('#rGold').textContent=fmt(S.gold);
  $('#rEss').textContent=fmt(S.ess);
  $('#rMat').textContent=fmt(S.mat);
  $('#regionPill').textContent=ZONE_BY_ID[S.curZone]?ZONE_BY_ID[S.curZone].n:'—';
  $('#corrBar').style.width=S.corruption+'%';
}

/* ===================================================================
   ÉCRAN TITRE / CRÉATION
   =================================================================== */
let mkName='', mkRace='humain';
function renderTitle(){
  let t=$('#title');
  t.innerHTML=`<h1>L'Ascension<br>de l'Ombre</h1>
    <div class="tsub">un voyage à travers les Terres du Milieu</div>
    <div style="width:100%;max-width:380px;margin-top:10px">
      <div class="cz" style="font-size:12px;color:var(--muted);text-align:left;margin-bottom:4px">Ton nom</div>
      <input class="field-input" id="mkNameInput" maxlength="14" placeholder="Voyageur" value="${mkName}">
      <div class="cz" style="font-size:12px;color:var(--muted);text-align:left;margin:14px 0 4px">Ta lignée</div>
      <div class="choice-grid" id="raceGrid">
        ${Object.entries(RACES).map(([k,r])=>`<div class="choice ${mkRace===k?'sel':''}" data-race="${k}">
          <div class="cico">${r.ico}</div><div class="cname">${r.n}</div>
          <div class="cdesc">${r.passive}<br><span style="color:var(--spectral)">${r.trees.map(tt=>TYPES[tt].ico).join(' ')}</span></div></div>`).join('')}
      </div>
      <button class="btn gold block" style="margin-top:18px;padding:14px" id="startBtn">Commencer l'aventure ▸</button>
    </div>`;
  t.querySelector('#mkNameInput').addEventListener('input',e=>mkName=e.target.value);
  t.querySelectorAll('.choice').forEach(c=>c.addEventListener('click',()=>{ mkRace=c.dataset.race; ac();
    t.querySelectorAll('.choice').forEach(x=>x.classList.remove('sel')); c.classList.add('sel'); sfx('click'); }));
  t.querySelector('#startBtn').addEventListener('click',()=>{ ac(); startNewGame(); });
}
function startNewGame(){
  S=defaultState();
  S.name=(mkName||'Voyageur').trim().slice(0,14)||'Voyageur';
  S.race=mkRace; S.created=true;
  // tech de départ selon race (1ère du 1er arbre + taillade)
  let firstTree=RACES[S.race].trees[0];
  let starter=TECH.find(t=>t.type===firstTree&&t.lvl<=2);
  S.learned=['ph1']; S.equippedTech=['ph1'];
  if(starter){ S.learned.push(starter.id); S.equippedTech.push(starter.id); }
  let d=heroDerived(); S.hpCur=d.maxHp; S.manaCur=d.maxMana;
  save();
  $('#title').classList.add('hidden');
  openScreen('map'); renderTop();
  toast(`Bienvenue, ${S.name} le ${RACES[S.race].n}. Ton voyage commence.`);
}

/* ===================================================================
   BOUCLE LÉGÈRE (autosave + régén carte)
   =================================================================== */
let lastT=Date.now();
setInterval(()=>{
  if(!S||!S.created)return;
  let now=Date.now(),dt=(now-lastT)/1000; lastT=now;
  // régén hors combat
  if(!$('#battle').classList.contains('on')){ let d=heroDerived();
    if(S.hpCur<d.maxHp)S.hpCur=Math.min(d.maxHp,S.hpCur+d.maxHp*0.02*dt);
    if(S.manaCur<d.maxMana)S.manaCur=Math.min(d.maxMana,S.manaCur+d.maxMana*0.04*dt);
  }
},1000);
setInterval(()=>{ if(S&&S.created)save(); },15000);

/* corruption : intercepter l'usage des ténèbres pour la faire monter */
const _doMove=doMove;
doMove=function(actor,t,target){ if(actor&&actor.isHero&&t&&t.type==='tenebres'&&!S.isNazgul){ addCorruption(2); } return _doMove(actor,t,target); };

/* ===================================================================
   INIT
   =================================================================== */
(function init(){
  let loaded=load();
  if(loaded&&S.created){
    if(S.isNazgul)document.body.classList.add('nazgul');
    $('#title').classList.add('hidden');
    let d=heroDerived(); if(S.hpCur==null)S.hpCur=d.maxHp; if(S.manaCur==null)S.manaCur=d.maxMana;
    openScreen('map'); renderTop();
  } else {
    renderTitle();
  }
})();

/* clavier (desktop) : actions de combat */
window.addEventListener('keydown',e=>{
  if(!B||B.over||!B.awaiting)return;
  let cur=B.curMember; if(!cur||!B.party.includes(cur))return;
  if(S.autoBattle)return;
  let k=e.key.toLowerCase();
  if(B.menu==='root'){
    if(k==='a'){cmdAttack();} else if(k==='t'){cmdOpenTech();} else if(k==='d'){cmdDefend();} else if(k==='o'){cmdOpenItems();}
  } else if(e.key==='Escape'){ cmdBack(); }
  else if(B.menu==='tech'){ let n=parseInt(k); if(n>=1&&n<=cur.moves.length){ cmdUseTech(cur.moves[n-1]); } }
});
</script>
</body>
</html>
