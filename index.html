<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>L'Ascension de l'Ombre — Idle</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@500;600;700;900&family=Spectral:ital,wght@0,300;0,400;0,500;0,600;1,400&display=swap" rel="stylesheet">
<style>
/* ============ THEME TOKENS (LOTR / FANTASY VIBE) ============ */
:root {
  --bg: #0c0a08;
  --bg-parchment: linear-gradient(to bottom, #1a1612, #0f0d0b);
  --panel: #1e1814;
  --panel2: #14100c;
  --line: rgba(212, 175, 55, 0.3);
  --line2: rgba(212, 175, 55, 0.6);
  --gold: #d4af37;
  --gold-bright: #f9df8a;
  --teal: #5a9e8f;
  --teal-soft: #8ecfc0;
  --text: #e6dac3;
  --muted: #a3947c;
  --danger: #b22222;
  --good: #5a9e8f;
  --hp: #4b8b3b;
  --hp2: #2d5a21;
  --xp: #4a7599;
  --shadow: 0 8px 30px rgba(0,0,0,.8);
  --glow: rgba(212, 175, 55, 0.35);
}

/* Nazgûl mode overrides */
body.nazgul {
  --bg: #050505;
  --bg-parchment: linear-gradient(to bottom, #110000, #000000);
  --panel: #1a0505;
  --panel2: #0f0000;
  --line: rgba(180, 40, 40, 0.4);
  --line2: rgba(220, 50, 50, 0.7);
  --gold: #c23b3b;
  --gold-bright: #e86464;
  --text: #d4b8b8;
  --muted: #8a6363;
  --glow: rgba(200, 40, 40, 0.5);
}

* { box-sizing: border-box; margin: 0; padding: 0; }
html, body { height: 100%; }
body {
  background: var(--bg);
  background-image: radial-gradient(circle at center, transparent 0%, rgba(0,0,0,0.6) 100%);
  color: var(--text);
  font-family: 'Spectral', Georgia, serif;
  overflow: hidden;
  transition: background 0.8s ease;
  -webkit-tap-highlight-color: transparent;
}
h1, h2, h3, .cinzel, .btn, .tabbtn, .statval, .bignum { font-family: 'Cinzel', serif; }

#bgcanvas { position: fixed; inset: 0; z-index: 0; display: block; opacity: 0.1; }
#particles { position: fixed; inset: 0; z-index: 5; pointer-events: none; }
#flash { position: fixed; inset: 0; z-index: 40; pointer-events: none; opacity: 0; background: #fff; transition: opacity .12s; }

/* ============ LAYOUT ============ */
#app { position: relative; z-index: 10; height: 100%; display: flex; flex-direction: column; max-width: 1180px; margin: 0 auto; }

/* Top bar */
#topbar {
  display: flex; align-items: center; gap: 12px; padding: 12px 16px;
  background: var(--bg-parchment);
  border-bottom: 2px ridge var(--line);
  box-shadow: 0 4px 15px rgba(0,0,0,0.6);
  flex-wrap: wrap;
}
#gametitle { font-size: 19px; letter-spacing: 1px; color: var(--gold-bright); text-shadow: 0 0 10px var(--glow); font-weight: 700; }
.res { display: flex; align-items: center; gap: 6px; font-size: 14px; padding: 4px 12px; border: 1px solid var(--line); border-radius: 4px; background: var(--panel2); box-shadow: inset 0 0 10px rgba(0,0,0,0.5); white-space: nowrap; }
.res .val { font-family: 'Cinzel'; font-weight: 600; color: var(--gold-bright); }
.res.essence .val { color: var(--teal-soft); }
.res.legacy .val { color: #c9a0ff; }
.spacer { flex: 1; }

.control-btn { cursor: pointer; border: 1px solid var(--line); background: var(--panel2); color: var(--text); border-radius: 4px; padding: 6px 12px; font-size: 14px; font-family: 'Cinzel'; font-weight: bold; transition: 0.2s; box-shadow: inset 0 0 5px rgba(0,0,0,0.5); }
.control-btn:hover { border-color: var(--gold); text-shadow: 0 0 5px var(--glow); }

/* Hero header */
#heroband { display: flex; align-items: center; gap: 16px; padding: 12px 16px; border-bottom: 1px solid var(--line); background: rgba(20, 15, 10, 0.8); flex-wrap: wrap; }
#heroname { font-family: 'Cinzel'; font-weight: 700; font-size: 18px; color: var(--gold-bright); text-shadow: 0 0 5px #000; }
.htag { font-size: 12px; color: var(--muted); border: 1px solid var(--line); border-radius: 3px; padding: 3px 8px; background: rgba(0,0,0,0.3); }
.htag.ps { color: var(--teal-soft); border-color: var(--teal); }
.barwrap { flex: 1; min-width: 200px; }
.barlabel { display: flex; justify-content: space-between; font-size: 12px; color: var(--muted); margin-bottom: 4px; letter-spacing: 1px; font-family: 'Cinzel'; }
.bar { height: 16px; border-radius: 3px; background: #000; overflow: hidden; position: relative; border: 1px solid var(--line); box-shadow: inset 0 0 8px rgba(0,0,0,0.8); }
.bar > i { display: block; height: 100%; width: 0; transition: width .25s ease; }
.bar.xp > i { background: linear-gradient(90deg, #1c3d5a, var(--xp)); }
.shimmer::after { content: ''; position: absolute; inset: 0; background: linear-gradient(110deg, transparent 30%, rgba(255,255,255,.2) 50%, transparent 70%); transform: translateX(-100%); animation: shim 2.4s linear infinite; }
@keyframes shim { to { transform: translateX(100%); } }

/* Tabs */
#tabs { display: flex; gap: 6px; padding: 10px 16px 0; overflow-x: auto; background: var(--bg-parchment); scrollbar-width: none; border-bottom: 2px solid var(--line); }
#tabs::-webkit-scrollbar { display: none; }
.tabbtn { flex: 0 0 auto; cursor: pointer; border: 1px solid var(--line); border-bottom: none; background: var(--panel2); color: var(--muted); padding: 10px 20px; border-radius: 6px 6px 0 0; font-size: 14px; font-weight: 700; position: relative; transition: .2s; }
.tabbtn:hover { color: var(--gold-bright); background: var(--panel); }
.tabbtn.active { background: var(--panel); color: var(--gold-bright); border-color: var(--gold); border-width: 2px; border-bottom: 2px solid var(--panel); margin-bottom: -2px; text-shadow: 0 0 8px var(--glow); }

/* Content */
#content { flex: 1; overflow-y: auto; padding: 20px; scrollbar-width: thin; scrollbar-color: var(--gold) #000; }
.panel { display: none; }
.panel.active { display: block; animation: fadein .35s ease; }
@keyframes fadein { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: none; } }

.card { background: var(--bg-parchment); border: 2px ridge var(--line); border-radius: 6px; padding: 20px; margin-bottom: 16px; box-shadow: var(--shadow); position: relative; overflow: hidden; }
.card::before { content: ''; position: absolute; top: 0; left: 0; right: 0; height: 1px; background: linear-gradient(90deg, transparent, var(--gold), transparent); opacity: 0.5; }
.card h3 { font-size: 18px; letter-spacing: 2px; color: var(--gold-bright); margin-bottom: 14px; text-shadow: 0 2px 4px #000; border-bottom: 1px solid var(--line); padding-bottom: 8px; }
.sub { color: var(--muted); font-size: 14px; margin-bottom: 14px; line-height: 1.5; font-style: italic; }

/* Grids */
.grid { display: grid; gap: 12px; }
.g2 { grid-template-columns: repeat(2, 1fr); }
.g3 { grid-template-columns: repeat(3, 1fr); }
.g4 { grid-template-columns: repeat(4, 1fr); }

/* Stat boxes */
.statbox { background: rgba(0,0,0,0.4); border: 1px solid var(--line); border-radius: 4px; padding: 14px; text-align: center; box-shadow: inset 0 0 15px rgba(0,0,0,0.8); }
.statbox .lab { font-size: 12px; color: var(--muted); letter-spacing: 1px; text-transform: uppercase; }
.statbox .statval { font-size: 26px; color: var(--gold-bright); font-weight: 700; margin-top: 6px; text-shadow: 0 0 8px var(--glow); }

/* Buttons */
.btn { cursor: pointer; border: 2px solid var(--line2); background: linear-gradient(180deg, #33281b, #1a140e); color: var(--gold-bright); border-radius: 4px; padding: 12px 16px; font-size: 14px; text-transform: uppercase; letter-spacing: 1px; transition: .2s; width: 100%; box-shadow: 0 4px 6px rgba(0,0,0,0.6); }
.btn:hover { background: linear-gradient(180deg, #443524, #2b2117); border-color: var(--gold); box-shadow: 0 0 15px var(--glow); transform: translateY(-1px); }
.btn:active { transform: translateY(2px); box-shadow: none; }
.btn:disabled { opacity: 0.5; cursor: not-allowed; filter: grayscale(1); box-shadow: none; border-color: var(--line); color: var(--muted); }
.btn.small { padding: 8px 12px; font-size: 12px; }

/* Buy rows */
.buyrow { display: flex; align-items: center; justify-content: space-between; gap: 14px; background: rgba(0,0,0,0.3); border: 1px solid var(--line); border-radius: 6px; padding: 12px 16px; margin-bottom: 10px; transition: 0.2s; }
.buyrow:hover { background: rgba(212, 175, 55, 0.05); border-color: var(--line2); }
.buyrow .info { flex: 1; min-width: 0; }
.buyrow .nm { font-family: 'Cinzel'; font-weight: 700; font-size: 15px; color: var(--text); text-shadow: 0 1px 2px #000; }
.buyrow .ds { font-size: 13px; color: var(--muted); margin-top: 4px; line-height: 1.4; }
.buyrow .lvl { font-size: 12px; color: var(--teal-soft); margin-top: 4px; font-family: 'Cinzel'; }
.buyrow .act { flex: 0 0 auto; width: 160px; }

/* Combat */
.combatface { display: flex; justify-content: space-between; align-items: center; gap: 20px; margin-bottom: 20px; padding: 10px; background: rgba(0,0,0,0.2); border-radius: 8px; border: 1px solid rgba(255,255,255,0.05); }
.fighter { text-align: center; flex: 1; }
.fighter .av { font-size: 54px; filter: drop-shadow(0 0 15px var(--glow)); margin-bottom: 8px; }
.fighter .nm { font-family: 'Cinzel'; font-size: 16px; color: var(--gold-bright); text-shadow: 0 2px 4px #000; margin-bottom: 8px; }
.vs { font-family: 'Cinzel'; color: var(--danger); font-size: 24px; font-weight: bold; text-shadow: 0 0 10px rgba(178,34,34,0.8); }
.enemyhp > i { background: linear-gradient(90deg, #5c1e1e, var(--danger)); }
.herohp > i { background: linear-gradient(90deg, var(--hp2), var(--hp)); }

/* Equipment / Drops */
.slot { background: rgba(0,0,0,0.4); border: 1px solid var(--line); border-radius: 6px; padding: 14px; position: relative; box-shadow: inset 0 0 10px rgba(0,0,0,0.6); display: flex; flex-direction: column; justify-content: center; align-items: center; text-align: center;}
.slot .icon { font-size: 32px; margin-bottom: 8px; filter: drop-shadow(0 0 8px rgba(255,255,255,0.2)); }
.slot .sname { font-family: 'Cinzel'; font-size: 15px; color: var(--text); margin-bottom: 4px; }
.slot .rar { font-size: 12px; font-weight: bold; letter-spacing: 1px; font-family: 'Cinzel'; margin-bottom: 4px; text-transform: uppercase; }
.slot .stat { font-size: 13px; color: var(--gold-bright); }
.r-common{color:#b9c2d0; text-shadow: 0 0 5px rgba(185,194,208,0.5);}
.r-uncommon{color:#6fd17a; text-shadow: 0 0 5px rgba(111,209,122,0.5);}
.r-rare{color:#5fa8e0; text-shadow: 0 0 5px rgba(95,168,224,0.5);}
.r-epic{color:#b06fe0; text-shadow: 0 0 5px rgba(176,111,224,0.5);}
.r-legendary{color:#e8c170; text-shadow: 0 0 5px rgba(232,193,112,0.8);}
.r-mythic{color:#ff6b88; text-shadow: 0 0 8px rgba(255,107,136,0.8);}

/* Drops log */
#droplog { margin-top: 10px; height: 100px; overflow-y: auto; background: rgba(0,0,0,0.5); border: 1px solid var(--line); border-radius: 4px; padding: 8px; font-size: 13px; color: var(--muted); scrollbar-width: none; }
#droplog div { margin-bottom: 4px; animation: fadein 0.3s; }

/* Karma meter */
.karmabar { height: 12px; border-radius: 2px; overflow: hidden; background: #000; border: 1px solid var(--line); position: relative; margin: 8px 0; }
.karmabar > i { position: absolute; top: 0; bottom: 0; width: 4px; background: #fff; box-shadow: 0 0 10px #fff; transition: left .3s; }
.corrbar > i { background: linear-gradient(90deg, #5a2a7a, #9d62d6, #d94f63); box-shadow: 0 0 10px var(--danger); width: 100%; transform-origin: left;}

/* Start screen */
#start { position: fixed; inset: 0; z-index: 80; background: radial-gradient(circle at center, #261f18 0%, #000 100%); display: flex; align-items: center; justify-content: center; padding: 20px; overflow-y: auto; }
#start .inner { max-width: 700px; width: 100%; text-align: center; background: rgba(15, 12, 10, 0.9); padding: 40px; border: 2px ridge var(--gold); border-radius: 8px; box-shadow: 0 0 50px rgba(0,0,0,0.9); }
#start h1 { font-size: 36px; color: var(--gold-bright); text-shadow: 0 0 20px var(--glow), 0 5px 10px #000; letter-spacing: 3px; margin-bottom: 10px; }
#start .tag { color: var(--muted); font-style: italic; margin-bottom: 30px; font-size: 16px; }
#start .step { font-size: 14px; color: var(--gold); letter-spacing: 2px; text-transform: uppercase; margin: 24px 0 12px; border-bottom: 1px solid var(--line); padding-bottom: 5px; display: inline-block;}
.choice { cursor: pointer; border: 1px solid var(--line); background: rgba(0,0,0,0.5); border-radius: 4px; padding: 16px; text-align: left; transition: .2s; }
.choice:hover { border-color: var(--gold-bright); box-shadow: inset 0 0 15px rgba(212,175,55,0.2); }
.choice.sel { border-color: var(--gold); box-shadow: 0 0 15px var(--glow) inset; background: rgba(212, 175, 55, 0.1); }
.choice .ct { font-family: 'Cinzel'; font-weight: bold; font-size: 16px; color: var(--gold-bright); display: flex; align-items: center; gap: 10px; }
.choice .cd { font-size: 13px; color: var(--text); margin-top: 6px; line-height: 1.5; }
#start input { width: 100%; max-width: 300px; background: rgba(0,0,0,0.6); border: 1px solid var(--gold); border-radius: 4px; padding: 12px; color: var(--gold-bright); font-family: 'Cinzel'; font-size: 18px; text-align: center; margin: 10px auto; display: block; box-shadow: inset 0 0 10px #000; }
#start input:focus { outline: none; border-color: #fff; box-shadow: 0 0 15px var(--glow); }

/* Floating combat text & Toasts */
.float { position: fixed; z-index: 50; font-family: 'Cinzel'; font-weight: 900; font-size: 20px; pointer-events: none; text-shadow: 2px 2px 0 #000, -1px -1px 0 #000, 0 0 10px rgba(0,0,0,0.8); animation: floatup 1s ease-out forwards; }
@keyframes floatup { 0% { opacity: 1; transform: translateY(0) scale(0.8); } 20% { transform: translateY(-10px) scale(1.2); } 100% { opacity: 0; transform: translateY(-60px) scale(1); } }
#toasts { position: fixed; top: 80px; right: 20px; z-index: 70; display: flex; flex-direction: column; gap: 10px; align-items: flex-end; pointer-events: none; }
.toast { background: var(--bg-parchment); border: 1px solid var(--gold); border-radius: 4px; padding: 12px 20px; font-size: 14px; font-family: 'Cinzel'; font-weight: bold; box-shadow: 0 4px 15px rgba(0,0,0,0.8); animation: toastin 0.4s ease, toastout 0.4s ease 3s forwards; color: var(--gold-bright); }
@keyframes toastin { from { opacity: 0; transform: translateX(20px); } to { opacity: 1; transform: none; } }
@keyframes toastout { to { opacity: 0; transform: translateX(20px); } }
</style>
</head>
<body>

<!-- API YouTube Audio Cachée -->
<div id="ytplayer" style="position:absolute; width:1px; height:1px; top:-1000px; left:-1000px;"></div>

<canvas id="bgcanvas"></canvas>
<canvas id="particles"></canvas>
<div id="flash"></div>

<!-- ============ START ============ -->
<div id="start">
  <div class="inner">
    <h1>L'ASCENSION DE L'OMBRE</h1>
    <div class="tag">Un héros forgé pour la lumière… ou consumé par les Ténèbres.</div>

    <div class="step">I · Ton nom</div>
    <input id="nameInput" maxlength="18" placeholder="Nomme ton héros" value="">

    <div class="step">II · Ta race</div>
    <div class="grid g2" id="raceGrid"></div>

    <div class="step">III · Ta classe</div>
    <div class="grid g2" id="classGrid"></div>

    <button class="btn" id="beginBtn" disabled style="margin-top:30px; font-size:18px; padding:16px;">Entrer dans la Terre du Milieu</button>
  </div>
</div>

<!-- ============ APP ============ -->
<div id="app" style="display:none">
  <div id="topbar">
    <span id="gametitle">⚔ L'Ascension de l'Ombre</span>
    <div class="res gold"><span class="ico">🪙</span><span class="val" id="rGold">0</span></div>
    <div class="res essence"><span class="ico">✦</span><span class="val" id="rEssence">0</span></div>
    <div class="res"><span class="ico">🏆</span><span class="val" id="rGlory">0</span></div>
    <div class="res legacy"><span class="ico">🜲</span><span class="val" id="rLegacy">0</span></div>
    <span class="spacer"></span>
    <button id="buyMultBtn" class="control-btn" onclick="toggleBuyAmount()">Achat: x1</button>
    <button id="muteBtn" class="control-btn" onclick="toggleMute()">🔊 Son: ON</button>
  </div>

  <div id="heroband">
    <div>
      <div id="heroname">Héros</div>
      <div style="margin-top:6px; display:flex; gap:8px; flex-wrap:wrap">
        <span class="htag" id="tagRace">Race</span>
        <span class="htag" id="tagClass">Classe</span>
        <span class="htag ps" id="tagPS">Style</span>
        <span class="htag" id="tagLvl">Niv. 1</span>
      </div>
    </div>
    <div class="barwrap">
      <div class="barlabel"><span id="xpLabel">Expérience</span><span id="xpText">0 / 0</span></div>
      <div class="bar xp shimmer"><i id="xpBar"></i></div>
    </div>
  </div>

  <div id="tabs"></div>
  <div id="content">
    <div class="panel active" data-panel="combat" id="panel-combat"></div>
    <div class="panel" data-panel="upgrades" id="panel-upgrades"></div>
    <div class="panel" data-panel="income" id="panel-income"></div>
    <div class="panel" data-panel="equipment" id="panel-equipment"></div>
    <div class="panel" data-panel="legacy" id="panel-legacy"></div>
  </div>
</div>

<div id="toasts"></div>

<script>
"use strict";

/* =========================================================================
   L'ASCENSION DE L'OMBRE - Epic Fantasy Idle Game
   ========================================================================= */

/* ---------- CONFIG & DATA ---------- */
let buyAmount = 1; // 1, 10, 100, -1 (MAX)
const BUY_MODES = [1, 10, 100, -1];

const RACES = {
  hobbit:{name:'Hobbit',ico:'🌿',desc:'+20% Or, forte résistance à la corruption.',
          goldMult:1.20, corruptionResist:0.5, idleMult:1, gloryMult:1, allMult:1, xpMult:1, posEvent:1},
  elf:   {name:'Elfe',ico:'🏹',desc:'+15% XP, +10% chances d\'événements.',
          goldMult:1, corruptionResist:1, idleMult:1, gloryMult:1, allMult:1, xpMult:1.15, posEvent:1.10},
  dwarf: {name:'Nain',ico:'⛏',desc:'+30% revenu idle, chance de drop +15%.',
          goldMult:1, corruptionResist:1, idleMult:1.30, gloryMult:1, allMult:1, xpMult:1, posEvent:1, dropMult:1.15},
  man:   {name:'Homme',ico:'👑',desc:'+10% sur tout, +20% Gloire.',
          goldMult:1.10, corruptionResist:1, idleMult:1.10, gloryMult:1.20, allMult:1.10, xpMult:1.10, posEvent:1},
};
const CLASSES = {
  warrior:{name:'Guerrier',ico:'🛡',desc:'Force ×1.5 — dégâts bruts.',primary:'force',mult:1.5,atkSpeed:1,hpRegen:1},
  ranger: {name:'Rôdeur',ico:'🗡',desc:'Agilité ×1.5 + vitesse.',primary:'agility',mult:1.5,atkSpeed:1.3,hpRegen:1},
  mage:   {name:'Mage',ico:'🔮',desc:'Sagesse ×1.5 + burst or.',primary:'wisdom',mult:1.5,atkSpeed:1,hpRegen:1},
  guardian:{name:'Gardien',ico:'⚜',desc:'Courage ×1.5 + regen PV.',primary:'courage',mult:1.5,atkSpeed:1,hpRegen:2.5},
};

const PLAYSTYLES = [
  {n:'Mercenaire',r:'Common',d:'+10% Or'}, {n:'Éclaireur',r:'Common',d:'+8% vit. attaque'},
  {n:'Robuste',r:'Common',d:'+15% PV max'}, {n:'Studieux',r:'Common',d:'+12% XP'},
  {n:'Cupide',r:'Common',d:'+12% Essence'}, {n:'Brutal',r:'Uncommon',d:'+20% dégâts'},
  {n:'Seigneur',r:'Rare',d:'+30% Gloire, +15% tout'}, {n:'Élu',r:'Legendary',d:'+50% tout'}
];

const REGIONS = [
  {n:'La Comté',lv:1},{n:'Le Vieux Bois',lv:8},{n:'Fondcombe',lv:18},
  {n:'La Moria',lv:30},{n:'Lothlórien',lv:42},{n:'Rohan',lv:55},
  {n:'Gondor',lv:70},{n:'Le Mordor',lv:85},{n:'La Montagne du Destin',lv:100},
];
const ENEMIES = [
  {n:'Orque',ico:'👺'},{n:'Uruk-hai',ico:'🗡'},{n:'Warg',ico:'🐺'},
  {n:'Troll',ico:'🗿'},{n:'Olog-hai',ico:'👹'},{n:'Spectre',ico:'💀'}
];

const EQUIP_SLOTS = [
  {id:'weapon', n:'Arme', ico:'⚔', desc:'Booste les Dégâts bruts'},
  {id:'armor', n:'Armure', ico:'🛡', desc:'Booste les PV Max'},
  {id:'helmet', n:'Casque', ico:'⛑', desc:'Booste le gain d\'XP'},
  {id:'boots', n:'Bottes', ico:'🥾', desc:'Booste la Vitesse d\'attaque'}
];
const EQUIP_TIERS = ['Common','Uncommon','Rare','Epic','Legendary','Mythic'];
const EQUIP_MULT = [1, 1.5, 3, 8, 25, 100]; // Power multiplier based on rarity

const UPGRADES = [
  {id:'h_blade',n:'Lame de l\'Ouest',d:'+8% dégâts / niv',ico:'⚔',base:50,g:1.15,eff:'dmg',v:0.08},
  {id:'h_might',n:'Entraînement',d:'+4 Force / niv',ico:'💪',base:80,g:1.16,eff:'stat',stat:'force',v:4},

/* ---------- SAVE / LOAD ---------- */
const SAVE_KEY='lotr_idle_save_v2';
function save(){ try{ S.lastSave=Date.now(); localStorage.setItem(SAVE_KEY,JSON.stringify(S)); }catch(e){} }
function load(){
  try{
    let str=localStorage.getItem(SAVE_KEY);
    if(!str) return false;
    let d=JSON.parse(str);
    if(!d||!d.created) return false;
    S=Object.assign(defaultState(),d);
    INCOME.forEach(i=>{if(S.income[i.id]==null)S.income[i.id]=0});
    UPGRADES.forEach(u=>{if(S.upgrades[u.id]==null)S.upgrades[u.id]=0});
    EQUIP_SLOTS.forEach(e=>{if(!S.equip[e.id])S.equip[e.id]={tier:0, power:1, name:'Base'}});
    LEGACY_TREE.forEach(l=>{if(S.legacyNodes[l.id]==null)S.legacyNodes[l.id]=0});
    return true;
  }catch(e){return false;}
}

/* ---------- UTILS ---------- */
const $ = s => document.querySelector(s);
const ce = (t,c) => {const e=document.createElement(t); if(c)e.className=c; return e;};
function fmt(n) {
  if(n<1000) return Math.floor(n).toString();
  const suf=['','K','M','B','T','Qa','Qi'];
  let t=Math.floor(Math.log10(n)/3);
  if(t<suf.length) return (n/Math.pow(10,t*3)).toFixed(2)+suf[t];
  return n.toExponential(2);
}
function xpNeeded(lv){return Math.floor(100*Math.pow(1.25,lv-1));}

/* COST MATH FOR MULTIPLE BUYS */
// Geometric series sum: Cost = Base * (g^n - 1) / (g - 1)
function getCost(base, g, currentLvl, amount) {
  let cost = 0;
  let tempLvl = currentLvl;
  for(let i=0; i<amount; i++) {
    cost += base * Math.pow(g, tempLvl);
    tempLvl++;
  }
  return cost;
}
function getMaxAffordable(base, g, currentLvl, resource) {
  let count = 0;
  let cost = 0;
  let tempLvl = currentLvl;
  while(true) {
    let nextCost = base * Math.pow(g, tempLvl);
    if (cost + nextCost > resource) break;
    cost += nextCost;
    tempLvl++;
    count++;
    if(count > 1000) break; // sanity limit
  }
  return { count, cost };
}

/* ---------- COMPUTED STATS ---------- */
function upSum(eff){let f=1; UPGRADES.forEach(u=>{if(u.eff===eff)f+=u.v*(S.upgrades[u.id]||0);}); return f;}
function upStat(stat){let s=0; UPGRADES.forEach(u=>{if(u.eff==='stat'&&u.stat===stat)s+=u.v*(S.upgrades[u.id]||0)}); return s;}
function legLvl(id){return S.legacyNodes[id]||0;}

function getMult(key){
  let m = 1;
  if(key === 'gold') m *= RACES[S.race].goldMult * upSum('gold');
  if(key === 'xp') m *= RACES[S.race].xpMult * upSum('xp') * (1 + 0.3 * legLvl('l_xp'));
  if(key === 'glory') m *= RACES[S.race].gloryMult;
  if(key === 'ess') m *= upSum('ess');
  if(key === 'idle') m *= RACES[S.race].idleMult;
  m *= RACES[S.race].allMult * upSum('all');
  if(key === 'drop') m *= (RACES[S.race].dropMult || 1) * (1 + 0.1 * legLvl('l_drop'));
  return m;
}

function getStat(stat) {
  let v = 10 + legLvl('l_stats') * 10 + upStat(stat);
  if (CLASSES[S.cls].primary === stat) v *= CLASSES[S.cls].mult;
  return Math.floor(v);
}
function getDmg() {
  let dmg = getStat(CLASSES[S.cls].primary) * 2;
  dmg *= upSum('dmg') * (1 + 0.25 * legLvl('l_dmg'));
  // Equip Multiplier (Weapon)
  dmg *= (1 + S.equip.weapon.power * 0.05); 
  return Math.floor(dmg);
}
function getMaxHp() {
  let hp = 100 + getStat('courage') * 10;
  hp *= upSum('hp');
  // Equip Multiplier (Armor)
  hp *= (1 + S.equip.armor.power * 0.05);
  return Math.floor(hp);
}
function getAtkSpeed() {
  let spd = CLASSES[S.cls].atkSpeed * upSum('atk');
  // Equip Multiplier (Boots)
  spd *= (1 + S.equip.boots.power * 0.02);
  return spd;
}
function getIdleIncome() {
  let inc = 0;
  INCOME.forEach(i => inc += (S.income[i.id]||0) * i.yield);
  return inc * getMult('idle') * getMult('gold');
}

/* ---------- COMBAT & DROPS ---------- */
function enemyMaxHp() { return Math.floor(15 * Math.pow(1.18, S.stage - 1)); }

function spawnEnemy() {
  S.enemyMaxHp = enemyMaxHp();
  S.enemyHp = S.enemyMaxHp;
  S.enemyIdx = Math.floor(Math.random() * ENEMIES.length);
  renderCombatFace();
}

function heroAttack() {
  let dmg = getDmg();
  S.enemyHp -= dmg;
  floatText(fmt(dmg));
  
  if (S.enemyHp <= 0) {
    enemyDie();
  } else {
    renderBars();
  }
}

function rollDrop() {
  let dropChance = 0.05 * getMult('drop'); // 5% base chance
  if(Math.random() > dropChance) return;

  let slot = EQUIP_SLOTS[Math.floor(Math.random() * EQUIP_SLOTS.length)].id;
  let r = Math.random();
  let tier = 0;
  if(r > 0.98) tier = 5; // Mythic
  else if(r > 0.90) tier = 4; // Leg
  else if(r > 0.75) tier = 3; // Epic
  else if(r > 0.50) tier = 2; // Rare
  else if(r > 0.20) tier = 1; // Unc
  
  // Power scales with stage and tier
  let power = Math.floor(S.stage * EQUIP_MULT[tier] * (0.8 + Math.random()*0.4));
  if(power <= 0) power = 1;

  // Equip if better
  if(power > S.equip[slot].power) {
    S.equip[slot] = { tier: tier, power: power, name: EQUIP_TIERS[tier] + ' Relic' };
    logDrop(`Tu as trouvé un meilleur objet : ${EQUIP_TIERS[tier]} ${slot} (Puissance ${fmt(power)}) !`, tier);
    S.maxHp = getMaxHp(); // update stats
    refreshTab('equipment');
  } else {
    // Convert to gold if weaker
    let scrap = power * 10 * getMult('gold');
    S.gold += scrap;
    logDrop(`Objet recyclé pour ${fmt(scrap)} Or.`, 0);
  }
}

function logDrop(msg, tier) {
  let p = $('#droplog');
  if(!p) return;
  let d = ce('div');
  d.innerText = msg;
  d.style.color = getTierColor(tier);
  p.prepend(d);
  if(p.children.length > 5) p.removeChild(p.lastChild);
}
function getTierColor(t) {
  const c = ['#b9c2d0','#6fd17a','#5fa8e0','#b06fe0','#e8c170','#ff6b88'];
  return c[t] || c[0];
}

function enemyDie() {
  S.kills++;
  S.gold += 5 * S.stage * getMult('gold');
  S.xp += 20 * Math.pow(1.12, S.stage-1) * getMult('xp') * (1 + S.equip.helmet.power * 0.01);
  S.essence += Math.random() < 0.3 ? S.stage * getMult('ess') : 0;
  
  rollDrop();

  if (S.xp >= xpNeeded(S.level)) levelUp();
  if (S.kills % 10 === 0) advanceStage();
  
  spawnEnemy();
  renderTop();
}

function advanceStage() {
  S.stage++;
  S.regionIdx = Math.min(REGIONS.length - 1, Math.floor(S.stage / 10));
  spawnEnemy();
}

function levelUp() {
  S.level++;
  S.xp -= xpNeeded(S.level - 1);
  S.maxHp = getMaxHp();
  S.hp = S.maxHp;
  toast("Niveau " + S.level + " atteint !");
  renderHero();
}

/* ---------- TABS ---------- */
const TABS = [
  {id:'combat',n:'Champ de Bataille'},{id:'upgrades',n:'Entraînement'},
  {id:'income',n:'Royaume'},{id:'equipment',n:'Arsenal'},
  {id:'legacy',n:'Héritage'}
];
function buildTabs() {
  let t = $('#tabs');
  t.innerHTML = '';
  TABS.forEach(tab => {
    let b = ce('div', 'tabbtn');
    b.dataset.id = tab.id;
    b.innerText = tab.n;
    b.onclick = () => switchTab(tab.id);
    t.appendChild(b);
  });
  switchTab('combat');
}
function switchTab(id) {
  document.querySelectorAll('.tabbtn').forEach(b => {
    if(b.dataset.id === id) b.classList.add('active'); else b.classList.remove('active');
  });
  document.querySelectorAll('.panel').forEach(p => p.classList.remove('active'));
  let p = $(`#panel-${id}`);
  if(p) p.classList.add('active');
  refreshTab(id);
}

function refreshTab(id) {
  if(id === 'combat') renderCombatFace();
  if(id === 'upgrades') renderUpgrades();
  if(id === 'income') renderIncome();
  if(id === 'equipment') renderEquipment();
  if(id === 'legacy') renderLegacy();
}

/* ---------- STORES ---------- */
function renderUpgrades() {
  let p = $('#panel-upgrades');
  let html = `<div class="card"><h3>Améliorations du Héros</h3><div class="grid g1">`;
  
  UPGRADES.forEach(u => {
    let lvl = S.upgrades[u.id];
    let purchase = buyAmount === -1 ? getMaxAffordable(u.base, u.g, lvl, S.essence) : {count: buyAmount, cost: getCost(u.base, u.g, lvl, buyAmount)};
    let realCount = purchase.count;
    let cost = purchase.cost;
    let aff = realCount > 0 && S.essence >= cost;
    
    html += `
      <div class="buyrow">
        <div style="font-size:28px">${u.ico}</div>
        <div class="info">
          <div class="nm">${u.n}</div>
          <div class="ds">${u.d}</div>
          <div class="lvl">Niv. ${lvl}</div>
        </div>
        <div class="act">
          <button class="btn ${aff?'':'alt'}" onclick="buyUp('${u.id}')" ${aff?'':'disabled'}>
            ${realCount > 0 ? '+'+realCount : 'MAX'} : ${fmt(cost)} ✦
          </button>
        </div>
      </div>
    `;
  });
  p.innerHTML = html + `</div></div>`;
}

window.buyUp = function(id) {
  let u = UPGRADES.find(x => x.id === id);
  let lvl = S.upgrades[id];
  let purchase = buyAmount === -1 ? getMaxAffordable(u.base, u.g, lvl, S.essence) : {count: buyAmount, cost: getCost(u.base, u.g, lvl, buyAmount)};
  
  if (purchase.count > 0 && S.essence >= purchase.cost) { 
    S.essence -= purchase.cost; 
    S.upgrades[id] += purchase.count; 
    S.maxHp = getMaxHp();
    refreshTab('upgrades'); 
    renderTop(); 
  }
};

function renderIncome() {
  let p = $('#panel-income');
  let html = `<div class="card"><h3>Bâtiments du Royaume</h3><div class="sub">Construis ton empire pour générer de l'Or passif.</div><div class="grid g1">`;
  INCOME.forEach(i => {
    let lvl = S.income[i.id];
    let purchase = buyAmount === -1 ? getMaxAffordable(i.base, i.g, lvl, S.gold) : {count: buyAmount, cost: getCost(i.base, i.g, lvl, buyAmount)};
    let realCount = purchase.count;
    let cost = purchase.cost;
    let aff = realCount > 0 && S.gold >= cost;
    
    html += `
      <div class="buyrow">
        <div style="font-size:28px">${i.ico}</div>
        <div class="info">
          <div class="nm">${i.n}</div>
          <div class="ds">${i.d} (Produit: ${fmt(i.yield)}/s)</div>
          <div class="lvl">Construits : ${lvl}</div>
        </div>
        <div class="act">
          <button class="btn ${aff?'':'alt'}" onclick="buyInc('${i.id}')" ${aff?'':'disabled'}>
            ${realCount > 0 ? '+'+realCount : 'MAX'} : ${fmt(cost)} Or
          </button>
        </div>
      </div>
    `;
  });
  p.innerHTML = html + `</div></div>`;
}

window.buyInc = function(id) {
  let i = INCOME.find(x => x.id === id);
  let lvl = S.income[id];
  let purchase = buyAmount === -1 ? getMaxAffordable(i.base, i.g, lvl, S.gold) : {count: buyAmount, cost: getCost(i.base, i.g, lvl, buyAmount)};
  
  if (purchase.count > 0 && S.gold >= purchase.cost) { 
    S.gold -= purchase.cost; 
    S.income[id] += purchase.count; 
    refreshTab('income'); 
    renderTop(); 
  }
};

function renderEquipment() {
  let p = $('#panel-equipment');
  let html = `<div class="card"><h3>Ton Arsenal</h3><div class="sub">Les ennemis laissent tomber des reliques. L'équipement supérieur est automatiquement équipé.</div><div class="grid g2">`;
  EQUIP_SLOTS.forEach(e => {
    let eq = S.equip[e.id];
    let tColor = getTierColor(eq.tier);
    html += `
      <div class="slot" style="border-color:${tColor}">
        <div class="icon">${e.ico}</div>
        <div class="sname">${e.n}</div>
        <div class="rar" style="color:${tColor}">${EQUIP_TIERS[eq.tier]}</div>
        <div class="stat">Puissance: ${fmt(eq.power)}</div>
        <div style="font-size:11px; margin-top:5px; color:var(--muted)">${e.desc}</div>
      </div>
    `;
  });
  p.innerHTML = html + `</div></div>`;
}

function renderLegacy() {
  let p = $('#panel-legacy');
  let reqLvl = 50;
  let canRebirth = S.level >= reqLvl;
  // Point formula: Geometric scale based on level above 49
  let pointsToEarn = canRebirth ? Math.floor(Math.pow(S.level - 49, 1.3)) : 0;
  
  let html = `<div class="card"><h3>L'Arbre d'Eru Ilúvatar (${fmt(S.legacy)} 🜲)</h3>
    <div class="sub">Renais de tes cendres. Tu dois être au moins <b>Niveau ${reqLvl}</b>. Plus ton niveau est élevé, plus tu récoltes d'Héritage (🜲).</div>
    <div style="text-align:center; margin-bottom:20px;">
      <button class="btn" style="border-color:#9d62d6; color:#d6a8ff; font-size:16px; padding:15px;" onclick="rebirth()" ${canRebirth?'':'disabled'}>
        ${canRebirth ? `Renaître et gagner +${fmt(pointsToEarn)} 🜲` : `Atteins le Niv. ${reqLvl} pour Renaître`}
      </button>
    </div>
    <div class="grid g2">`;
  
  LEGACY_TREE.forEach(l => {
    let lvl = S.legacyNodes[l.id];
    let c = Math.floor(l.cost * Math.pow(l.g, lvl));
    let aff = S.legacy >= c && lvl < l.max;
    html += `
      <div class="slot" style="${lvl>0 ? 'border-color:var(--gold); box-shadow:0 0 10px var(--glow);' : ''}">
        <div class="icon">${l.ico}</div>
        <div class="sname">${l.n} (${lvl}/${l.max})</div>
        <div class="stat">${l.d}</div>
        <button class="btn small" style="margin-top:10px" onclick="buyLeg('${l.id}')" ${aff?'':'disabled'}>
          ${lvl>=l.max ? 'MAX' : c+' 🜲'}
        </button>
      </div>
    `;
  });
  p.innerHTML = html + `</div></div>`;
}

window.buyLeg = function(id) {
  let l = LEGACY_TREE.find(x => x.id === id);
  let lvl = S.legacyNodes[id];
  let c = Math.floor(l.cost * Math.pow(l.g, lvl));
  if (S.legacy >= c && lvl < l.max) {
    S.legacy -= c; S.legacyNodes[id]++; refreshTab('legacy'); renderTop(); save();
  }
};

window.rebirth = function() {
  let reqLvl = 50;
  if(S.level < reqLvl) return;
  let pointsToEarn = Math.floor(Math.pow(S.level - 49, 1.3));
  if(!confirm(`Es-tu sûr de vouloir renaître ? Tu perdras tout sauf ton Héritage, mais tu gagneras ${fmt(pointsToEarn)} 🜲.`)) return;
  
  let leg = S.legacy + pointsToEarn;
  let legNodes = Object.assign({}, S.legacyNodes);
  initFresh();
  S.legacy = leg;
  S.legacyNodes = legNodes;
  S.created = false;
  save();
  window.location.reload();
};

// Injection du script API YT
const tag = document.createElement('script');
tag.src = "https://www.youtube.com/iframe_api";
const firstScriptTag = document.getElementsByTagName('script')[0];
firstScriptTag.parentNode.insertBefore(tag, firstScriptTag);

window.toggleMute = function() {
  if(!player || !player.setVolume) return;
  isMuted = !isMuted;
  if(isMuted) { player.pauseVideo(); $('#muteBtn').innerText = '🔇 Son: OFF'; }
  else { player.playVideo(); player.setVolume(50); $('#muteBtn').innerText = '🔊 Son: ON'; }
}

function startAudio() {
  if(player && player.playVideo && !isMuted) {
    player.setVolume(50);
    player.playVideo();
  }
}

/* ---------- GAME LOOP ---------- */
let tickCount = 0;
let atkTimer = 0;
function tick() {
  let now = Date.now();
  let dt = (now - lastRender)/1000 || 0;
  lastRender = now;
  if(dt > 2) dt = 2; // cap offline tick length to avoid bursts
  
  tickCount++;
  
  let idle = getIdleIncome() * dt;
  if(idle > 0) S.gold += idle;
  
  if(S.hp < S.maxHp) {
    S.hp = Math.min(S.maxHp, S.hp + S.maxHp * 0.02 * dt * CLASSES[S.cls].hpRegen);
    if(tickCount%5===0) renderBars();
  }

  atkTimer += dt;
  let spd = getAtkSpeed();
  if(atkTimer >= 1/spd) {
    atkTimer = 0;
    heroAttack();
  }

  if(tickCount % 10 === 0) renderTop();
  if(tickCount % 50 === 0) save();
}

/* ---------- START SCREEN ---------- */
function initStartScreen() {
  if(S.created) {
    $('#start').style.display = 'none';
    $('#app').style.display = 'flex';
    renderHero();
    buildTabs();
    spawnEnemy();
    setInterval(tick, 100);
    return;
  }
  
  let rg = $('#raceGrid');
  Object.keys(RACES).forEach(k => {
    let r = RACES[k]; let d = ce('div', 'choice rchoice'); d.dataset.v = k;
    d.innerHTML = `<div class="ct">${r.ico} ${r.name}</div><div class="cd">${r.desc}</div>`;
    d.onclick = () => { document.querySelectorAll('.rchoice').forEach(x=>x.classList.remove('sel')); d.classList.add('sel'); checkStart(); };
    rg.appendChild(d);
  });
  
  let cg = $('#classGrid');
  Object.keys(CLASSES).forEach(k => {
    let c = CLASSES[k]; let d = ce('div', 'choice cchoice'); d.dataset.v = k;
    d.innerHTML = `<div class="ct">${c.ico} ${c.name}</div><div class="cd">${c.desc}</div>`;
    d.onclick = () => { document.querySelectorAll('.cchoice').forEach(x=>x.classList.remove('sel')); d.classList.add('sel'); checkStart(); };
    cg.appendChild(d);
  });
  
  $('#nameInput').oninput = checkStart;
  $('#beginBtn').onclick = startGame;
}
function checkStart() {
  let n = $('#nameInput').value.trim();
  let r = $('.rchoice.sel'); let c = $('.cchoice.sel');
  $('#beginBtn').disabled = !(n && r && c);
}
function startGame() {
  S.name = $('#nameInput').value.trim();
  S.race = $('.rchoice.sel').dataset.v;
  S.cls = $('.cchoice.sel').dataset.v;
  S.created = true;
  S.maxHp = getMaxHp();
  S.hp = S.maxHp;
  save();
  startAudio(); // Lancement de la musique
  initStartScreen();
}

/* ---------- PARTICLES & BOOT ---------- */
const canvas = document.getElementById('particles');
const ctx = canvas.getContext('2d');
let W, H; let parts = [];
function resize() { W = canvas.width = window.innerWidth; H = canvas.height = window.innerHeight; }
window.addEventListener('resize', resize); resize();
function renderCanvas() {
  ctx.clearRect(0, 0, W, H);
  if(Math.random() < 0.1) {
    parts.push({ x: Math.random() * W, y: H + 10, vx: (Math.random() - 0.5) * 0.5, vy: -Math.random() * 1 - 0.5, life: 1, c: '#d4af37' });
  }
  for(let i=parts.length-1; i>=0; i--) {
    let p = parts[i]; p.x += p.vx; p.y += p.vy; p.life -= 0.005;
    ctx.globalAlpha = Math.max(0, p.life * 0.5); ctx.fillStyle = p.c;
    ctx.beginPath(); ctx.arc(p.x, p.y, 2, 0, Math.PI*2); ctx.fill();
    if(p.life <= 0) parts.splice(i, 1);
  }
  requestAnimationFrame(renderCanvas);
}
renderCanvas();

if(!load()) initFresh();
initStartScreen();
