/* ---------- PASSIVES (AFFINITÉS) PANEL ---------- */
const PASSIVE_REROLL_COST_BASE = 25;
const PASSIVE_SLOTS_MAX = 3;
function passiveRerollCost() {
  return PASSIVE_REROLL_COST_BASE * Math.pow(1.6, S.passives.length);
}
function renderPassives() {
  let p = $('#panel-passives');
  let cost = Math.floor(passiveRerollCost());
  let canAfford = S.glory >= cost;
  let canAdd = S.passives.length < PASSIVE_SLOTS_MAX;
  let html = `<div class="card">
    <h3>🜂 Affinités du Héros</h3>
    <div class="sub">Des dons mystiques, semblables à des reliques, qui façonnent ton destin. Utilise ta <b>Gloire 🏆</b> pour obtenir ou reroller une affinité (max ${PASSIVE_SLOTS_MAX}).</div>
    <div style="text-align:center;margin-bottom:16px">
      <button class="btn" style="max-width:360px;margin:0 auto" onclick="rerollPassive()" ${canAfford?'':'disabled'}>
        ${canAdd ? '✨ Obtenir une Affinité' : '🔄 Reroll une Affinité'} — ${fmt(cost)} 🏆
      </button>
    </div>
    <div class="grid g1">`;
  if(S.passives.length === 0) {
    html += `<div class="sub" style="text-align:center">Aucune affinité pour le moment. Dépense ta Gloire pour en débloquer une !</div>`;
  }
  S.passives.forEach((pas, idx) => {
    let color = getTierColor(pas.tier);
    html += `
      <div class="passive-card" style="border-color:${color}">
        <div class="pname r-${PASSIVE_TIER_KEYS[pas.tier]}">${pas.n} <span style="font-size:11px;color:${color}">[${EQUIP_TIERS[pas.tier]}]</span></div>
        <div class="pdesc">${pas.d}</div>
        <button class="btn small" onclick="rerollSinglePassive(${idx})" ${S.glory>=cost?'':'disabled'}>Reroll cette affinité — ${fmt(cost)} 🏆</button>
      </div>`;
  });
  html += `</div></div>`;
  p.innerHTML = html;
}

function rollRandomPassive() {
  // Weighted rarity roll similar to equipment
  let r = Math.random();
  let tier = 0;
  if(r > 0.97) tier = 5;
  else if(r > 0.90) tier = 4;
  else if(r > 0.75) tier = 3;
  else if(r > 0.50) tier = 2;
  else if(r > 0.20) tier = 1;
  else tier = 0;
  let pool = PASSIVE_POOL[PASSIVE_TIER_KEYS[tier]];
  let pick = pool[Math.floor(Math.random()*pool.length)];
  return {tier, n: pick.n, d: pick.d, eff: pick.eff, v: pick.v, v2: pick.v2, v3: pick.v3};
}
window.rerollPassive = function() {
  let cost = Math.floor(passiveRerollCost());
  if(S.glory < cost) return;
  S.glory -= cost;
  let newPas = rollRandomPassive();
  if(S.passives.length < PASSIVE_SLOTS_MAX) {
    S.passives.push(newPas);
    toast(`🜂 Nouvelle Affinité : ${newPas.n} [${EQUIP_TIERS[newPas.tier]}]`);
  } else {
    // Reroll a random existing one
    let idx = Math.floor(Math.random()*S.passives.length);
    S.passives[idx] = newPas;
    toast(`🔄 Affinité changée : ${newPas.n} [${EQUIP_TIERS[newPas.tier]}]`);
  }
  AudioEngine.playDrop(newPas.tier);
  S.maxHp = getMaxHp();
  refreshTab('passives'); renderTop(); save();
};
window.rerollSinglePassive = function(idx) {
  let cost = Math.floor(passiveRerollCost());
  if(S.glory < cost) return;
  S.glory -= cost;
  let newPas = rollRandomPassive();
  S.passives[idx] = newPas;
  toast(`🔄 Affinité changée : ${newPas.n} [${EQUIP_TIERS[newPas.tier]}]`);
  AudioEngine.playDrop(newPas.tier);
  S.maxHp = getMaxHp();
  refreshTab('passives'); renderTop(); save();
};

/* ---------- LEGACY PANEL ---------- */
function renderLegacy() {
  let p = $('#panel-legacy');
  let canRebirth = S.level >= 50;
  let pts = calcLegacyPoints(S.level);
  let rc = S.rebirthCount || 0;

  // Find next milestone
  let nextMs = LEGACY_MILESTONES.find(m => S.level < m.lvl);

  let html = `<div class="card">
    <h3>🜲 L'Arbre d'Eru Ilúvatar</h3>
    <div class="sub">Renais de tes cendres pour gagner un Héritage éternel. Disponible dès le <b>Niveau 50</b>. Plus haut est ton niveau, plus grandes sont les récompenses.</div>

    <!-- Rebirth info box -->

      <h4>🜲 Résumé de l'Héritage</h4>
      <div style="display:flex;gap:20px;flex-wrap:wrap;margin-bottom:10px;font-size:13px">
        <span>Points actuels : <b style="color:#c9a0ff">${fmt(S.legacy)} 🜲</b></span>
        <span>Rebirths : <b style="color:#c9a0ff">${rc}</b></span>
        <span>Plus haut niveau : <b style="color:#c9a0ff">${S.highestLevel||S.level}</b></span>
      </div>
      ${canRebirth
        ? `<div style="color:var(--gold-bright);font-family:Cinzel;font-size:14px;margin-bottom:8px">
            Tu gagneras <b style="color:#c9a0ff">+${fmt(pts)} 🜲</b> en renaissant maintenant (Niv. ${S.level}).
           </div>`
        : `<div style="color:var(--muted);font-size:13px;margin-bottom:8px">Atteins le <b>Niveau 50</b> pour Renaître.</div>`
      }
      <div class="legacy-milestones">
        ${LEGACY_MILESTONES.map(m => `
          <span class="legacy-reward-badge ${m.badge}" title="${m.desc}" style="${S.level >= m.lvl ? '' : 'opacity:0.4'}">
            ${m.label}
          </span>`).join('')}
      </div>
      ${nextMs ? `<div style="font-size:12px;color:var(--muted);margin-top:8px;font-style:italic">
        Prochain palier : Niveau ${nextMs.lvl} (+${nextMs.pts} 🜲) — "${nextMs.desc}"
      </div>` : ''}
    </div>

    <div style="text-align:center;margin-bottom:20px">
      <button class="btn" style="border-color:#9d62d6;color:#d6a8ff;font-size:16px;padding:15px;max-width:400px"
        onclick="rebirth()" ${canRebirth?'':'disabled'}>
        ${canRebirth
          ? `✨ Renaître — Gagner +${fmt(pts)} 🜲`
          : `Niv. 50 requis pour Renaître`}
      </button>
    </div>

    <div class="grid g2">`;

  LEGACY_TREE.forEach(l => {
    let lvl = S.legacyNodes[l.id];
    let c = Math.floor(l.cost * Math.pow(l.g, lvl));
    let aff = S.legacy >= c && lvl < l.max;
    let done = lvl >= l.max;
    html += `
      <div class="slot ${done?'':''}${lvl>0?'':' legacy-locked'}" style="${lvl>0?'border-color:var(--gold);box-shadow:0 0 10px var(--glow);':''}">
        <div class="icon">${l.ico}</div>
        <div class="sname">${l.n}</div>
        <div class="stat" style="margin:4px 0">${l.d}</div>
        <div style="font-size:12px;color:var(--teal-soft);font-family:Cinzel;margin-bottom:8px">${lvl} / ${l.max}</div>
        <button class="btn small" onclick="buyLeg('${l.id}')" ${aff?'':'disabled'}>
          ${done ? '✓ MAX' : `${c} 🜲`}
        </button>
      </div>`;
  });
  p.innerHTML = html + `</div></div>`;
}

window.buyLeg = function(id) {
  let l = LEGACY_TREE.find(x=>x.id===id);
  let lvl = S.legacyNodes[id];
  let c = Math.floor(l.cost * Math.pow(l.g, lvl));
  if(S.legacy >= c && lvl < l.max) {
    S.legacy -= c; S.legacyNodes[id]++;
    AudioEngine.playCoin();
    refreshTab('legacy'); renderTop(); save();
  }
};

/* ---------- PARTICLES ---------- */
const canvas = document.getElementById('particles');
const ctx = canvas.getContext('2d');
let W,H,parts=[];
let particleColor = '#d4af37';
function updateParticleColor(c) { particleColor = c; }
function resize() { W=canvas.width=window.innerWidth; H=canvas.height=window.innerHeight; }
window.addEventListener('resize',resize); resize();
function renderCanvas() {
  ctx.clearRect(0,0,W,H);
  if(Math.random()<0.12) {
    parts.push({x:Math.random()*W,y:H+10,vx:(Math.random()-0.5)*0.5,vy:-Math.random()*1-0.5,life:1,c:particleColor});
  }
  for(let i=parts.length-1;i>=0;i--) {
    let p=parts[i]; p.x+=p.vx; p.y+=p.vy; p.life-=0.005;
    ctx.globalAlpha=Math.max(0,p.life*0.5); ctx.fillStyle=p.c;
    ctx.beginPath(); ctx.arc(p.x,p.y,2,0,Math.PI*2); ctx.fill();
    if(p.life<=0) parts.splice(i,1);
  }
  ctx.globalAlpha=1;
  requestAnimationFrame(renderCanvas);
}
renderCanvas();

/* ---------- START SCREEN ---------- */
function initStartScreen() {
  if(S.created) {
    $('#start').style.display='none';
    $('#app').style.display='flex';
    AudioEngine.setMusicVolume(S.musicVol!=null?S.musicVol:0.32);
    AudioEngine.setSfxVolume(S.sfxVol!=null?S.sfxVol:0.8);
    if(S.isNazgul) { document.body.classList.add('nazgul'); AudioEngine.setNazgulMode(true); }
    else { applyRegionTheme(S.regionIdx||0); }
    renderHero(); buildTabs(); spawnEnemy(); renderKarmaCorruption();
    setInterval(tick, 100);
    return;
  }
  let rg = $('#raceGrid');
  Object.keys(RACES).forEach(k=>{
    let r=RACES[k]; let d=ce('div','choice rchoice'); d.dataset.v=k;
    d.innerHTML=`<div class="ct">${r.ico} ${r.name}</div><div class="cd">${r.desc}</div>`;
    d.onclick=()=>{document.querySelectorAll('.rchoice').forEach(x=>x.classList.remove('sel')); d.classList.add('sel'); checkStart();};
    rg.appendChild(d);
  });
  let cg = $('#classGrid');
  Object.keys(CLASSES).forEach(k=>{
    let c=CLASSES[k]; let d=ce('div','choice cchoice'); d.dataset.v=k;
    d.innerHTML=`<div class="ct">${c.ico} ${c.name}</div><div class="cd">${c.desc}</div>`;
    d.onclick=()=>{document.querySelectorAll('.cchoice').forEach(x=>x.classList.remove('sel')); d.classList.add('sel'); checkStart();};
    cg.appendChild(d);
  });
  $('#nameInput').oninput=checkStart;
  $('#beginBtn').onclick=startGame;
}
function checkStart() {
  let n=$('#nameInput').value.trim();
  let r=$('.rchoice.sel'); let c=$('.cchoice.sel');
  $('#beginBtn').disabled=!(n&&r&&c);
}
function startGame() {
  S.name=$('#nameInput').value.trim();
  S.race=$('.rchoice.sel').dataset.v;
  S.cls=$('.cchoice.sel').dataset.v;
  S.created=true;
  S.maxHp=getMaxHp(); S.hp=S.maxHp;
  save(); startAudio(); initStartScreen();
}

if(!load()) initFresh();
initStartScreen();
</script>
