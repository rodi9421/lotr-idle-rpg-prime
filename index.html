<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>L'Ascension de l'Ombre</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@500;600;700;800&family=EB+Garamond:ital@0;1&family=Cinzel+Decorative:wght@700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="styles.css">
</head>
<body>
<div id="app">
  <div id="topbar">
    <div class="res"><span class="ico">🪙</span><span class="v" id="rGold">0</span></div>
    <div class="res"><span class="ico">💎</span><span class="v" id="rEss">0</span></div>
    <div class="res"><span class="ico">⛏️</span><span class="v" id="rMat">0</span></div>
    <div class="spacer"></div>
    <div class="res" id="regionPill">—</div>
    <div id="corrThread"><i id="corrBar"></i></div>
  </div>

  <div id="view">
    <!-- screens injected here -->
    <div class="screen" id="screen-map"></div>
    <div class="screen hidden" id="screen-party"></div>
    <div class="screen hidden" id="screen-bag"></div>
    <div class="screen hidden" id="screen-tech"></div>
    <div class="screen hidden" id="screen-hero"></div>

    <!-- battle overlays the view -->
    <div id="battle">
      <div class="field-fog"></div>
      <div id="embers"></div>
      <div id="initRibbon"></div>
      <div id="enemyRow"></div>
      <div id="combatLog"></div>
      <div id="turnBanner"></div>
      <div id="partyRow"></div>
      <div id="cmdDock"></div>
      <div id="fx"></div>
      <div id="flash"></div>
      <div id="resultOverlay"></div>
    </div>
  </div>

  <div id="nav">
    <button data-screen="map" class="on"><span class="ic">🗺️</span>Carte</button>
    <button data-screen="party"><span class="ic">⚔️</span>Équipe</button>
    <button data-screen="bag"><span class="ic">🎒</span>Sac</button>
    <button data-screen="tech"><span class="ic">📖</span>Techniques</button>
    <button data-screen="hero"><span class="ic">🛡️</span>Héros</button>
  </div>
</div>

<button id="battleFab" onclick="returnToBattle()" style="display:none">⚔️ Combat en cours ↩︎</button>
<div id="toast"></div>
<div id="title"></div>
<audio id="bgmAdventure" preload="auto" loop>
    <source src="audio/the-one-ring.mp3" type="audio/mpeg">
    Votre navigateur ne supporte pas la balise audio.
</audio>

<audio id="bgmNazgul" preload="auto" loop>
    <source src="audio/nazgul-theme.mp3" type="audio/mpeg">
    Votre navigateur ne supporte pas la balise audio.
</audio>
<script src="game.js"></script>
</body>
</html>
